core:
  package: project-tiny-context-harness
  schema_version: "4"
profiles:
  enabled:
    - core-portable
    - workflow-default
    - long-task
modularity:
  limit: 300
  policy: strict_except_generated
managed_files:
  - path: AGENTS.md
    strategy: merge-block
  - path: Makefile
    strategy: merge-block
  - path: .codex/skills
    strategy: managed
  - path: .codex/ty-context-managed/context_templates
    strategy: managed
  - path: .codex/ty-context-managed/make/ty-context.mk
    strategy: managed
  - path: tools
    strategy: managed
  - path: .github/workflows/harness.yml
    strategy: create-if-missing
never_overwrite:
  - project_context/**
  - DESIGN.md
  - src/**
  - tests/**
