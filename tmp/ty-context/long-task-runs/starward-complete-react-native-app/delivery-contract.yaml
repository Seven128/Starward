          loading_state: "  - Loading: 固定行高/列宽骨架，已加载列不闪回。"
          empty_state: "  - Empty: 单个指标无数据时保留行并说明，不用 0 代替。"
          success_state: "  - Success: 当前时间、最佳窗口和选中时间明显且同步其他表面。"
          failure_state: "  - Failure: 某模型失败时保留可用模型并显示 partial。"
          feedback: "  - Feedback: 冻结行标签/时间头、趋势或阈值语义、更新时间和可访问表格说明。"
        - key: model-selector
