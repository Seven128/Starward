      controls:
        - key: release-promotion-gate
          location: "  - Location: CI/CD 或发布工作台。"
          trigger: "  - Trigger: 选择构建/变更集并请求晋级。"
          input: "  - Input: git/build ID、runtimeVersion、原生模块 diff、迁移、测试/安全/许可证据、SLO 基线和审批。"
          loading_state: "  - Loading: 构建/检查/灰度状态持续可见且可安全停止。"
          empty_state: "  - Empty: 缺任何必需证据时 disabled 并列明，不允许口头绕过。"
          success_state: "  - Success: 版本、通道、作用域、时间和回滚点可追溯；原生不兼容不会 OTA。"
          failure_state: "  - Failure: 保持上个稳定版本，失败阶段/日志/恢复动作明确。"
          feedback: "  - Feedback: JS-only/原生、数据迁移、用户范围和 OTA/二进制类型在确认前突出。"
        - key: technical-observability-dashboard
          location: "  - Location: 运行监控。"
          trigger: "  - Trigger: 告警深链、筛选或选择 trace/时间窗口。"
          input: "  - Input: REQ technical-observability 全量信号、release/runtime/provider/job correlation。"
          loading_state: "  - Loading: 上次完整窗口保留并标 stale，查询可取消。"
          empty_state: "  - Empty: 无数据被标成遥测缺口，不解释为 0 错误。"
          success_state: "  - Success: 从 SLO/错误下钻到 trace/依赖/版本并保持脱敏。"
          failure_state: "  - Failure: 监控管线故障有独立健康信号和备用查询。"
          feedback: "  - Feedback: 分母/窗口/采样、阈值和数据延迟可见；精确位置/secret 不展示。"
        - key: data-quality-dashboard
          location: "  - Location: 运行监控与后台数据质量。"
          trigger: "  - Trigger: 告警、选择问题/来源/地区/版本。"
          input: "  - Input: REQ data-observability 全部检查、样本、阈值、受影响对象和 runbook。"
          loading_state: "  - Loading: 最后成功检查/覆盖保持并标时间。"
          empty_state: "  - Empty: 检查未运行或样本不足显示 unknown，不显示健康。"
          success_state: "  - Success: 问题有状态、严重度、范围、来源版本、负责人待绑定和恢复验证入口。"
          failure_state: "  - Failure: 检查系统失败本身触发告警且不压掉已有问题。"
          feedback: "  - Feedback: 模型分歧与供应商缺失、预测偏差与现场样本量、频繁变化与真实更新分开。"
        - key: backup-restore-exercise
          location: "  - Location: 运维恢复工作台/runbook 入口。"
          trigger: "  - Trigger: 定期演练、变更后或事故恢复授权。"
          input: "  - Input: 备份点、目标时间、环境、数据集/对象版本、RPO/RTO 和验证清单。"
          loading_state: "  - Loading: 复制/恢复/校验阶段、耗时和取消边界可见。"
          empty_state: "  - Empty: 无符合目标备份时立即失败并告警，不创建假成功报告。"
          success_state: "  - Success: 完整性、引用、坐标权限、对象版本和实际 RPO/RTO 有证据。"
          failure_state: "  - Failure: 隔离失败不触碰生产，记录缺口/修复/复测计划。"
          feedback: "  - Feedback: 明确这是演练/真实恢复、目标环境和任何可能写入影响。"
        - key: product-metrics-dashboard
          location: "  - Location: 产品/数据后台。"
          trigger: "  - Trigger: 选择日期/版本/粗地区/用户模式和指标。"
          input: "  - Input: 同意后的稳定事件、口径版本、排除规则、数据质量和延迟。"
          loading_state: "  - Loading: 上一口径结果保留并标数据截至时间。"
          empty_state: "  - Empty: 样本不足/同意不足显示不可判断，不回推精确用户位置。"
          success_state: "  - Success: 漏斗八步、北极星和十项辅助指标有分母、趋势、版本和质量标记。"
          failure_state: "  - Failure: 事件 schema/管线异常显示影响区间并阻止错误决策。"
          feedback: "  - Feedback: 指标变化与发布/规则/数据源相关联，但相关性不被自动宣称因果。"
      non_completing_outcomes:
        - key: lab-only-release
          statement: "- **NCOMP lab-only-release** [direct: S-ARCH 17.5]：只有模拟器/单元测试、没有真实双端设备/弱网/断网/传感器/低亮/户外验证，不能算生产 APP 质量完成。"
        - key: overengineered-platform
          statement: "- **NCOMP overengineered-platform** [direct: S-ARCH 1.3/19.9]：在没有规模/隔离证据时先上大量微服务、Kafka/Kubernetes，并因此推迟坐标/数据/决策闭环，不能算合理架构完成。"
    technical:
      obligations:
        - key: coordinate-time-types
          statement: "- **OBL coordinate-time-types** [direct: S-ARCH 19.3～19.4]：WGS84/GCJ-02 用 branded 类型而非普通 number tuple；服务统一 UTC、地点 IANA 时区、观星夜按当地日落日期，API 拒绝无时区时间字符串，并测试 DST/跨午夜/用户与地点异地。"
          required_proof_surfaces:
            - data_state
            - implementation_structure
            - runtime_behavior
        - key: release-runtime-compatibility
          statement: "- **OBL release-runtime-compatibility** [direct: S-ARCH 十四]：每个构建记录 native runtime/JS bundle/schema/API 合约兼容范围；OTA 服务端阻止发给不兼容 runtime，回滚不跨越不可逆数据迁移。"
          required_proof_surfaces:
            - ui_browser
        - key: design-and-accessibility-qa
          statement: "- **OBL design-and-accessibility-qa** [direct + repo evidence: S-DESIGN/S-CONTEXT/S-INTERACTION]：按 DESIGN.md 的日/夜/红光 token、结论→行动→证据层级、390×844 主视口、44px 目标、安全区、文本放大、屏幕阅读器、颜色非唯一、reduced motion、稳定 loading/empty/error/stale/disabled/saving/success 状态做视觉/交互验收；所有 UI/动效任务加载 S-INTERACTION 作为 RN 实现伴随指南，但 DESIGN.md/本计划/Context 是完整上位权威，Skill 对它们是单向依赖、冲突时无权覆盖；参考图/S-APPLE 不构成视觉复制或平台同质化权威。"
          required_proof_surfaces:
            - runtime_behavior
        - key: interaction-runtime-evidence
          statement: "- **OBL interaction-runtime-evidence** [derived from S-DESIGN/S-INTERACTION/S-RESEARCH]：交互验收同时包含纯状态/快照点决策单测、组件语义/取消/reduced-motion 分支、地图/Sheet/滚动/系统 back 集成、慢放/逐帧跳变与速度接缝审查、VoiceOver/TalkBack、文本放大、触觉开关/不可用、代表性 iPhone 与低端/高刷新 Android、低电/相机传感器影响以及暗环境红光亮度；静态截图、Skill/文档 lint、模拟器或单一 FPS 数字不能证明物理交互完成。"
          required_proof_surfaces:
            - runtime_behavior
        - key: approved-dependency-version-baseline
          statement: "  - Approved resolution (owner, 2026-07-20): 新项目锁定 2026-07-20 最新正式稳定的 Expo SDK 57 / React Native 0.86 / React 19.2.3 / Node.js 22 LTS（≥22.13），只用 New Architecture 和 Development Build；移动依赖先采用 SDK 57 官方矩阵（Reanimated 4.5.0、Worklets 0.10 系列、Gesture Handler 2.32 系列、Skia 2.6.2），其余通过 `expo install`、`expo-doctor`、双端原生构建和 lockfile 冻结精确版本。启用 Worklets bundle mode 并把官方已知的 Reanimated/Hermes 内存增长列为真机门；门失败则回退 SDK 56 兼容矩阵或关闭未达标复杂动画。安全/patch 每月评估，兼容 minor 每季度在 CI+双端回归后升级，Expo/RN/原生 SDK major、runtimeVersion、schema 或权限变化单独评审并重建二进制；OTA 只发布与既有 runtime 兼容的 JS/样式/资源。"
          required_proof_surfaces:
            - implementation_structure
        - key: approved-interaction-motion-token-baseline
          statement: "  - Approved resolution (owner, 2026-07-20): 建立 Starward 自有、按 press/drag/scrub/sheet/navigation 分族且允许 iOS/Android 原生差异的 token；初始 POC 候选为按下反馈 ≤80ms、普通按钮 scale 0.98/opacity 0.88（地图标记与危险操作不缩放）、释放 120ms、drag 激活 6dp、方向锁 8dp 且主轴位移比 ≥1.25、grab hitSlop 12dp、sheet 25%/55%/90% 三档候选、提交/成功/警告/错误才触觉且同语义 120ms 内节流。连续手势保持 1:1、可中断/反向并继承释放速度，越界只视觉阻尼且取消不提交；系统 back、地图 pan/pinch、Sheet pan/scroll 采用显式 simultaneous/exclusive 关系。Reduced Motion 使用系统设置，禁用视差/速度投影/弹簧，改为 ≤120ms 淡变或立即切换；POC 可在不改变这些语义的前提下调参并把最终值写入 design token，而不是复制 web/Apple 常数。"
          required_proof_surfaces:
            - runtime_behavior
        - key: approved-supported-os-device-matrix
          statement: "  - Approved resolution (owner, 2026-07-20): 安装下限跟随 SDK 57：iOS 16.4+、Android 7/API 24+、compile/target API 36；正式全功能测试档为 iOS 16.4+ 支持机型与 Android 10+、≥4GB RAM、≥64GB 存储，兼容降级档为 Android 7～9、3GB RAM，2GB RAM/32-bit 不承诺。无 GMS 设备必须完成核心查询、地图、离线和本地提醒，远端推送按国内厂商通道能力显示；缺磁力计/陀螺仪/气压计时隐藏对应能力并允许手动方向，AR 仅对通过 ARKit/ARCore 认证设备开放。低端档关闭 AR、高密 Skia/粒子、昂贵模糊和复杂物理转场并降低天空帧率/图层密度，但不得降级安全、来源、状态与可访问性。"
          required_proof_surfaces:
            - implementation_structure
        - key: approved-analytics-consent-policy
          statement: "  - Approved resolution (owner, 2026-07-20): 必要的崩溃/安全/服务健康遥测与可选产品分析分离，均数据最小化；产品分析在中国首发采用明示 opt-in、默认关闭、首方自建/自托管优先，拒绝不影响核心功能。禁止精确坐标/路线/联系人/受限地点进入事件，位置只在客户端转换为城市或约 20km 网格；用户标识为 30d 轮换的伪匿名 ID，原始事件 90d、聚合 13 个月。撤回后停止采集并在 30d 内删除可关联历史，未成年人不进入产品分析、A/B 或广告归因；任何第三方、跨境、精细归因或实验另走法务/同意门，样本不足明确不可判断。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-recovery-objectives
          statement: "  - Approved resolution (owner, 2026-07-20): 核心 PostgreSQL 真值（账号权限、行程/协作、地点审核、规则版本、provider/audit 元数据）目标 RPO ≤15min、RTO ≤2h；用户媒体和不可轻易重建对象 RPO ≤1h、RTO ≤8h；可从 immutable raw/官方源重建的派生瓦片/报告 RPO ≤24h、RTO ≤24h，Redis/本地缓存不备份且可清空重建。首发采用同一合规区域的加密 PITR+对象版本/生命周期，不默认昂贵跨云热备；每月抽样恢复、每季度完整隔离恢复演练，校验引用、权限、删除墓碑、受限坐标和实际 RPO/RTO。未通过演练的环境不得标 production-ready。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-production-slo-measurement
          statement: "  - Approved resolution (owner, 2026-07-20): 十项来源建议先作为 staging/launch gate，不在无流量基线时对外宣称 production SLA；上线后按 28 天滚动窗口、版本/平台/设备档/网络/冷热缓存分层测量，连续 30 天真实基线和足够样本经 owner 批准后才升为正式 SLO。保留 API ≥99.9%、缓存首页 P75 ≤1.2s、非缓存 NightReport P95 ≤3s、地点列表 P95 ≤1s、主流地图接近 60FPS、天空最低 30/目标 60FPS、崩溃会话率 <0.3%、离线包成功 ≥99%、推送重复 <0.1%、数据新鲜度 ≥99%；每项同时报告分母、样本数、测量起止、版本和排除项，样本不足显示不可判断。计划维护单列但不抹掉用户影响，availability 错误预算 0.1%；推送不把 provider accepted 当设备送达，路线超时成功只在明确降级结果可用时计入。"
          required_proof_surfaces:
            - runtime_behavior
