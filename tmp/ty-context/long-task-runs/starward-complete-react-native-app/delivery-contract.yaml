              criterion: |-
                - **AC spot-first-screen**
                  - Accepts: REQ spot-identity-and-freshness, REQ spot-tonight-comparison, CTRL spot-hero, CTRL evidence-section-nav
                  - Given: 地点静态资料可用但今晚报告正在刷新。
                  - When: 用户打开详情。
                  - Then: 地点身份、开放/风险和旧报告新鲜度先可见，动态骨架不把旧评分伪装为当前结论。
