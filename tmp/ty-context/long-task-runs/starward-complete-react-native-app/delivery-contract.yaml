    external_confirmations:
      - key: commercial-provider-rights-and-quotas
        description: |-
          - **EXT commercial-provider-rights-and-quotas**
            - Status: external_confirmation_required。
            - Result requiring confirmation: QWeather 常规/预警/AQI/GeoAPI、Open-Meteo 商业分层云/多模型、其他卫星云图/备用天气、高德原生地图/定位/搜索/路线/POI/双端离线、APNs/FCM/国内厂商/Expo 推送以及 OSS/COS/CDN 具备目标地区/渠道的生产商业使用、缓存/历史保留、派生、再展示/再分发、配额/加权计费单位、SLA、归属和退出/删除许可；最低必要 SKU 的当日报价、币种/税费/最低消费、超额/续费/退出成本和 12 个月 TCO 可与等价合格候选比较。
            - Why external: API 文档与技术可行不构成购买合同、配额或再分发授权，仓库无法证明。
            - Evidence needed: 生效合同/计划、许可条款版本、允许用途/地区/缓存/派生、quota/rate limit/SLA、归属要求、密钥环境、退出/删除义务、价格页面/正式报价/订单、税费/汇率日期、加权用量和实际账单；供应商宣传或免费页面不能代替合同与目标区 POC。
            - Affected REQ / AC: REQ weather-map-layers, REQ route-map-planning, REQ provider-source-registry, REQ qualified-lowest-tco-selection, REQ provider-failure-controls, AC source-pipelines, AC qualified-lowest-tco-provider-selection, DEC weather-provider-contracts, DEC provider-budget-and-paid-redundancy。
        owner: Product owner with procurement, finance and provider account owners
      - key: geospatial-catalog-content-licenses
        description: |-
          - **EXT geospatial-catalog-content-licenses**
            - Status: external_confirmation_required。
            - Result requiring confirmation: NSMC FY-4B/后续业务星或其他卫星云图、EOG Annual VNL v2.2、Copernicus DEM GLO-30/90（含 2026-07-28 后 CCM 访问/许可接受）、Gaia/其他星表、Astronomy Engine、CelesTrak OMM、JPL/NOAA 数据、地图底图/瓦片、NASA APOD/天文机构媒体及其 raw/COG/瓦片/动画/地平线/星表分块/离线包/截图的账号资格、自动化、许可、notice/credit、版本、修改标识和商业再分发范围适合目标地区/渠道；Himawari 等备用源不得越过 NMHS/研究/购买资格。
            - Why external: 数据集许可和在线服务规则会变化，派生/离线/商业分发权不能从本 Source Plan 推断。
            - Evidence needed: 官方许可/服务条款快照、来源与版本、商业/派生/缓存/离线/截图条款、必需 attribution、更新/撤下流程及法务确认。
            - Affected REQ / AC: REQ light-pollution-evidence, REQ astronomy-geo-pipelines, REQ educational-content, AC light-and-horizon, AC calendar-and-station, RISK dataset-license。
        owner: Product owner with legal counsel and data-governance owner
      - key: china-production-legal-readiness
        description: |-
          - **EXT china-production-legal-readiness**
            - Status: external_confirmation_required。
            - Result requiring confirmation: 面向中国用户生产发布所需 ICP/应用备案（如适用）、地图与测绘边界、个人信息/敏感行踪单独同意、数据跨境/境内存储、CDN/对象存储、第三方 SDK 清单、隐私政策/条款/注销、未成年人/社群与地点安全责任边界均完成专业审查和实际配置。
            - Why external: 法律适用、主体资质、云区域、SDK/商店申报和政策文本依赖运营主体与最终供应商，不能由产品/代码自证。
            - Evidence needed: 法律/合规评审记录、备案/许可编号或不适用依据、数据流/SDK 清单、同意与保留表、跨境评估、政策版本和生产域/存储/CDN配置核验。
            - Affected REQ / AC: REQ china-production-compliance, REQ location-privacy-controls, REQ data-export, REQ account-deletion, AC china-compliance-readiness, DEC data-retention-deletion, DEC analytics-consent-policy。
        owner: Operating entity with qualified China legal and compliance counsel
      - key: app-store-native-capability-readiness
        description: |-
          - **EXT app-store-native-capability-readiness**
            - Status: external_confirmation_required。
            - Result requiring confirmation: iOS/Android 目标商店和国内安卓渠道接受地图 SDK、自定义原生模块、前台/限时后台定位、通知、相机/相册、AR、传感器和 OAuth/微信登录的声明、用途与审核材料，并在目标真机/系统版本可用。
            - Why external: 商店政策、设备支持、证书/entitlement、厂商推送和 OAuth 审核是外部控制面，模拟器与源码无法证明。
            - Evidence needed: 支持设备/OS矩阵、权限用途文案、entitlement/证书/隐私清单、后台位置核心用途材料、厂商通道和 OAuth 审批、iOS back gesture/Android predictive back 与自定义手势兼容、internal/staging 真机安装及商店审核结果。
            - Affected REQ / AC: REQ permission-minimization, REQ optional-ar, REQ safety-session, REQ event-driven-evaluation, REQ auth-methods, AC ar-degradation, AC bounded-safety-session, AC long-term-controls, DEC supported-os-device-matrix。
        owner: Mobile release owner with Apple, Google and domestic Android channel accounts
      - key: outdoor-device-field-validation
        description: |-
          - **EXT outdoor-device-field-validation**
            - Status: external_confirmation_required。
            - Result requiring confirmation: 代表性 iOS/Android 真机在真实山区/郊外、车辆/金属干扰、弱网/无网、冬夏温度、夜间低亮/红光、低电、前后台、最后一公里和长时天空条件下达到可用/降级/恢复行为；交互同时覆盖 press/cancel、地图/Sheet/滚动/back 仲裁、中断/反向/速度接缝、VoiceOver/TalkBack、文本放大、reduced motion、触觉关闭/不可用和红光无闪。
            - Why external: GPS、磁场、AR、亮度、电量、网络和道路/天气现场真实性无法由自动测试或室内设备完全模拟。
            - Evidence needed: 场地/日期/天气、设备/OS/传感器矩阵、已知方位/路线基准、断网/恢复步骤、截图/日志/误差/电量结果、失败与复测记录；样本不能冒充全设备总体。
            - Affected REQ / AC: REQ orientation-guidance, REQ outdoor-validation, REQ performance-slos, AC low-accuracy-guidance, AC offline-field-use, AC test-coverage, RISK sensor-observability。
        owner: Field-test owner with representative device and site access
      - key: astronomy-authoritative-validation
        description: |-
          - **EXT astronomy-authoritative-validation**
            - Status: external_confirmation_required。
            - Result requiring confirmation: 日月/行星/银河/晨昏/升中落/坐标转换和空间站结果在已声明适用范围、时标、海拔和容差内与 JPL Horizons 或另一个经确认权威基准一致。
            - Why external: 自有算法测试能证明一致性，不能自行定义“权威正确”或可接受科学容差。
            - Evidence needed: 基准来源/版本、黄金地点/时刻、容差理由、对比结果、例外（极区/折射/轨道过期）和天文领域审阅。
            - Affected REQ / AC: REQ astronomy-domain, REQ astronomy-golden-tests, REQ station-transits, AC astronomy-provenance, AC test-coverage, DEC observation-window-resolution。
        owner: Astronomy domain reviewer
      - key: photography-device-expert-validation
        description: |-
          - **EXT photography-device-expert-validation**
            - Status: external_confirmation_required。
            - Result requiring confirmation: 手机/相机/镜头预设、确定性曝光/拖线/堆栈/视场规则在代表性设备和目标上合理、安全、可操作，AI 解释未改变核心规则或制造虚假保证。
            - Why external: 规则单测不能证明真实设备可设置、成像取舍或用户经验分层合理。
            - Evidence needed: 设备/镜头/目标/条件样本、规则版本、专家审阅、实拍设置与结果、不可控因素、偏差/修改记录和 AI/规则差异审计。
            - Affected REQ / AC: REQ mobile-output, REQ camera-output, REQ deterministic-first-ai, AC mobile-plan, AC camera-plan-and-risk, RISK parameter-observability。
        owner: Astrophotography domain reviewer with representative devices
      - key: site-access-safety-verification
        description: |-
          - **EXT site-access-safety-verification**
            - Status: external_confirmation_required。
            - Result requiring confirmation: 首批/MVP 地点的坐标、土地/开放/收费/门禁、停车/徒步/最后一公里、设施、光源/遮挡、潮汐/山路/治安/生态风险和坐标公开级别有可追溯的人工/现场核验。
            - Why external: 公开 POI、遥感与用户单条上传不能证明夜间通行、安全、私人土地许可或设施开放。
            - Evidence needed: 地点级核验记录、日期/来源/证据、权利人或官方信息（适用时）、现场路线/照片/精度、季节性/过期计划和高风险复核。
            - Affected REQ / AC: REQ last-mile-access, REQ facilities-and-emergency, REQ spot-safety, REQ coordinate-visibility, AC last-mile-and-facilities, AC safety-overrides-score, RISK field-truth-observability。
        owner: Site operations and safety owner with local verification evidence
outcomes:
  - key: mobile-shell-and-preferences
    title: 原生 APP 壳、初次使用与偏好
    depends_on: []
    product:
      observable_result: 用户可在 iOS/Android Development Build 中进入同一业务 APP，先以游客完成基础查询，在需要时授权定位/通知等能力，保存一个或多个推荐偏好预设，并稳定访问“今晚、观星地图、行程、天空、我的”五个一级入口。
      owner:
        label: mobile-shell-and-preferences owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/**
          - packages/ui-system/**
          - packages/domain/src/preferences/**
          - packages/contracts/**
      requirements:
        - key: react-native-app
          statement: "- **REQ react-native-app** [direct: S-USER, S-ARCH]：最终交付是 Expo + React Native + TypeScript 双端 APP，一套业务代码；高德地图、AR、高频传感器、亮度等特殊能力允许平台专属实现和自定义 Expo Native Module。"
          required_proof_surfaces:
            - implementation_structure
        - key: five-primary-destinations
          statement: "- **REQ five-primary-destinations** [direct: S-PRODUCT 五]：全局一级入口固定为“今晚、观星地图、行程、天空、我的”；装备属于“我的/摄影/行程”内容，不因参考图而替换一级 IA。"
          required_proof_surfaces:
            - ui_browser
        - key: guest-basic-query
          statement: "- **REQ guest-basic-query** [direct: S-ARCH 15.2]：不登录也可使用基础查询；受保护写入或协作能力的登录边界由 DEC guest-auth-capability-matrix 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: permission-minimization
          statement: "- **REQ permission-minimization** [direct: S-ARCH 3.5, 15.2]：默认只请求前台定位；精确定位、通知、相机/相册、限时后台定位只在用户发起相应功能时逐项说明并请求；后台定位仅在用户明确开启现场行程后运行并自动停止。"
          required_proof_surfaces:
            - ui_browser
        - key: onboarding-basic-and-user-types
          statement: "- **REQ onboarding-basic-and-user-types** [direct: S-PRODUCT 6.1]：首次引导可填写/确认当前定位、常用出发地、所在城市、是否愿意在需要时开启持续定位、是否愿意接收天气/天象提醒，并可多选新手观星、星空摄影、目视观测、露营观星、亲子观星；意愿开关不等同提前取得系统权限。"
          required_proof_surfaces:
            - ui_browser
        - key: travel-and-facility-preferences
          statement: "- **REQ travel-and-facility-preferences** [direct: S-PRODUCT 6.1]：出行字段完整覆盖自驾/骑行/公共交通/步行、最大单程时间/驾车距离/徒步距离、必须直达、山路/非铺装路/夜间徒步、露营/过夜接受度；设施硬要求完整覆盖停车、厕所、手机信号、平整平台、允许露营、便利店/补给/饮用水，以及“需要安全照明但观测区不得有明显光源”的双重条件。"
          required_proof_surfaces:
            - ui_browser
        - key: target-and-equipment-preferences
          statement: "- **REQ target-and-equipment-preferences** [direct: S-PRODUCT 6.1]：观测目标完整覆盖普通星空、银河、月亮、行星、流星雨、彗星、国际/中国空间站、深空目标、日出/日落与星空联合摄影；设备完整覆盖裸眼、双筒、天文望远镜、手机、相机、镜头焦段、三脚架、赤道仪和滤镜。"
          required_proof_surfaces:
            - ui_browser
        - key: preference-profiles
          statement: "- **REQ preference-profiles** [direct: S-PRODUCT 6.1, S-ARCH 5.2]：用户可将上述基础/类型/出行/设施/目标/设备字段和常用出发地保存为多套命名预设，并明确哪些是硬阻断、排序偏好或未限制。"
          required_proof_surfaces:
            - ui_browser
        - key: profile-examples
          statement: "- **REQ profile-examples** [direct: S-PRODUCT 6.1]：产品支持“带家人轻松观星、银河摄影、大型望远镜目视、两小时内临时出发”等语义明确的预设，但示例不得偷偷成为未确认默认值。"
          required_proof_surfaces:
            - ui_browser
        - key: global-state-language
          statement: "- **REQ global-state-language** [derived from S-CONTEXT and S-ARCH 9.4]：所有数据页面可区分 loading、empty、no-results、stale/degraded、partial、error、success；同时显示影响判断的数据更新时间、来源/缓存/缺失和恢复动作。"
          required_proof_surfaces:
            - runtime_behavior
        - key: mobile-accessibility
          statement: "- **REQ mobile-accessibility** [direct + derived: S-DESIGN, S-CONTEXT]：以 390 × 844 为主视口，兼容安全区和文本放大；重要触控目标不小于 44px；选择不只依赖颜色；图标按钮有可访问名称；支持 reduced motion、屏幕阅读器顺序和明确焦点。"
          required_proof_surfaces:
            - runtime_behavior
        - key: primary-tab-bar-user-task
          statement: "  - User task: 在今晚、地图、行程、天空、我的之间切换。"
          required_proof_surfaces:
            - ui_browser
        - key: permission-step-user-task
          statement: "  - User task: 理解权限用途并选择允许、暂不允许或手动替代。"
          required_proof_surfaces:
            - ui_browser
        - key: preference-wizard-user-task
          statement: "  - User task: 配置用户类型、交通/距离/徒步、设施硬条件、观测目标和设备。"
          required_proof_surfaces:
            - ui_browser
        - key: profile-switcher-user-task
          statement: "  - User task: 切换当前推荐画像。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-localization-scope
          statement: "  - Approved resolution (owner, 2026-07-20): 首发只承诺中国大陆简体中文，默认 24 小时制、公制、摄氏度、米/公里、m/s、hPa 与角度；内部统一 UTC/ISO 8601、IANA 时区、WGS84 和标准单位，UI 总显示地点本地日期/时区并正确处理跨午夜观星夜。首日即使用可本地化 message key、复数/数字/日期格式和天文术语表，VoiceOver/TalkBack 文案不用符号替代读法；繁中、英语、英制和 12 小时制进入后续语言包，不计入首发完成声明。"
          required_proof_surfaces:
            - runtime_behavior
        - key: approved-guest-auth-capability-matrix
          statement: "  - Approved resolution (owner, 2026-07-20): 游客可完成基础查询、手动地点/时间、偏好预览、本地收藏、本地单人行程、本地离线包和仅设备内提醒；上传地点/实况/媒体、评论/评价、公开分享、跨设备同步、远端通知、协作与账号数据导出/注销必须登录。游客写入只保存在本地稳定 UUID，不形成匿名公开贡献；登录时逐类预览并幂等合并，服务器同 ID/同 revision 优先、冲突保留双副本供选择，取消登录不删除游客数据，退出账号可选择保留为设备本地副本。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-preference-profile-defaults
          statement: "  - Approved resolution (owner, 2026-07-20): 所有距离、时间、徒步、路况、露营、设施、目标和设备字段初始为 unknown/未选择，不把示例值静默变成硬条件；跳过后使用“中性基础模式”，只执行经批准的安全/关闭/法律硬阻断，其他因素等权或低置信排序并明确提示补全偏好。新手/亲子/摄影/目视预设仅在用户主动选择后展开全部具体值和硬/软含义，保存前可逐项修改并显示会排除多少候选；设备未知时不给特定镜头/望远镜结论。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - iOS/Android APP shell
        - onboarding and preferences
        - five-tab navigation
      controls:
        - key: primary-tab-bar
          location: "  - Location: 每个一级页面底部安全区内；沉浸式地图/天空可收缩但必须有可预测返回。"
          trigger: "  - Trigger: 点击一个标签；深链可直接激活目标标签。"
          input: "  - Input: 五个固定目标和当前激活目标。"
          loading_state: "  - Loading: 目标页显示稳定骨架，底栏保持尺寸和选中状态。"
          empty_state: "  - Empty: 不适用；入口本身始终存在。"
          success_state: "  - Success: 切换目标并保留各标签必要的导航状态。"
          failure_state: "  - Failure: 深链无效时返回对应入口并展示可恢复错误。"
          feedback: "  - Feedback: 图标+文字、选中形状/字重/颜色多重提示、可访问选中状态。"
        - key: permission-step
          location: "  - Location: 首次引导的独立步骤；以后在触发相关功能时按需出现。"
          trigger: "  - Trigger: 首次需要前台定位/通知/相机，或用户主动开启现场后台定位。"
          input: "  - Input: 权限类型、用途说明、数据使用边界、系统当前状态。"
          loading_state: "  - Loading: 请求系统权限时禁用重复提交并显示系统处理中状态。"
          empty_state: "  - Empty: 设备不支持该能力时显示降级路径。"
          success_state: "  - Success: 显示已授权范围并继续原任务。"
          failure_state: "  - Failure: 拒绝/受限时不责备用户，提供手动输入或设置页入口；永久拒绝不反复弹窗。"
          feedback: "  - Feedback: 明确“现在为何需要、是否持续、如何关闭”，后台定位另行强调自动停止。"
        - key: preference-wizard
          location: "  - Location: 首次引导和“我的 → 偏好预设 → 新建/编辑”。"
          trigger: "  - Trigger: 首次设置、新建预设或编辑现有预设。"
          input: "  - Input: REQ onboarding-basic-and-user-types、REQ travel-and-facility-preferences、REQ target-and-equipment-preferences 的全部字段，带单位阈值、硬条件/偏好语义和命名文本。"
          loading_state: "  - Loading: 保存时保持输入、禁用重复保存并显示进度。"
          empty_state: "  - Empty: 未选择可选项时显示“未限制”，硬要求区不得用隐含默认。"
          success_state: "  - Success: 保存预设并显示将影响推荐的摘要；可设为当前预设。"
          failure_state: "  - Failure: 字段级校验保留用户输入；服务失败允许本地草稿和重试。"
          feedback: "  - Feedback: 单位、范围、风险影响和“硬性阻断/排序偏好”差异靠近控件显示。"
        - key: profile-switcher
          location: "  - Location: 今晚首页位置/日期附近及“我的 → 偏好预设”。"
          trigger: "  - Trigger: 点击当前预设名称。"
          input: "  - Input: 已保存预设列表与新建入口。"
          loading_state: "  - Loading: 切换后 NightReport 重算；旧结果保持但标 stale。"
          empty_state: "  - Empty: 无预设时引导创建，允许继续使用无偏好基础模式。"
          success_state: "  - Success: 当前预设更新，相关结果刷新并说明变化。"
          failure_state: "  - Failure: 保留原预设和结果，提供重试。"
          feedback: "  - Feedback: 显示预设关键限制摘要，不只显示名称。"
      non_completing_outcomes:
        - key: web-shell-only
          statement: "- **NCOMP web-shell-only** [direct: S-USER, S-PRODUCT 十二]：只有 PWA、网页壳、Expo Go 演示或单平台页面，不算 React Native APP Outcome 完成。"
    technical:
      obligations:
        - key: mobile-client-stack
          statement: "- **OBL mobile-client-stack** [direct: S-ARCH 3.1]：移动端采用 Expo Router、TanStack Query、Zustand、React Hook Form + Zod、Reanimated、Gesture Handler、Expo SQLite/FileSystem/SecureStore/Location/Sensors/Notifications；实际版本由 DEC dependency-version-baseline 决定。"
          required_proof_surfaces:
            - implementation_structure
            - security_boundary
        - key: mobile-layering
          statement: "- **OBL mobile-layering** [direct: S-ARCH 3.1–3.2]：Screen 只组合路由/生命周期；Feature 表达今晚/地图/地点/预报/天空/行程/现场/摄影/社区/我的；Domain 表达天气/天文/地理/推荐/同步；Data 负责 API/本地库/缓存；Native 隔离地图/方向/AR/亮度；UI System 和 Telemetry 横切。"
          required_proof_surfaces:
            - implementation_structure
        - key: native-new-architecture
          statement: "- **OBL native-new-architecture** [direct: S-ARCH 1.2]：以 React Native 新架构的 Fabric/TurboModules 作为 Swift/Objective-C/Kotlin/Java/C++ 原生模块与原生视图扩展基线；“一套业务代码”不要求地图、AR、传感器等底层实现强行相同。"
          required_proof_surfaces:
            - implementation_structure
      expected_change_paths:
        - apps/mobile/**
        - packages/ui-system/**
        - packages/domain/src/preferences/**
        - packages/contracts/**
      forbidden_paths:
        - node_modules/**
        - .git/**
        - docs/design-system/source/**
      forbidden_shortcuts: []
      bindings:
        - key: outcome-carrier
