          statement: "- **REQ analytics-funnel-events** [direct: S-PRODUCT 十三]：MVP 漏斗为打开 → 定位 → 今晚结论 → 推荐地点 → 地点详情 → 加入计划 → 导航 → 实况；事件至少覆盖定位成功/失败、改日期、选目标、出行偏好、查看评分、展开专业数据、切模型/图层、筛选、点推荐、看实景/天空、设主/备、创建行程、调整路线、外部导航、摄影参数、上传地点/实况、评论和行程完成，事件 schema/同意遵守隐私边界。"
          required_proof_surfaces:
