  - key: field-offline-safety
    title: 现场、离线与安全闭环
    depends_on:
      - itinerary-and-collaboration
      - sky-orientation-ar
      - shooting-assistant
    product:
      observable_result: 用户出发前可下载并验证完整观测数据包；到达低光、弱网或断网现场后，仍能以夜间/红光界面核对地点/时间/最佳窗口、方向、目标、缓存天气、拍摄和清单，查看离线地图、返回停车点、切换备选、记录实况与图片；用户主动开启的限时安全模式能显示返程和警告、可选择分享位置，并在结束/超时后停止后台定位。
      owner:
        label: field-offline-safety owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/field/**
          - apps/mobile/src/data/offline/**
          - apps/api/src/modules/safety/**
          - packages/domain/src/offline/**
      requirements:
        - key: field-core-status
          statement: "- **REQ field-core-status** [direct: S-PRODUCT 6.10]：现场首屏显示当前观星点、当前时间、当前方向、距最佳窗口、目标方向/高度、实时或缓存云量/降雨、风、月亮位置和返程建议时间，每项标识实时/缓存/过期/不可用。"
          required_proof_surfaces:
            - ui_browser
        - key: field-toolkit
          statement: "- **REQ field-toolkit** [direct: S-PRODUCT 6.10]：现场入口覆盖 360°星图、指南针、红光模式、拍摄参数、装备清单、离线地图、返回停车位置、上传实况和切换备选地点，核心动作单手可达且不依赖网络完成打开。"
          required_proof_surfaces:
            - ui_browser
        - key: night-red-mode
          statement: "- **REQ night-red-mode** [direct: S-PRODUCT 6.10, S-DESIGN]：支持低亮夜间与红光模式；红光不是简单滤镜，需降低发光面积/动效、避免纯白闪屏、保持危险/选择/禁用差异和屏幕阅读器语义，系统键盘/媒体/地图等无法完全变红的边界要预先提示。"
          required_proof_surfaces:
            - ui_browser
        - key: complete-observation-pack
          statement: "- **REQ complete-observation-pack** [direct: S-ARCH 3.4]：离线包包含地点基本信息、按策略授权的精确坐标/停车点、路线几何/最后步行、未来天气快照、日月/银河窗口、天体方位、光污染/地平线、摄影参数、装备清单、指定范围地图瓦片、主备地点和紧急联系人，并记录大小、范围、各数据版本/过期时间和校验状态。"
          required_proof_surfaces:
            - ui_browser
        - key: offline-capabilities
          statement: "- **REQ offline-capabilities** [direct: S-ARCH 3.4]：断网可查看地图、找回停车点、查看银河/月亮/行星方向、缓存天气、使用指南针、记录实况、切换备选和暂存图片；任何需要最新网络或外部应用的动作明确不可用/降级。"
          required_proof_surfaces:
            - ui_browser
        - key: parking-and-backup
          statement: "- **REQ parking-and-backup** [direct: S-PRODUCT 6.10]：用户可保存/确认停车位置与精度、离线查看方位/距离/步行路线；切换备选必须比较当前地点到备选的路线快照、窗口、风险和缓存新鲜度，并保留撤回/原计划。"
          required_proof_surfaces:
            - ui_browser
        - key: safety-session
          statement: "- **REQ safety-session** [direct: S-PRODUCT 6.10, S-ARCH 3.5]：安全功能包含预计返程、行程联系人、长时间未返回提醒、极端天气、夜间山路和潮汐提醒；后台定位只在用户明确开启现场行程后限时运行、显著显示、可随时结束并自动停止，具体时限/未返回升级由 DEC background-safety-policy 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: location-sharing-consent
          statement: "- **REQ location-sharing-consent** [direct: S-PRODUCT 6.10, S-ARCH 15]：一键分享当前位置必须由用户明确选择联系人/应用、预览精度/有效期/附带行程信息并确认；离线或发送失败不得显示已送达，分享策略不能绕过地点坐标访问级别。"
          required_proof_surfaces:
            - ui_browser
        - key: offline-write-sync
          statement: "- **REQ offline-write-sync** [direct: S-ARCH 3.3～3.4]：现场实况、图片、清单、停车和计划变更先写本地事务/队列，带本地 ID、幂等键、revision、创建时间和重试状态；联网后按依赖顺序同步，冲突/审核/失败可见，不重复发布。"
          required_proof_surfaces:
            - ui_browser
        - key: local-storage-boundaries
          statement: "- **REQ local-storage-boundaries** [direct: S-ARCH 3.3]：SQLite 保存偏好/设备、地点摘要、收藏、行程、天气快照、天文窗口、路线、现场包、待上传内容、同步游标和版本/过期；FileSystem 保存媒体/瓦片等文件，SecureStore 保存小型令牌；敏感离线数据的加密/保留由 DEC offline-pack-policy 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: offline-pack-manager-user-task
          statement: "  - User task: 下载、更新、校验或删除一份行程观测包。"
          required_proof_surfaces:
            - ui_browser
        - key: field-dashboard-user-task
          statement: "  - User task: 低光下一眼确认当前状态、下一窗口、方向和返程。"
          required_proof_surfaces:
            - ui_browser
        - key: night-red-mode-toggle-user-task
          statement: "  - User task: 在夜间/红光/系统模式间切换并减少暗适应破坏。"
          required_proof_surfaces:
            - ui_browser
        - key: field-tool-grid-user-task
          statement: "  - User task: 打开星图、指南针、参数、清单、地图、停车、实况或备选。"
          required_proof_surfaces:
            - ui_browser
        - key: return-to-parking-user-task
          statement: "  - User task: 弱网/断网时找到已确认停车位置。"
          required_proof_surfaces:
            - ui_browser
        - key: backup-switcher-user-task
          statement: "  - User task: 条件恶化或主地点失效时换到更可行地点。"
          required_proof_surfaces:
            - ui_browser
        - key: safety-session-panel-user-task
          statement: "  - User task: 设置返程、联系人、提醒和限时后台定位。"
          required_proof_surfaces:
            - ui_browser
        - key: location-share-action-user-task
          statement: "  - User task: 主动把当前位置/行程摘要分享给指定对象。"
          required_proof_surfaces:
            - ui_browser
        - key: offline-sync-queue-user-task
          statement: "  - User task: 查看待上传实况/图片/更改并处理失败。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-background-safety-policy
          statement: "  - Approved resolution (owner, 2026-07-20): 首版采用本地计时+可选限时后台位置，不做自动报警、联系人外发或升级；用户主动创建会话并逐次选择分享对象/通道，默认 4h、最大 12h，在计划结束后 30min 自动停止并提示确认安全。前台导航可高精度，后台采用平衡精度且约 5min 或 250m 变化采样、低电/系统限制时自动降频并显示；系统杀进程、离线或权限撤回不能伪装为持续跟踪。未返回先设备本地提醒两次，外发只能由用户主动操作并显示发送/receipt/失败/未知，APP 明确不提供救援或必达保证；会话结束后按保留策略删除精确轨迹。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - field mode
        - offline pack manager
        - bounded safety session
      controls:
        - key: offline-pack-manager
          location: "  - Location: 行程详情、现场入口和“我的 → 离线数据”。"
          trigger: "  - Trigger: 点击下载/更新/管理，或动态数据过期提醒。"
          input: "  - Input: REQ complete-observation-pack 全部内容、地图范围、文件大小、权限、设备空间。"
          loading_state: "  - Loading: 分组件进度、剩余大小/可暂停；离开页面后任务可查看。"
          empty_state: "  - Empty: 无行程/无授权坐标时解释并提供创建/申请；空间不足列可裁剪项。"
          success_state: "  - Success: 校验完整性后显示“可离线”、版本/过期和最后更新。"
          failure_state: "  - Failure: 保留可用旧包，列出失败组件并可续传，不把部分包标完整。"
          feedback: "  - Feedback: 删除前显示影响且可重下；过期天气与仍有效静态地图分开。"
        - key: field-dashboard
          location: "  - Location: 现场模式首屏。"
          trigger: "  - Trigger: 从行程/地点进入现场或恢复安全会话。"
          input: "  - Input: REQ field-core-status、当前主备、安全会话和离线状态。"
          loading_state: "  - Loading: 本地包立即呈现，网络更新只替换带来源字段。"
          empty_state: "  - Empty: 无包时提供受限在线/手动模式并明确缺少哪些安全数据。"
          success_state: "  - Success: 结论、窗口倒计时、目标方向、天气/月亮和返程动作单屏可用。"
          failure_state: "  - Failure: 缓存继续可用且标时间，关键缺口提升为风险而非白屏。"
          feedback: "  - Feedback: 顶部持续显示地点、在线/离线、定位精度、模式和安全会话状态。"
        - key: night-red-mode-toggle
          location: "  - Location: 现场顶部快捷控制及全局显示设置。"
          trigger: "  - Trigger: 点击模式、进入现场时显示模式建议或系统外观变化。"
          input: "  - Input: 模式偏好、屏幕亮度能力、reduced motion 和平台限制。"
          loading_state: "  - Loading: 不适用；主题原子切换，避免中间白帧。"
          empty_state: "  - Empty: 设备无法控制系统亮度时说明仅应用内生效。"
          success_state: "  - Success: 所有自有页面/地图覆盖/图表切换且语义/对比保留。"
          failure_state: "  - Failure: 回到最后稳定主题，不产生高亮闪屏。"
          feedback: "  - Feedback: 当前模式和不可控制的系统 UI 边界可见，退出现场不强制丢偏好。"
        - key: field-tool-grid
          location: "  - Location: 现场首屏状态下方的快捷区。"
          trigger: "  - Trigger: 点击一个工具。"
          input: "  - Input: 工具可用性、离线包组件、权限和当前上下文。"
          loading_state: "  - Loading: 打开目标工具时当前现场状态保留。"
          empty_state: "  - Empty: 缺组件/权限的工具 disabled 并给下载/授权/替代路径。"
          success_state: "  - Success: 深链携带同一地点/时间/目标/方案，返回现场状态不丢。"
          failure_state: "  - Failure: 显示局部错误并返回工具网格，不退出安全会话。"
          feedback: "  - Feedback: 工具是否离线可用、是否会请求权限或离开 APP 预先标识。"
        - key: return-to-parking
          location: "  - Location: 现场主工具和安全区。"
          trigger: "  - Trigger: 保存停车点、点击返回停车或选择更新位置。"
          input: "  - Input: 停车 WGS84 坐标、精度/时间、当前前台位置、缓存步行几何、指南针姿态。"
          loading_state: "  - Loading: 定位更新时仍显示最后已知距离/方向和时间。"
          empty_state: "  - Empty: 未保存停车点时提供明确保存流程；定位不可用时显示地图静态关系。"
          success_state: "  - Success: 方位、距离、缓存路线/直线语义和目标精度清楚，可交外部导航。"
          failure_state: "  - Failure: 不显示虚假实时箭头，回退静态地图/坐标并提示定位状态。"
          feedback: "  - Feedback: “停车点”和“观星点”始终区分；保存/覆盖有确认和撤销提示。"
        - key: backup-switcher
          location: "  - Location: 现场状态/警告内的“切换备选”。"
          trigger: "  - Trigger: 用户点击、极端天气/关闭提醒或主地点阻断。"
          input: "  - Input: 主备条件、路线快照、窗口、风险、缓存时间和坐标权限。"
          loading_state: "  - Loading: 比较卡保持，能联网则刷新受影响项。"
          empty_state: "  - Empty: 无备选时提供安全返程/地图缓存，不临时推荐未经验证点。"
          success_state: "  - Success: 用户确认后当前上下文、路线、返程和安全会话更新并保留原计划。"
          failure_state: "  - Failure: 维持原地点并明确失败，不静默部分切换。"
          feedback: "  - Feedback: 切换前显示为何、是否赶得上、路线是否缓存及撤回路径。"
        - key: safety-session-panel
          location: "  - Location: 现场安全区和持续状态条。"
          trigger: "  - Trigger: 点击开启现场行程/编辑/结束，或到提醒阈值。"
          input: "  - Input: 预计返程、自动停止、联系人、位置精度/频率、天气/山路/潮汐风险。"
          loading_state: "  - Loading: 启动系统服务时显示逐项权限/注册状态。"
          empty_state: "  - Empty: 无联系人时仍允许本地返程提醒，但明确不能外发；后台权限拒绝提供前台计时。"
          success_state: "  - Success: 开启范围、停止时间和当前后台状态持续可见，结束后服务停止并确认。"
          failure_state: "  - Failure: 不宣称保护已开启；提供本地提醒/手动分享替代和设置入口。"
          feedback: "  - Feedback: 每个外发/后台行为的接收者、频率、有效期和关闭动作明确。"
        - key: location-share-action
          location: "  - Location: 现场安全区。"
          trigger: "  - Trigger: 点击“一键分享当前地点”。"
          input: "  - Input: 当前/最后位置、精度/时间、地点访问策略、联系人/应用、有效期和附带字段。"
          loading_state: "  - Loading: 获取位置和生成载荷时可取消、防重复。"
          empty_state: "  - Empty: 无位置/应用/联系人时提供复制允许字段或稍后重试。"
          success_state: "  - Success: 用户预览确认后打开目标通道，并只在收到系统结果时描述为已发起/已送达（若可证）。"
          failure_state: "  - Failure: 明确未发送或状态未知，载荷可重试但不自动外发。"
          feedback: "  - Feedback: 发送前显示精度、时间、接收者和撤销/过期边界。"
        - key: offline-sync-queue
          location: "  - Location: 现场状态、贡献提交结果和“我的 → 同步”。"
          trigger: "  - Trigger: 本地写入、网络恢复、点击重试/取消。"
          input: "  - Input: 队列项、依赖、幂等键、revision、重试/审核状态。"
          loading_state: "  - Loading: 每项显示上传/处理阶段，批量同步可后台继续。"
          empty_state: "  - Empty: 显示“全部已同步”和最后成功时间，而非隐藏状态。"
          success_state: "  - Success: 本地 ID 映射服务端 ID、状态发布/待审核清楚且不重复。"
          failure_state: "  - Failure: 项目级原因/重试/导出草稿可用，其他项继续同步。"
          feedback: "  - Feedback: 断网、排队、上传、处理中、待审核、已发布、冲突、失败状态完整。"
      non_completing_outcomes:
        - key: cached-shell-only
          statement: "- **NCOMP cached-shell-only** [direct: S-ARCH 3.4]：只缓存页面壳或文本、断网不能地图/停车/天体方向/实况/备选，不能算现场离线完成。"
    technical:
      obligations:
        - key: offline-storage-stack
          statement: "- **OBL offline-storage-stack** [direct: S-ARCH 3.3]：结构化缓存/队列使用 Expo SQLite（按需要启用 WAL/FTS/SQLCipher），大文件与地图用 Expo FileSystem，小型令牌用由 Android Keystore/iOS Keychain 支撑的 Expo SecureStore；包 manifest/哈希、事务迁移、空间回收和敏感字段边界可验证。"
          required_proof_surfaces:
            - data_state
            - implementation_structure
            - security_boundary
            - ui_browser
        - key: bounded-background-location
          statement: "- **OBL bounded-background-location** [direct: S-ARCH 3.5]：单次、前台持续、限时后台定位是显式三种状态；后台能力要求 Development Build/平台配置，只能由安全会话启动并受自动停止、系统限制、显著说明和审计约束。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-offline-pack-policy
          statement: "  - Approved resolution (owner, 2026-07-20): 离线包由行程建议但必须用户确认，默认仅 Wi‑Fi，蜂窝需逐次允许；下载前展示组件/许可/版本/动态过期/体积/剩余空间，500MB 提醒、单包 2GB 硬上限、全局 4GB 默认上限、最多 2 个并发且至少保留 `max(1GB, 10%设备空间)`。必需组件为 manifest、地点/坐标权限、合法路线 snapshot、精简天气/天文、规则与关键文本；VIIRS/DEM/地平线/星表/媒体/获许可底图按能力可选。每对象 hash、断点、临时区、全包校验后原子激活、上一版回滚；静态资产按版本，动态数据到期仍可读但显著 stale 且安全/预警不得离线冒充当前。受限坐标/联系人/安全会话设备加密并最短保留，登出、成员撤权、链接失效和许可终止触发密钥撤销/清理；没有地图离线许可就不抓底图。"
          required_proof_surfaces:
            - ui_browser
      expected_change_paths:
        - apps/mobile/src/features/field/**
        - apps/mobile/src/data/offline/**
        - apps/api/src/modules/safety/**
        - packages/domain/src/offline/**
      forbidden_paths:
        - node_modules/**
        - .git/**
        - docs/design-system/source/**
      forbidden_shortcuts: []
      bindings:
        - key: outcome-carrier
          kind: file
          target: apps/mobile/src/features/field/index.ts
          carrier_paths:
            - apps/mobile/src/features/field/index.ts
          existence: planned
      rollback_and_recovery:
        rollback: Stop writes for field-offline-safety, restore the last compatible version or immutable source pointer, and preserve every user/external record created before the rollback boundary.
        recovery: Replay idempotent work for field-offline-safety, reconcile revisions and provider/source versions, expose unresolved conflicts, and rerun the named verification check before reopening writes.
        verification_check_keys:
          - data-boundary
    acceptance:
      checks:
        - key: ui-acceptance
          proof_surface: ui_browser
          runner:
            type: playwright_test
            target: ui/starward.spec.mjs
            argv:
              - --config
              - playwright.config.mjs
              - --grep
              - \[outcome:field-offline-safety\]
            cwd: tests/acceptance
            effect: test_sandbox
            timeout_ms: 120000
          verification_inputs:
            - tests/acceptance/ui/starward.spec.mjs
            - tests/acceptance/ui/support.mjs
            - tests/acceptance/ui/contracts.mjs
            - tests/acceptance/ui/engine.mjs
            - tests/acceptance/ui/drivers/field-offline-safety.mjs
            - tests/acceptance/specs/field-offline-safety.json
            - tests/acceptance/playwright.config.mjs
            - tests/acceptance/package.json
            - tests/acceptance/package-lock.json
            - tests/acceptance/start-mobile-web.mjs
          input_paths:
            - apps/mobile/src/features/field/index.ts
            - apps/mobile/**
          expected_output_paths:
            - apps/mobile/src/features/field/index.ts
          positive_assertions:
            - key: pack-integrity
              criterion: |-
                - **AC pack-integrity**
                  - Accepts: REQ complete-observation-pack, REQ local-storage-boundaries, CTRL offline-pack-manager, OBL offline-storage-stack
                  - Given: 行程含主备、停车/步行、地图、天气/天文、摄影、清单和联系人且设备空间足够。
                  - When: 用户下载并校验观测包。
                  - Then: 每个组件版本/大小/过期/哈希和坐标授权可见，只有全部必需组件通过才标“可离线”。
              claims:
                - result
                - requirement.complete-observation-pack
                - requirement.local-storage-boundaries
                - requirement.offline-pack-manager-user-task
                - control.offline-pack-manager.location
                - control.offline-pack-manager.trigger
                - control.offline-pack-manager.input
                - control.offline-pack-manager.loading
                - control.offline-pack-manager.empty
                - control.offline-pack-manager.success
                - control.offline-pack-manager.failure
                - control.offline-pack-manager.feedback
                - obligation.offline-storage-stack
                - obligation.approved-offline-pack-policy
              observation: playwright.case.pack-integrity.passed
              operator: equals
              expected: true
            - key: red-mode-accessible
              criterion: |-
                - **AC red-mode-accessible**
                  - Accepts: REQ night-red-mode, CTRL night-red-mode-toggle
                  - Given: 用户在现场从夜间切换红光并启用文本放大/reduced motion。
                  - When: 浏览地图覆盖、状态、危险和禁用工具。
                  - Then: 无白帧，危险/选择/禁用不只靠颜色且仍可读，系统 UI 无法控制的边界提前说明。
              claims:
                - requirement.night-red-mode
                - requirement.night-red-mode-toggle-user-task
                - control.night-red-mode-toggle.location
                - control.night-red-mode-toggle.trigger
                - control.night-red-mode-toggle.input
                - control.night-red-mode-toggle.loading
                - control.night-red-mode-toggle.empty
                - control.night-red-mode-toggle.success
                - control.night-red-mode-toggle.failure
                - control.night-red-mode-toggle.feedback
              observation: playwright.case.red-mode-accessible.passed
              operator: equals
              expected: true
            - key: parking-and-backup-offline
              criterion: |-
                - **AC parking-and-backup-offline**
                  - Accepts: REQ parking-and-backup, CTRL return-to-parking, CTRL backup-switcher
                  - Given: 当前地点条件恶化、网络中断且包内有已验证停车点和备选路线快照。
                  - When: 用户查看停车方向并确认切换备选。
                  - Then: 方位/距离/缓存路线语义与精度可见，主备上下文原子切换且旧计划可撤回。
              claims:
                - requirement.parking-and-backup
                - requirement.return-to-parking-user-task
                - control.return-to-parking.location
                - control.return-to-parking.trigger
                - control.return-to-parking.input
                - control.return-to-parking.loading
                - control.return-to-parking.empty
                - control.return-to-parking.success
                - control.return-to-parking.failure
                - control.return-to-parking.feedback
                - requirement.backup-switcher-user-task
                - control.backup-switcher.location
                - control.backup-switcher.trigger
                - control.backup-switcher.input
                - control.backup-switcher.loading
                - control.backup-switcher.empty
                - control.backup-switcher.success
                - control.backup-switcher.failure
                - control.backup-switcher.feedback
              observation: playwright.case.parking-and-backup-offline.passed
              operator: equals
              expected: true
            - key: bounded-safety-session
              criterion: |-
                - **AC bounded-safety-session**
                  - Accepts: REQ safety-session, CTRL safety-session-panel, OBL bounded-background-location
                  - Given: 用户明确授权限时后台定位并设返程/联系人。
                  - When: 开启后主动结束或达到自动停止时间。
                  - Then: 开启范围/状态持续可见，结束时后台定位和计划任务可证实停止，拒绝权限时不会宣称已保护。
              claims:
                - requirement.safety-session
                - requirement.safety-session-panel-user-task
                - control.safety-session-panel.location
                - control.safety-session-panel.trigger
                - control.safety-session-panel.input
                - control.safety-session-panel.loading
                - control.safety-session-panel.empty
                - control.safety-session-panel.success
                - control.safety-session-panel.failure
                - control.safety-session-panel.feedback
                - obligation.bounded-background-location
                - requirement.approved-background-safety-policy
              observation: playwright.case.bounded-safety-session.passed
              operator: equals
              expected: true
            - key: explicit-location-share
              criterion: |-
                - **AC explicit-location-share**
                  - Accepts: REQ location-sharing-consent, CTRL location-share-action
                  - Given: 当前地点为受限坐标且用户选择一个外部分享应用。
                  - When: 用户预览精度/接收者/有效期并确认。
                  - Then: 载荷只含策略允许字段，失败/未知不会显示已送达，也不会后台自动重发。
              claims:
                - requirement.location-sharing-consent
                - requirement.location-share-action-user-task
                - control.location-share-action.location
                - control.location-share-action.trigger
                - control.location-share-action.input
                - control.location-share-action.loading
                - control.location-share-action.empty
                - control.location-share-action.success
                - control.location-share-action.failure
                - control.location-share-action.feedback
              observation: playwright.case.explicit-location-share.passed
              operator: equals
              expected: true
            - key: offline-write-replay
              criterion: |-
                - **AC offline-write-replay**
                  - Accepts: REQ offline-write-sync, CTRL offline-sync-queue
