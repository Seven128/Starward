    technical:
      obligations:
        - key: weather-provider-normalization
          statement: "- **OBL weather-provider-normalization** [direct + external research: S-ARCH 6.1, S-USER, S-RESEARCH]：天气供应商实现统一 Provider 接口并先标准化/质检再进入业务；QWeather 按量候选承担中国常规天气/预警，Open-Meteo 免费端点只用于非商业 POC、付费 customer endpoint 只在经验证的分层云/能见度/多模型增益值得其 12 个月 TCO 时采购，ECMWF Open Data 仅作批处理基准/后备研究，具体合同由 DEC weather-provider-contracts 与 DEC provider-budget-and-paid-redundancy 决定，不默认同时支付两个天气源。QWeather 天气可按条款缓存但 GeoAPI 禁止批量缓存/索引，预警展示完整 `refer.sources`；Open-Meteo 商业生产不得使用 free endpoint，付费数据仍保留 CC BY 4.0 attribution/modification chain；所有 key 仅服务端持有。"
          required_proof_surfaces:
            - api_contract
            - implementation_structure
            - ui_browser
        - key: weather-model-schema
          statement: "- **OBL weather-model-schema** [direct: S-ARCH 6.1]：WeatherProviderRun 至少保存 id、provider、model、modelRunTime、ingestedAt、resolutionKm、status、sourceLicense；每小时记录 gridCellId/providerRunId/validTimeUtc、temperature/apparentTemperature、humidity/dewPoint/pressure、total/low/mid/highCloud、visibility、precipitationAmount/probability、windSpeed/gust/direction、fogProbability 和 qualityFlags；内部统一 SI 单位，展示层转换，空值不转 0。"
          required_proof_surfaces:
            - ui_browser
        - key: astronomy-versioning
          statement: "- **OBL astronomy-versioning** [direct: S-ARCH 6.3]：使用 Astronomy Engine 外加自有领域封装，服务端/客户端共享语义；来源文档记录该库声称约 1 角分精度，但产品不得直接把声明当证明，结果和离线算法均版本化并按 EXT astronomy-authoritative-validation 的确认容差用黄金数据校验。"
          required_proof_surfaces:
            - runtime_behavior
