  - key: map-route-discovery
    title: 地图发现、筛选与路线
    depends_on:
      - mobile-shell-and-preferences
      - forecast-and-astronomy
    product:
      observable_result: 用户可从当前位置、手动出发地或行程进入观星地图，在统一时间和偏好上下文中查看地点状态、图层与数量，按天空/出行/设施/适配条件筛选，选择主地点和备选地点，比较真实驾车/步行路线，并把同一选择带回今晚、详情和行程；地图坐标转换、路线失败和数据不足均有可见边界。
      owner:
        label: map-route-discovery owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/map/**
          - apps/api/src/modules/map/**
          - apps/api/src/modules/route/**
          - packages/amap-native/**
          - packages/coordinate-system/**
      requirements:
        - key: map-content-and-status
          statement: "- **REQ map-content-and-status** [direct: S-PRODUCT 6.4A]：基础地图显示用户位置、观星点、收藏、主推荐、备选、路线、最后一段步行和当前可见范围地点数量；地点至少区分推荐、条件一般、暂不推荐、数据不足、临时关闭/存在风险，且状态不只依赖颜色。"
          required_proof_surfaces:
            - ui_browser
        - key: complete-map-filters
          statement: "- **REQ complete-map-filters** [direct: S-PRODUCT 6.4B]：筛选覆盖光污染、今晚评分、云量、无月黑夜、银河/指定目标、八向无遮挡；直达/停车步行/车程/徒步/山路/收费/夜间到达；厕所、停车、平台、露营、信号、水电、补给、管理、收费、开放时间；新手、亲子、摄影、目视、大型望远镜、露营和无障碍/低徒步。"
          required_proof_surfaces:
            - ui_browser
        - key: complete-map-layers
          statement: "- **REQ complete-map-layers** [direct: S-PRODUCT 6.4C]：图层支持观星点、观星指数、光污染、总云及高/中/低云、降雨、雾、卫星云图、空气质量、地形/海拔、银河中心、月亮、指定天体、日出日落方向和用户实况；栅格/矢量/符号层的互斥、叠加、顺序与密度由 DEC map-layer-composition-and-density 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: selected-spot-summary
          statement: "- **REQ selected-spot-summary** [direct: S-PRODUCT 6.4D]：点击地点标记后，底部摘要包含名称、实景、距离/车程、今晚评分、最佳时间、光污染、主要设施、适合类型，以及加入计划、详情、导航操作。"
          required_proof_surfaces:
            - ui_browser
        - key: route-map-planning
          statement: "- **REQ route-map-planning** [direct: S-PRODUCT 6.4E, 6.7D]：路线页显示主路线、顺序编号地点、驾车和最后步行两段，可在全程/主地点/备选或分段视图切换、选点看实景/详情、拖动排序，并给出总距离、预计总时长、到达时间、收费、主要道路、步行距离和各点建议窗口。"
          required_proof_surfaces:
            - ui_browser
        - key: route-mode-coverage
          statement: "- **REQ route-mode-coverage** [direct: S-PRODUCT 6.1, S-ARCH 4.1/5.7/6.8]：路线聚合按用户交通支持驾车、步行和骑行，并在供应商/地区可用时支持公共交通、电动车；观星执行路线仍明确拆出最后一段步行/搬运，任一模式缺失必须说明而不能套用驾车时间。"
          required_proof_surfaces:
            - ui_browser
        - key: route-variants-and-degradation
          statement: "- **REQ route-variants-and-degradation** [direct: S-PRODUCT 6.7D, S-ARCH 5.7]：用户可比较“最快到主地点、先到备选再决定、主地点失败转备选”等方案；MVP 以外部导航链接执行导航，路线供应商失败时仍保留直线距离、缓存快照、停车点和手动跳转，不伪装为实时路线。"
          required_proof_surfaces:
            - ui_browser
        - key: map-selection-coordination
          statement: "- **REQ map-selection-coordination** [derived from S-CONTEXT, S-IMG-05～07]：地图、卡片、详情、今晚和行程共享选中地点、日期/时刻、预设、主备角色和路线方案；切换其中任一项应明确刷新依赖数据，不能出现地图选中 A 而卡片操作 B。"
          required_proof_surfaces:
            - ui_browser
        - key: search-and-candidate-bounds
          statement: "- **REQ search-and-candidate-bounds** [direct: S-ARCH 4.3～4.4]：附近搜索先用 PostGIS 距离预筛，再按天气/天文/光污染/设施过滤，只对前 10～20 个候选请求真实路线并形成前 3～5 个推荐；这些数值是来源建议，最终阈值由 DEC candidate-routing-limits 固化。"
          required_proof_surfaces:
            - api_contract
        - key: map-search-context-bar-user-task
          statement: "  - User task: 搜索地点/区域并确认当前出发地、日期和偏好。"
          required_proof_surfaces:
            - ui_browser
        - key: map-filter-sheet-user-task
          statement: "  - User task: 设置天空、出行、设施和用户适配条件。"
          required_proof_surfaces:
            - ui_browser
        - key: map-layer-selector-user-task
          statement: "  - User task: 选择观星、气象、光污染、地形、天体方向或实况层。"
          required_proof_surfaces:
            - ui_browser
        - key: map-marker-density-surface-user-task
          statement: "  - User task: 理解范围内地点分布并选择一个地点。"
          required_proof_surfaces:
            - ui_browser
        - key: selected-spot-sheet-user-task
          statement: "  - User task: 快速判断地点并采取加入计划、详情或导航动作。"
          required_proof_surfaces:
            - ui_browser
        - key: route-plan-editor-user-task
          statement: "  - User task: 比较方案、查看分段并调整地点顺序。"
          required_proof_surfaces:
            - ui_browser
        - key: external-navigation-action-user-task
          statement: "  - User task: 将选定目的地/停车点交给已安装地图应用导航。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-map-layer-composition-and-density
          statement: "  - Approved resolution (owner, 2026-07-20): 任一时刻只启用一个主栅格（云量/降水/光污染/地形之一）叠加一个底图，预警边界、地点/聚合、路线、选中态、天体方向和用户位置作为有序矢量/符号层；所有时变层共享同一时间游标并显示 issuedAt/validAt/opacity/来源，切换失败保留旧层但标 stale。视口内 ≤80 点显示原始 marker，81～500 点聚合，>500 点显示密度/服务端网格且继续提供排序列表；缩放、设备性能和 reduced motion 只影响表现，不改变筛选语义。屏幕阅读器/键盘用户始终可用与地图选择同步的列表、筛选和详情，颜色不是唯一图层状态。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - stargazing map
        - route planner
        - map and route adapters
