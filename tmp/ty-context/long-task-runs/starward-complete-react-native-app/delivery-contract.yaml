  - key: req-tonight-decision-scoring-factor-coverage
    source_ref: docs/source-plan.md#tonight-decision.requirement.scoring-factor-coverage
    statement: "- **REQ scoring-factor-coverage** [direct: S-PRODUCT 6.6C]：排序必须保留五组因素：天空质量含光污染、高/中/低云、通透度、视宁度/实验性稳定度、能见度、月光、空气质量、湿度/露点、风、降雨/雾；目标匹配含地平线上方、高度、无遮挡方位、最亮/最高时刻、银河核心、月光干扰和摄影前景；地点质量含暗度、开阔、安全、交通、停车、平台、厕所、露营、信号和最近实况；出行成本含距离、驾车、收费、徒步、山路强度和能否赶上窗口；可信度含模型一致、资料新鲜、实况数量、核验和预报提前量。"
    disposition:
      type: claim
      refs:
        - tonight-decision.requirement.scoring-factor-coverage
  - key: req-tonight-decision-visible-target-timeline-user-task
    source_ref: docs/source-plan.md#tonight-decision.control.visible-target-timeline
    statement: "  - User task: 按时间选择今晚值得看的目标。"
    disposition:
      type: claim
      refs:
        - tonight-decision.requirement.visible-target-timeline-user-task
  - key: req-tonight-decision-visible-targets
    source_ref: docs/source-plan.md#tonight-decision.requirement.visible-targets
    statement: "- **REQ visible-targets** [direct: S-PRODUCT 6.2D]：按时间列出银河、月亮、明亮行星、主要星座、流星雨、彗星、空间站和特殊天象；每项给出可见/最佳时间、方位、高度、亮度或难度、天气/月光影响和推荐地点。"
    disposition:
      type: claim
      refs:
        - tonight-decision.requirement.visible-targets
  - key: result-admin-data-operations
    source_ref: docs/source-plan.md#outcome.admin-data-operations
    statement: 获授权运营人员可在强认证后台维护/合并/关闭观星点，处理媒体/实况/评论/纠错和风险，查看天气/天文/地图/路线/光污染等数据源运行、版本、许可、缺失与成本，管理失败任务和缓存/预热，以具体 NightReport 快照重放评分/窗口/主备结果并比较规则版本；所有变更经过服务端权限、校验、审计和可恢复版本，不直接覆盖原始数据。
    disposition:
      type: outcome_result
      ref: admin-data-operations.result
  - key: result-community-contribution
    source_ref: docs/source-plan.md#outcome.community-contribution
    statement: 用户可围绕观星地点/行程提交新地点、结构化长期事实、限时现场实况、图片、多维评价和纠错；提交可离线暂存、经过归属/隐私/审核后显示明确状态，长期事实与当晚临时状态不会互相覆盖，争议和确认数量可见；MVP 保持轻社区，不扩展为通用信息流或私信网络。
    disposition:
      type: outcome_result
      ref: community-contribution.result
  - key: result-field-offline-safety
    source_ref: docs/source-plan.md#outcome.field-offline-safety
    statement: 用户出发前可下载并验证完整观测数据包；到达低光、弱网或断网现场后，仍能以夜间/红光界面核对地点/时间/最佳窗口、方向、目标、缓存天气、拍摄和清单，查看离线地图、返回停车点、切换备选、记录实况与图片；用户主动开启的限时安全模式能显示返程和警告、可选择分享位置，并在结束/超时后停止后台定位。
    disposition:
      type: outcome_result
      ref: field-offline-safety.result
  - key: result-forecast-and-astronomy
    source_ref: docs/source-plan.md#outcome.forecast-and-astronomy
    statement: 用户可从摘要下钻到小时、15 日、模型对比、昼夜蒙影、地图图层和天体事件；每项都携带单位、时间、模型/算法版本、可信度与数据状态，并明确“估计透明度/实验性大气稳定度”等边界。
    disposition:
      type: outcome_result
      ref: forecast-and-astronomy.result
  - key: result-identity-profile-privacy
    source_ref: docs/source-plan.md#outcome.identity-profile-privacy
    statement: 用户无需登录即可完成允许的基础查询，并可在需要收藏、贡献、跨设备、分享/协作等能力时通过手机号验证码、Apple 或微信安全登录；“我的”统一管理偏好、内容、设备、通知、离线/同步、帮助和数据来源，用户可查看/撤销设备会话、控制位置与坐标公开、导出数据和注销账号，且精确位置不会进入产品分析。
    disposition:
      type: outcome_result
      ref: identity-profile-privacy.result
  - key: result-itinerary-and-collaboration
    source_ref: docs/source-plan.md#outcome.itinerary-and-collaboration
    statement: 用户可从今晚、地点、分享链接或行程首页创建一份可执行观星计划，获得主备地点、出发/到达/观测/返回时段、路线、装备和风险，在总览、时间线、地图和待规划候选之间编辑且可恢复历史；MVP 可复制/分享，V2 才开放多人共同编辑和图文攻略候选提取，协作冲突不会静默覆盖。
    disposition:
      type: outcome_result
      ref: itinerary-and-collaboration.result
  - key: result-map-route-discovery
    source_ref: docs/source-plan.md#outcome.map-route-discovery
    statement: 用户可从当前位置、手动出发地或行程进入观星地图，在统一时间和偏好上下文中查看地点状态、图层与数量，按天空/出行/设施/适配条件筛选，选择主地点和备选地点，比较真实驾车/步行路线，并把同一选择带回今晚、详情和行程；地图坐标转换、路线失败和数据不足均有可见边界。
    disposition:
      type: outcome_result
      ref: map-route-discovery.result
  - key: result-mobile-shell-and-preferences
    source_ref: docs/source-plan.md#outcome.mobile-shell-and-preferences
    statement: 用户可在 iOS/Android Development Build 中进入同一业务 APP，先以游客完成基础查询，在需要时授权定位/通知等能力，保存一个或多个推荐偏好预设，并稳定访问“今晚、观星地图、行程、天空、我的”五个一级入口。
    disposition:
      type: outcome_result
      ref: mobile-shell-and-preferences.result
  - key: result-notifications-and-toolbox
    source_ref: docs/source-plan.md#outcome.notifications-and-toolbox
    statement: 用户可按地点/区域、目标和阈值订阅出发前、行程中及长期观星事件，控制时段/通道/冷却并从通知深链回到同一地点、时间、行程或备选决策；后续版本可在独立工具箱查询天象日历、空间站、天体位置、摄影计算器和专业内容，所有结果显示位置/时间/数据或算法版本，而不会把工具堆到新手首页。
    disposition:
      type: outcome_result
      ref: notifications-and-toolbox.result
  - key: result-quality-release-observability
    source_ref: docs/source-plan.md#outcome.quality-release-observability
    statement: 团队可在隔离的 development/staging/production 环境中构建、测试、灰度和发布 iOS/Android APP 与模块化后端，在不兼容原生变更时正确升级二进制/runtimeVersion；生产具备可观测、告警、数据质量、备份恢复和中国主场景合规边界，核心决策/地图/离线/传感器路径在模拟、实机和户外被验证，并以来源建议的 SLO 与产品闭环指标持续判断质量。
    disposition:
      type: outcome_result
      ref: quality-release-observability.result
  - key: result-shooting-assistant
    source_ref: docs/source-plan.md#outcome.shooting-assistant
    statement: 用户为选定地点、时间和目标选择手机/相机、镜头与支撑设备后，获得由确定性规则算出的可执行参数、构图方向、风险与替代方案，按手机/相机能力区分建议，并用 AI 解释取舍而不是编造曝光；出发前与现场检查表可加入行程、离线查看和逐项完成。
    disposition:
      type: outcome_result
      ref: shooting-assistant.result
  - key: result-sky-orientation-ar
    source_ref: docs/source-plan.md#outcome.sky-orientation-ar
    statement: 用户可为任一地点/时间在所有受支持设备上查看 2D/3D 天空，搜索并跟踪星座、银河、日月、行星、恒星、深空目标及后续天象轨迹，把方位/高度与地点真实遮挡对齐；现场可用稳定方向引导，传感器异常可校准/手动降级，V3 支持的设备可额外开启 AR 与摄影视场，但 AR 从不成为核心路径。
    disposition:
      type: outcome_result
      ref: sky-orientation-ar.result
  - key: result-spot-detail-and-trust
    source_ref: docs/source-plan.md#outcome.spot-detail-and-trust
    statement: 用户可在一个地点详情中由“今晚是否适合”逐层核对光污染/遮挡、实景、交通最后一公里、设施、安全和用户实况，理解数据来源、更新时间、可信度及精确坐标公开范围，并完成收藏、主备、导航、天空、拍摄、实况或纠错操作；资料缺失、过期、冲突和临时关闭不会被漂亮卡片掩盖。
    disposition:
      type: outcome_result
      ref: spot-detail-and-trust.result
  - key: result-tonight-decision
    source_ref: docs/source-plan.md#outcome.tonight-decision
    statement: 用户选择位置、观星夜、偏好和目标后，一次获得“是否建议出发、何时出发、去哪里、能看什么、怎么走、何时失效”的可解释结论；安全阻断、数据不确定性、主地点和多种备选不会被一个总分掩盖。
    disposition:
      type: outcome_result
      ref: tonight-decision.result
  - key: risk-admin-data-operations-admin-security-boundary
    source_ref: docs/source-plan.md#admin-data-operations.risk.admin-security-boundary
    statement: |-
      - **RISK admin-security-boundary**
        - Fact: security_boundary_change
        - Affected Outcome: admin-data-operations
        - Basis: 后台可读取敏感坐标/证据并修改地点、规则、权限和数据源。
        - Consequence: MFA、最小字段授权、重认证、WAF/限流、不可篡改审计和负向授权测试是发布前置条件。
    disposition:
      type: risk_fact
      refs:
        - security_boundary_change:admin-data-operations
  - key: risk-admin-data-operations-bulk-data-operations
    source_ref: docs/source-plan.md#admin-data-operations.risk.bulk-data-operations
    statement: |-
      - **RISK bulk-data-operations**
        - Fact: full_population_operation
        - Affected Outcome: admin-data-operations
        - Basis: 数据集导入、缓存预热、保留清理、通知评估和规则重算可能覆盖全区域/全用户。
        - Consequence: Contract 必须规定 dry-run、分片、速率、范围确认、检查点、暂停/回滚和结果对账。
    disposition:
      type: risk_fact
      refs:
        - full_population_operation:admin-data-operations
  - key: risk-admin-data-operations-dataset-license
    source_ref: docs/source-plan.md#admin-data-operations.risk.dataset-license
    statement: |-
      - **RISK dataset-license**
        - Fact: irreversible_external_effect
        - Affected Outcome: admin-data-operations
        - Basis: 未获商业许可或缺少归属的数据/地图/图片一旦发布到 CDN/客户端会产生难以回收的合规影响。
        - Consequence: 生产源上线前必须外部确认许可、归属、再分发/缓存范围和删除流程；管理后台保留证据与版本。
    disposition:
      type: risk_fact
      refs:
        - irreversible_external_effect:admin-data-operations
  - key: risk-admin-data-operations-schema-and-api
    source_ref: docs/source-plan.md#admin-data-operations.risk.schema-and-api
    statement: |-
      - **RISK schema-and-api**
        - Fact: public_api_or_schema_change
        - Affected Outcome: admin-data-operations
        - Basis: 规范化实体、OpenAPI、缓存键、离线同步和任务输入同时被移动端/后台/工作进程消费。
        - Consequence: 需要契约版本、生成客户端、兼容迁移、双读/双写或重算策略与跨消费者验证。
    disposition:
      type: risk_fact
      refs:
        - public_api_or_schema_change:admin-data-operations
  - key: risk-community-contribution-community-persistence
    source_ref: docs/source-plan.md#community-contribution.risk.community-persistence
    statement: |-
      - **RISK community-persistence**
        - Fact: persistent_data_change
        - Affected Outcome: community-contribution
        - Basis: 地点、评价、媒体、实况、纠错、审核和争议形成长期版本与公共内容。
        - Consequence: 需定义草稿/发布/撤回/删除/申诉/历史保留和外键迁移，不允许审核时覆盖原始证据。
    disposition:
      type: risk_fact
      refs:
        - persistent_data_change:community-contribution
  - key: risk-community-contribution-moderation-security
    source_ref: docs/source-plan.md#community-contribution.risk.moderation-security
    statement: |-
      - **RISK moderation-security**
        - Fact: security_boundary_change
        - Affected Outcome: community-contribution
        - Basis: 用户上传、举报、审核证据和原始 EXIF 跨越公众、贡献者、审核员和管理员权限。
        - Consequence: 服务端对象/字段授权、短期上传凭证、扫描、审计和最小化原始证据访问必须验证。
    disposition:
      type: risk_fact
      refs:
        - security_boundary_change:community-contribution
  - key: risk-community-contribution-publication-effect
    source_ref: docs/source-plan.md#community-contribution.risk.publication-effect
    statement: |-
      - **RISK publication-effect**
        - Fact: irreversible_external_effect
        - Affected Outcome: community-contribution
        - Basis: 公开地点、坐标、图片或安全评论可能被复制传播，撤回无法保证外部删除。
        - Consequence: 发布前必须预览范围/精度/隐私和永久性，敏感地点默认保守并有审核/下线路径。
    disposition:
      type: risk_fact
      refs:
        - irreversible_external_effect:community-contribution
  - key: risk-field-offline-safety-background-location-permission
    source_ref: docs/source-plan.md#field-offline-safety.risk.background-location-permission
    statement: |-
      - **RISK background-location-permission**
        - Fact: permission_boundary_change
        - Affected Outcome: field-offline-safety
        - Basis: 现场安全模式从前台查询扩展到受系统和商店严格约束的后台位置。
        - Consequence: 需平台实机、拒绝/撤回/系统杀进程/自动停止与商店披露联合验证，默认不申请永久后台定位。
    disposition:
      type: risk_fact
      refs:
        - permission_boundary_change:field-offline-safety
  - key: risk-field-offline-safety-location-share-effect
    source_ref: docs/source-plan.md#field-offline-safety.risk.location-share-effect
    statement: |-
      - **RISK location-share-effect**
        - Fact: irreversible_external_effect
        - Affected Outcome: field-offline-safety
        - Basis: 一旦精确位置或行程信息发到外部联系人/应用，APP 无法保证撤回。
        - Consequence: 必须发送前预览确认、最小精度/有效期、遵守坐标策略并如实呈现发送状态。
    disposition:
      type: risk_fact
      refs:
        - irreversible_external_effect:field-offline-safety
  - key: risk-field-offline-safety-offline-critical-path
    source_ref: docs/source-plan.md#field-offline-safety.risk.offline-critical-path
    statement: |-
      - **RISK offline-critical-path**
        - Fact: critical_user_path
        - Affected Outcome: field-offline-safety
        - Basis: 用户可能在黑暗、无网、低温、低电量环境依赖停车、路线、备选和返程信息。
        - Consequence: 需断网/弱网/低存储/低电量/跨进程恢复与真实户外测试，在线 happy path 不能证明完成。
    disposition:
      type: risk_fact
      refs:
        - critical_user_path:field-offline-safety
  - key: risk-field-offline-safety-offline-data-migration
    source_ref: docs/source-plan.md#field-offline-safety.risk.offline-data-migration
    statement: |-
      - **RISK offline-data-migration**
        - Fact: data_migration
        - Affected Outcome: field-offline-safety
        - Basis: SQLite schema、manifest 和离线包会跨 APP/runtime/数据版本长期存在。
        - Consequence: 升级必须迁移或安全重下、保留待同步写入，并证明失败可回滚而不删除用户草稿。
    disposition:
      type: risk_fact
      refs:
        - data_migration:field-offline-safety
  - key: risk-forecast-and-astronomy-forecast-schema
    source_ref: docs/source-plan.md#forecast-and-astronomy.risk.forecast-schema
    statement: |-
      - **RISK forecast-schema**
        - Fact: public_api_or_schema_change
        - Affected Outcome: forecast-and-astronomy
        - Basis: 多供应商标准化字段、时间/单位和算法版本被移动端、缓存、推荐和离线共同消费。
        - Consequence: Contract 需约束单位、时区、空值、质量标记和兼容升级。
    disposition:
      type: risk_fact
      refs:
        - public_api_or_schema_change:forecast-and-astronomy
  - key: risk-forecast-and-astronomy-model-observability
    source_ref: docs/source-plan.md#forecast-and-astronomy.risk.model-observability
    statement: |-
      - **RISK model-observability**
        - Fact: weak_observability
        - Affected Outcome: forecast-and-astronomy
        - Basis: 预报准确性、山区微气候和视宁度无法仅靠实验室测试确认。
        - Consequence: 必须结合供应商契约、黄金数据、现场对比和长期校准，UI 测试不能独立证明准确。
    disposition:
      type: risk_fact
      refs:
        - weak_observability:forecast-and-astronomy
  - key: risk-identity-profile-privacy-account-deletion-effect
    source_ref: docs/source-plan.md#identity-profile-privacy.risk.account-deletion-effect
    statement: |-
      - **RISK account-deletion-effect**
        - Fact: irreversible_external_effect
        - Affected Outcome: identity-profile-privacy
        - Basis: 最终注销和删除可能不可恢复，并影响协作、公共贡献和本地未同步内容。
        - Consequence: 必须影响预览、重认证、明确最终确认、可选冷静期/撤销决策和逐类删除证明。
    disposition:
      type: risk_fact
      refs:
        - irreversible_external_effect:identity-profile-privacy
  - key: risk-identity-profile-privacy-identity-security
    source_ref: docs/source-plan.md#identity-profile-privacy.risk.identity-security
    statement: |-
      - **RISK identity-security**
        - Fact: security_boundary_change
        - Affected Outcome: identity-profile-privacy
        - Basis: 登录、会话、对象/字段授权、导出和删除保护全部用户敏感数据。
        - Consequence: 需威胁建模、认证/授权负测、令牌轮换/撤销、速率限制、日志脱敏与管理审计，不能只做 UI 流程测试。
    disposition:
      type: risk_fact
      refs:
        - security_boundary_change:identity-profile-privacy
  - key: risk-identity-profile-privacy-profile-migration
    source_ref: docs/source-plan.md#identity-profile-privacy.risk.profile-migration
    statement: |-
      - **RISK profile-migration**
        - Fact: data_migration
        - Affected Outcome: identity-profile-privacy
        - Basis: 游客本地数据、账号预设、设备引用和隐私同意会跨版本/账号状态迁移。
        - Consequence: 合并/升级须幂等、有冲突预览和可恢复副本，不得登录后静默清空游客数据。
    disposition:
      type: risk_fact
      refs:
        - data_migration:identity-profile-privacy
  - key: risk-itinerary-and-collaboration-collaboration-security
    source_ref: docs/source-plan.md#itinerary-and-collaboration.risk.collaboration-security
    statement: |-
      - **RISK collaboration-security**
        - Fact: security_boundary_change
        - Affected Outcome: itinerary-and-collaboration
        - Basis: 分享/邀请将地点、时间、车辆、装备、联系人和受限坐标扩展给其他账号。
        - Consequence: Contract 需固定角色、邀请有效期、撤销、服务端字段授权、审计和受限数据投影。
    disposition:
      type: risk_fact
      refs:
        - security_boundary_change:itinerary-and-collaboration
  - key: risk-itinerary-and-collaboration-itinerary-migration
    source_ref: docs/source-plan.md#itinerary-and-collaboration.risk.itinerary-migration
    statement: |-
      - **RISK itinerary-migration**
        - Fact: data_migration
        - Affected Outcome: itinerary-and-collaboration
        - Basis: 行程结构、阶段类型、快照和 revision 会跨 MVP/V1/V2 持久保存并进入离线副本。
        - Consequence: 每次 schema/阶段演进需兼容旧行程、离线迁移与恢复版本，不能原地丢弃历史。
    disposition:
      type: risk_fact
      refs:
        - data_migration:itinerary-and-collaboration
  - key: risk-itinerary-and-collaboration-plan-critical-path
    source_ref: docs/source-plan.md#itinerary-and-collaboration.risk.plan-critical-path
    statement: |-
      - **RISK plan-critical-path**
        - Fact: critical_user_path
        - Affected Outcome: itinerary-and-collaboration
        - Basis: 出发/到达/返回与主备路线直接指导夜间行动。
        - Consequence: 时间、跨午夜、路线、风险和离线更新必须端到端验证并允许恢复，不以卡片渲染成功代替可执行性。
    disposition:
      type: risk_fact
      refs:
        - critical_user_path:itinerary-and-collaboration
  - key: risk-map-route-discovery-coordinate-schema
    source_ref: docs/source-plan.md#map-route-discovery.risk.coordinate-schema
    statement: |-
      - **RISK coordinate-schema**
        - Fact: public_api_or_schema_change
        - Affected Outcome: map-route-discovery
        - Basis: 坐标字段、转换版本和路线快照被地图、天文、天气、推荐、离线和后台共同消费。
        - Consequence: Contract 必须固定权威坐标、展示坐标、精度/来源语义与兼容迁移。
    disposition:
      type: risk_fact
      refs:
        - public_api_or_schema_change:map-route-discovery
  - key: risk-map-route-discovery-map-permission
    source_ref: docs/source-plan.md#map-route-discovery.risk.map-permission
    statement: |-
      - **RISK map-permission**
        - Fact: permission_boundary_change
        - Affected Outcome: map-route-discovery
        - Basis: 从手动位置升级到前台持续定位或外部地图跳转涉及系统授权和跨应用边界。
        - Consequence: 每种定位级别和拒绝路径需独立验收，不得因地图存在而默认申请后台定位。
    disposition:
      type: risk_fact
      refs:
        - permission_boundary_change:map-route-discovery
  - key: risk-map-route-discovery-route-critical-path
    source_ref: docs/source-plan.md#map-route-discovery.risk.route-critical-path
    statement: |-
      - **RISK route-critical-path**
        - Fact: critical_user_path
        - Affected Outcome: map-route-discovery
        - Basis: 路线和最后一公里错误会直接影响夜间到达和安全。
        - Consequence: 必须以真实供应商契约、缓存降级、停车点校验和户外路线测试验证，不能只用直线距离单测。
    disposition:
      type: risk_fact
      refs:
        - critical_user_path:map-route-discovery
  - key: risk-mobile-shell-and-preferences-location-permission-boundary
    source_ref: docs/source-plan.md#mobile-shell-and-preferences.risk.location-permission-boundary
    statement: |-
      - **RISK location-permission-boundary**
        - Fact: permission_boundary_change
        - Affected Outcome: mobile-shell-and-preferences
        - Basis: APP 涉及前台精确定位、通知、相机和可选后台定位。
        - Consequence: Contract 必须独立证明请求时机、拒绝降级、系统设置恢复和后台自动停止，不能只证明“授权成功”。
    disposition:
      type: risk_fact
      refs:
        - permission_boundary_change:mobile-shell-and-preferences
  - key: risk-mobile-shell-and-preferences-mobile-native-boundary
    source_ref: docs/source-plan.md#mobile-shell-and-preferences.risk.mobile-native-boundary
    statement: |-
      - **RISK mobile-native-boundary**
        - Fact: critical_user_path
        - Affected Outcome: mobile-shell-and-preferences
        - Basis: 全部主流程依赖原生 APP 壳、路由、权限和跨平台模块。
        - Consequence: 壳层或原生桥接故障会阻断所有 Outcome，需先建立真实双端基线和降级。
    disposition:
      type: risk_fact
      refs:
        - critical_user_path:mobile-shell-and-preferences
  - key: risk-notifications-and-toolbox-alert-effect
    source_ref: docs/source-plan.md#notifications-and-toolbox.risk.alert-effect
    statement: |-
      - **RISK alert-effect**
        - Fact: irreversible_external_effect
        - Affected Outcome: notifications-and-toolbox
        - Basis: 一次错误或重复风险通知会打扰用户、诱导夜间出行或让用户忽略后续警告。
        - Consequence: 规则上线需影子评估、去重/冷却、抽样审阅、全局暂停和可追溯触发快照。
    disposition:
      type: risk_fact
      refs:
        - irreversible_external_effect:notifications-and-toolbox
  - key: risk-notifications-and-toolbox-notification-population
    source_ref: docs/source-plan.md#notifications-and-toolbox.risk.notification-population
    statement: |-
      - **RISK notification-population**
        - Fact: full_population_operation
        - Affected Outcome: notifications-and-toolbox
        - Basis: 新天气运行或重大事件可能同时评估并发送给大范围订阅用户。
        - Consequence: 必须分片/限速/幂等/干跑/暂停/重放并监控发送规模，不能直接无界全表扫描。
    disposition:
      type: risk_fact
      refs:
        - full_population_operation:notifications-and-toolbox
  - key: risk-notifications-and-toolbox-push-permission
    source_ref: docs/source-plan.md#notifications-and-toolbox.risk.push-permission
    statement: |-
      - **RISK push-permission**
        - Fact: permission_boundary_change
        - Affected Outcome: notifications-and-toolbox
        - Basis: 系统推送、国内厂商通道与本地通知有不同授权/令牌/平台行为。
        - Consequence: 需要平台实机覆盖未询问/允许/拒绝/撤回/令牌失效和本地降级，不把系统授权等同订阅有效。
    disposition:
      type: risk_fact
      refs:
        - permission_boundary_change:notifications-and-toolbox
  - key: risk-quality-release-observability-observability-gap
    source_ref: docs/source-plan.md#quality-release-observability.risk.observability-gap
    statement: |-
      - **RISK observability-gap**
        - Fact: weak_observability
        - Affected Outcome: quality-release-observability
        - Basis: 技术成功不等于天气/地点/推荐正确，且户外/设备/供应商条件难在实验室完全再现。
        - Consequence: 技术 trace、数据质量、推荐重放、现场反馈、黄金集和户外验证必须关联，单一监控绿灯不能证明产品可靠。
    disposition:
      type: risk_fact
      refs:
        - weak_observability:quality-release-observability
  - key: risk-quality-release-observability-release-critical-path
    source_ref: docs/source-plan.md#quality-release-observability.risk.release-critical-path
    statement: |-
      - **RISK release-critical-path**
        - Fact: critical_user_path
        - Affected Outcome: quality-release-observability
        - Basis: 首页结论、路线、离线、方向和安全通知是户外夜间决策关键路径，错误发布可能直接影响行动。
        - Consequence: 必须分通道、灰度、可回滚、SLO/数据质量观测和真实场景证据，不可一次全量无保护发布。
    disposition:
      type: risk_fact
      refs:
        - critical_user_path:quality-release-observability
  - key: risk-quality-release-observability-runtime-migration
    source_ref: docs/source-plan.md#quality-release-observability.risk.runtime-migration
    statement: |-
      - **RISK runtime-migration**
        - Fact: data_migration
        - Affected Outcome: quality-release-observability
        - Basis: APP runtime、SQLite/离线包和服务端 schema 在 OTA/二进制/后端独立发布时可能不兼容。
        - Consequence: 兼容矩阵、前后向契约、迁移演练和回滚边界须在晋级门验证，OTA 不跨不可逆迁移。
    disposition:
      type: risk_fact
      refs:
        - data_migration:quality-release-observability
  - key: risk-shooting-assistant-ai-security
    source_ref: docs/source-plan.md#shooting-assistant.risk.ai-security
    statement: |-
      - **RISK ai-security**
        - Fact: security_boundary_change
        - Affected Outcome: shooting-assistant
        - Basis: AI 解释可能将精确地点、设备、行程时间或用户输入发送到第三方模型。
        - Consequence: DEC ai-provider-privacy 必须定义供应商、同意、最小数据投影、保留和失败降级；服务端不得泄露密钥。
    disposition:
      type: risk_fact
      refs:
        - security_boundary_change:shooting-assistant
  - key: risk-shooting-assistant-parameter-observability
    source_ref: docs/source-plan.md#shooting-assistant.risk.parameter-observability
    statement: |-
      - **RISK parameter-observability**
        - Fact: weak_observability
        - Affected Outcome: shooting-assistant
        - Basis: 参数合理性受真实设备、镜头、目标、风、温湿度和用户操作影响，自动测试不能证明成片质量。
        - Consequence: 需用黄金输入、摄影专家审阅、设备实拍和用户反馈校准，并持续保留规则版本。
    disposition:
      type: risk_fact
      refs:
        - weak_observability:shooting-assistant
  - key: risk-sky-orientation-ar-camera-permission
    source_ref: docs/source-plan.md#sky-orientation-ar.risk.camera-permission
    statement: |-
      - **RISK camera-permission**
        - Fact: permission_boundary_change
        - Affected Outcome: sky-orientation-ar
        - Basis: V3 AR 从无需相机的通用天空跨入相机和平台追踪授权。
        - Consequence: 能力检测、用途说明、拒绝/撤回与无 AR 等价路径必须独立验证。
    disposition:
      type: risk_fact
      refs:
        - permission_boundary_change:sky-orientation-ar
  - key: risk-sky-orientation-ar-native-platform-split
    source_ref: docs/source-plan.md#sky-orientation-ar.risk.native-platform-split
    statement: |-
      - **RISK native-platform-split**
        - Fact: public_api_or_schema_change
        - Affected Outcome: sky-orientation-ar
        - Basis: 姿态、精度、AR 追踪和星图状态由 iOS/Android 原生适配器共同暴露给业务层。
        - Consequence: Contract 需冻结跨平台语义、能力枚举和降级状态，避免两端相同字段代表不同精度。
    disposition:
      type: risk_fact
      refs:
        - public_api_or_schema_change:sky-orientation-ar
  - key: risk-sky-orientation-ar-sensor-observability
    source_ref: docs/source-plan.md#sky-orientation-ar.risk.sensor-observability
    statement: |-
      - **RISK sensor-observability**
        - Fact: weak_observability
        - Affected Outcome: sky-orientation-ar
        - Basis: 指南针漂移、磁干扰、姿态稳定和遮挡对齐强依赖真实设备与户外环境。
        - Consequence: 需覆盖机型矩阵、金属/车辆场景、已知方位基准和户外校准测试，模拟器通过不足以验收。
    disposition:
      type: risk_fact
      refs:
        - weak_observability:sky-orientation-ar
  - key: risk-spot-detail-and-trust-coordinate-security
    source_ref: docs/source-plan.md#spot-detail-and-trust.risk.coordinate-security
    statement: |-
      - **RISK coordinate-security**
