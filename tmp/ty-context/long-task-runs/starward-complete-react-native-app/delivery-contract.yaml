        - Fact: weak_observability
        - Affected Outcome: spot-detail-and-trust
        - Basis: 夜间开放、路灯、门禁、停车容量、道路和遮挡无法由公开 POI 或自动测试充分证明。
        - Consequence: 必须结合管理员核验、现场贡献、过期机制、冲突提示和实地抽测。
    disposition:
      type: risk_fact
      refs:
        - weak_observability:spot-detail-and-trust
  - key: risk-spot-detail-and-trust-spot-persistence
    source_ref: docs/source-plan.md#spot-detail-and-trust.risk.spot-persistence
    statement: |-
      - **RISK spot-persistence**
        - Fact: persistent_data_change
        - Affected Outcome: spot-detail-and-trust
        - Basis: 地点事实、历史状态、媒体、遮挡、核验和访问策略均为长期版本化数据。
        - Consequence: Contract 必须定义不可覆盖的来源记录、审核迁移、冲突和回滚验证。
    disposition:
      type: risk_fact
      refs:
        - persistent_data_change:spot-detail-and-trust
  - key: risk-tonight-decision-critical-decision-path
    source_ref: docs/source-plan.md#tonight-decision.risk.critical-decision-path
    statement: |-
      - **RISK critical-decision-path**
        - Fact: critical_user_path
        - Affected Outcome: tonight-decision
        - Basis: “今晚是否出发”是产品第一核心场景并直接影响夜间出行。
        - Consequence: 正常、阻断、部分数据、过期、刷新和备选切换均需独立证明。
    disposition:
      type: risk_fact
      refs:
        - critical_user_path:tonight-decision
  - key: risk-tonight-decision-recommendation-schema
    source_ref: docs/source-plan.md#tonight-decision.risk.recommendation-schema
    statement: |-
      - **RISK recommendation-schema**
        - Fact: public_api_or_schema_change
        - Affected Outcome: tonight-decision
        - Basis: NightReport 是移动端、推荐、行程、缓存和历史重放共享的公开契约。
        - Consequence: 字段、枚举、版本和兼容策略必须在 Contract 中绑定并验证，不能随页面实现漂移。
