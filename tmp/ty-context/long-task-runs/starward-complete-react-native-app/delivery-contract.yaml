  - key: ext-app-store-native-capability-readiness
    source_ref: docs/source-plan.md#external.app-store-native-capability-readiness
    statement: |-
      - **EXT app-store-native-capability-readiness**
        - Status: external_confirmation_required。
        - Result requiring confirmation: iOS/Android 目标商店和国内安卓渠道接受地图 SDK、自定义原生模块、前台/限时后台定位、通知、相机/相册、AR、传感器和 OAuth/微信登录的声明、用途与审核材料，并在目标真机/系统版本可用。
        - Why external: 商店政策、设备支持、证书/entitlement、厂商推送和 OAuth 审核是外部控制面，模拟器与源码无法证明。
        - Evidence needed: 支持设备/OS矩阵、权限用途文案、entitlement/证书/隐私清单、后台位置核心用途材料、厂商通道和 OAuth 审批、iOS back gesture/Android predictive back 与自定义手势兼容、internal/staging 真机安装及商店审核结果。
        - Affected REQ / AC: REQ permission-minimization, REQ optional-ar, REQ safety-session, REQ event-driven-evaluation, REQ auth-methods, AC ar-degradation, AC bounded-safety-session, AC long-term-controls, DEC supported-os-device-matrix。
    disposition:
      type: external_confirmation
      refs:
        - app-store-native-capability-readiness
  - key: ext-astronomy-authoritative-validation
    source_ref: docs/source-plan.md#external.astronomy-authoritative-validation
    statement: |-
      - **EXT astronomy-authoritative-validation**
        - Status: external_confirmation_required。
        - Result requiring confirmation: 日月/行星/银河/晨昏/升中落/坐标转换和空间站结果在已声明适用范围、时标、海拔和容差内与 JPL Horizons 或另一个经确认权威基准一致。
        - Why external: 自有算法测试能证明一致性，不能自行定义“权威正确”或可接受科学容差。
        - Evidence needed: 基准来源/版本、黄金地点/时刻、容差理由、对比结果、例外（极区/折射/轨道过期）和天文领域审阅。
        - Affected REQ / AC: REQ astronomy-domain, REQ astronomy-golden-tests, REQ station-transits, AC astronomy-provenance, AC test-coverage, DEC observation-window-resolution。
    disposition:
      type: external_confirmation
      refs:
        - astronomy-authoritative-validation
  - key: ext-china-production-legal-readiness
    source_ref: docs/source-plan.md#external.china-production-legal-readiness
    statement: |-
      - **EXT china-production-legal-readiness**
        - Status: external_confirmation_required。
        - Result requiring confirmation: 面向中国用户生产发布所需 ICP/应用备案（如适用）、地图与测绘边界、个人信息/敏感行踪单独同意、数据跨境/境内存储、CDN/对象存储、第三方 SDK 清单、隐私政策/条款/注销、未成年人/社群与地点安全责任边界均完成专业审查和实际配置。
        - Why external: 法律适用、主体资质、云区域、SDK/商店申报和政策文本依赖运营主体与最终供应商，不能由产品/代码自证。
        - Evidence needed: 法律/合规评审记录、备案/许可编号或不适用依据、数据流/SDK 清单、同意与保留表、跨境评估、政策版本和生产域/存储/CDN配置核验。
        - Affected REQ / AC: REQ china-production-compliance, REQ location-privacy-controls, REQ data-export, REQ account-deletion, AC china-compliance-readiness, DEC data-retention-deletion, DEC analytics-consent-policy。
    disposition:
      type: external_confirmation
      refs:
        - china-production-legal-readiness
  - key: ext-commercial-provider-rights-and-quotas
    source_ref: docs/source-plan.md#external.commercial-provider-rights-and-quotas
    statement: |-
      - **EXT commercial-provider-rights-and-quotas**
        - Status: external_confirmation_required。
        - Result requiring confirmation: QWeather 常规/预警/AQI/GeoAPI、Open-Meteo 商业分层云/多模型、其他卫星云图/备用天气、高德原生地图/定位/搜索/路线/POI/双端离线、APNs/FCM/国内厂商/Expo 推送以及 OSS/COS/CDN 具备目标地区/渠道的生产商业使用、缓存/历史保留、派生、再展示/再分发、配额/加权计费单位、SLA、归属和退出/删除许可；最低必要 SKU 的当日报价、币种/税费/最低消费、超额/续费/退出成本和 12 个月 TCO 可与等价合格候选比较。
        - Why external: API 文档与技术可行不构成购买合同、配额或再分发授权，仓库无法证明。
        - Evidence needed: 生效合同/计划、许可条款版本、允许用途/地区/缓存/派生、quota/rate limit/SLA、归属要求、密钥环境、退出/删除义务、价格页面/正式报价/订单、税费/汇率日期、加权用量和实际账单；供应商宣传或免费页面不能代替合同与目标区 POC。
        - Affected REQ / AC: REQ weather-map-layers, REQ route-map-planning, REQ provider-source-registry, REQ qualified-lowest-tco-selection, REQ provider-failure-controls, AC source-pipelines, AC qualified-lowest-tco-provider-selection, DEC weather-provider-contracts, DEC provider-budget-and-paid-redundancy。
    disposition:
      type: external_confirmation
      refs:
        - commercial-provider-rights-and-quotas
  - key: ext-geospatial-catalog-content-licenses
    source_ref: docs/source-plan.md#external.geospatial-catalog-content-licenses
    statement: |-
      - **EXT geospatial-catalog-content-licenses**
        - Status: external_confirmation_required。
        - Result requiring confirmation: NSMC FY-4B/后续业务星或其他卫星云图、EOG Annual VNL v2.2、Copernicus DEM GLO-30/90（含 2026-07-28 后 CCM 访问/许可接受）、Gaia/其他星表、Astronomy Engine、CelesTrak OMM、JPL/NOAA 数据、地图底图/瓦片、NASA APOD/天文机构媒体及其 raw/COG/瓦片/动画/地平线/星表分块/离线包/截图的账号资格、自动化、许可、notice/credit、版本、修改标识和商业再分发范围适合目标地区/渠道；Himawari 等备用源不得越过 NMHS/研究/购买资格。
        - Why external: 数据集许可和在线服务规则会变化，派生/离线/商业分发权不能从本 Source Plan 推断。
        - Evidence needed: 官方许可/服务条款快照、来源与版本、商业/派生/缓存/离线/截图条款、必需 attribution、更新/撤下流程及法务确认。
        - Affected REQ / AC: REQ light-pollution-evidence, REQ astronomy-geo-pipelines, REQ educational-content, AC light-and-horizon, AC calendar-and-station, RISK dataset-license。
    disposition:
      type: external_confirmation
      refs:
        - geospatial-catalog-content-licenses
  - key: ext-outdoor-device-field-validation
    source_ref: docs/source-plan.md#external.outdoor-device-field-validation
    statement: |-
      - **EXT outdoor-device-field-validation**
        - Status: external_confirmation_required。
        - Result requiring confirmation: 代表性 iOS/Android 真机在真实山区/郊外、车辆/金属干扰、弱网/无网、冬夏温度、夜间低亮/红光、低电、前后台、最后一公里和长时天空条件下达到可用/降级/恢复行为；交互同时覆盖 press/cancel、地图/Sheet/滚动/back 仲裁、中断/反向/速度接缝、VoiceOver/TalkBack、文本放大、reduced motion、触觉关闭/不可用和红光无闪。
        - Why external: GPS、磁场、AR、亮度、电量、网络和道路/天气现场真实性无法由自动测试或室内设备完全模拟。
        - Evidence needed: 场地/日期/天气、设备/OS/传感器矩阵、已知方位/路线基准、断网/恢复步骤、截图/日志/误差/电量结果、失败与复测记录；样本不能冒充全设备总体。
        - Affected REQ / AC: REQ orientation-guidance, REQ outdoor-validation, REQ performance-slos, AC low-accuracy-guidance, AC offline-field-use, AC test-coverage, RISK sensor-observability。
    disposition:
      type: external_confirmation
      refs:
        - outdoor-device-field-validation
  - key: ext-photography-device-expert-validation
    source_ref: docs/source-plan.md#external.photography-device-expert-validation
    statement: |-
      - **EXT photography-device-expert-validation**
        - Status: external_confirmation_required。
        - Result requiring confirmation: 手机/相机/镜头预设、确定性曝光/拖线/堆栈/视场规则在代表性设备和目标上合理、安全、可操作，AI 解释未改变核心规则或制造虚假保证。
        - Why external: 规则单测不能证明真实设备可设置、成像取舍或用户经验分层合理。
        - Evidence needed: 设备/镜头/目标/条件样本、规则版本、专家审阅、实拍设置与结果、不可控因素、偏差/修改记录和 AI/规则差异审计。
        - Affected REQ / AC: REQ mobile-output, REQ camera-output, REQ deterministic-first-ai, AC mobile-plan, AC camera-plan-and-risk, RISK parameter-observability。
    disposition:
      type: external_confirmation
      refs:
        - photography-device-expert-validation
  - key: ext-site-access-safety-verification
    source_ref: docs/source-plan.md#external.site-access-safety-verification
    statement: |-
      - **EXT site-access-safety-verification**
        - Status: external_confirmation_required。
        - Result requiring confirmation: 首批/MVP 地点的坐标、土地/开放/收费/门禁、停车/徒步/最后一公里、设施、光源/遮挡、潮汐/山路/治安/生态风险和坐标公开级别有可追溯的人工/现场核验。
        - Why external: 公开 POI、遥感与用户单条上传不能证明夜间通行、安全、私人土地许可或设施开放。
        - Evidence needed: 地点级核验记录、日期/来源/证据、权利人或官方信息（适用时）、现场路线/照片/精度、季节性/过期计划和高风险复核。
        - Affected REQ / AC: REQ last-mile-access, REQ facilities-and-emergency, REQ spot-safety, REQ coordinate-visibility, AC last-mile-and-facilities, AC safety-overrides-score, RISK field-truth-observability。
    disposition:
      type: external_confirmation
      refs:
        - site-access-safety-verification
  - key: fs-ai-invented-exposure
    source_ref: docs/source-plan.md#forbidden-shortcut.ai-invented-exposure
    statement: "- **FS ai-invented-exposure**：AI 不得随意编造曝光参数，只能解释确定性规则和提供有依据的个性化建议。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.ai-invented-exposure
  - key: fs-ar-only-core
    source_ref: docs/source-plan.md#forbidden-shortcut.ar-only-core
    statement: "- **FS ar-only-core**：AR 不得成为天空/现场核心路径的唯一实现；不支持设备必须有通用天空或摄像头+传感器降级。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.ar-only-core
  - key: fs-client-side-source-stitching
    source_ref: docs/source-plan.md#forbidden-shortcut.client-side-source-stitching
    statement: "- **FS client-side-source-stitching**：移动端不得直接并发十几个供应商接口并在页面临时拼装结论；必须消费后端标准化、版本化、可解释的聚合结果。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.client-side-source-stitching
  - key: fs-coordinate-mixing
    source_ref: docs/source-plan.md#forbidden-shortcut.coordinate-mixing
    statement: "- **FS coordinate-mixing**：不得在业务层混用 WGS84/GCJ-02、反写高德坐标为权威值、用 GCJ-02 做天文计算或依赖肉眼修正。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.coordinate-mixing
  - key: fs-fake-or-guaranteed-data
    source_ref: docs/source-plan.md#forbidden-shortcut.fake-or-guaranteed-data
    statement: "- **FS fake-or-guaranteed-data**：不得用看似真实的 fixture/fallback 遮蔽缺失，也不得使用“绝对晴朗、保证可见”等确定性承诺。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.fake-or-guaranteed-data
  - key: fs-lowest-sticker-price-provider
    source_ref: docs/source-plan.md#forbidden-shortcut.lowest-sticker-price-provider
    statement: "- **FS lowest-sticker-price-provider**：不得因免费额度或最低接口/套餐标价选择未通过来源可追溯、目标区质量/稳定性、商业许可和安全降级硬门的数据源，也不得通过漏算加权调用、计算/存储/出网、工程运维、合规、故障或迁移成本伪造“最低价”。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.lowest-sticker-price-provider
  - key: fs-online-only-field-mode
    source_ref: docs/source-plan.md#forbidden-shortcut.online-only-field-mode
    statement: "- **FS online-only-field-mode**：仅联网可用的现场模式不算完成。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.online-only-field-mode
  - key: fs-static-screen-completion
    source_ref: docs/source-plan.md#forbidden-shortcut.static-screen-completion
    statement: "- **FS static-screen-completion**：静态设计稿、预览 Kit、无真实状态流的页面壳或单一平台演示不能算 APP 完成。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.static-screen-completion
  - key: fs-unexplained-single-score
    source_ref: docs/source-plan.md#forbidden-shortcut.unexplained-single-score
    statement: "- **FS unexplained-single-score**：不得用一个无拆分、无阻断、无可信度、无原因的总分代表推荐。"
    disposition:
      type: global_constraint
      refs:
        - forbidden_shortcut.unexplained-single-score
  - key: global-ac-accessible-mode-state
    source_ref: docs/source-plan.md#cross-outcome.acceptance.accessible-mode-state
    statement: |-
      - **AC accessible-mode-state**
        - Accepts: OBL accessible-responsive-themes
        - Given: 用户使用大字体、屏幕阅读器、reduced motion 和红光模式在小屏手机打开含错误/disabled 状态的地图或现场页。
        - When: 读取状态并操作主要控件。
        - Then: 安全区/内容/底部动作不重叠，焦点与名称有序、44px 目标可触、状态不只靠颜色且无高亮闪烁。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.accessible-mode-state
  - key: global-ac-context-atomicity
    source_ref: docs/source-plan.md#cross-outcome.acceptance.context-atomicity
    statement: |-
      - **AC context-atomicity**
        - Accepts: OBL shared-decision-context, OBL conclusion-action-evidence-hierarchy
        - Given: 用户在地图把备选 B 设为主地点并把时刻改到月落后。
        - When: 随后进入今晚、地点、行程、天空、摄影和现场。
        - Then: 各处共享 B/新时刻/路线与风险或明确标尚未重算，首层结论/行动和下钻证据不互相矛盾。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.context-atomicity
  - key: global-ac-offline-restart-recovery
    source_ref: docs/source-plan.md#cross-outcome.acceptance.offline-restart-recovery
    statement: |-
      - **AC offline-restart-recovery**
        - Accepts: OBL offline-critical-continuity
        - Given: 用户断网记录实况并上传图片时 APP 被系统终止。
        - When: 重启后仍离线，再恢复网络。
        - Then: 关键缓存和草稿/队列恢复，写入按幂等键续传且失败/冲突可见，不重复发布或丢用户数据。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.offline-restart-recovery
  - key: global-ac-partial-data-language
    source_ref: docs/source-plan.md#cross-outcome.acceptance.partial-data-language
    statement: |-
      - **AC partial-data-language**
        - Accepts: OBL data-state-and-provenance
        - Given: 天气最新、路线缓存、光污染为年度估算且临时实况缺失。
        - When: 任一用户面组合这些数据形成结论。
        - Then: 四类状态/时间/来源/版本/可信度分别可见，partial/degraded 结论不使用保证性语言且能查看缺失影响。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.partial-data-language
  - key: global-ac-permission-denial-and-privacy
    source_ref: docs/source-plan.md#cross-outcome.acceptance.permission-denial-and-privacy
    statement: |-
      - **AC permission-denial-and-privacy**
        - Accepts: OBL permission-and-privacy-minimization
        - Given: 游客拒绝精确/后台位置、相机和通知。
        - When: 使用今晚、地图、天空和行程并打开相关增强入口。
        - Then: 手动位置/静态天空/前台计时/本地设置等允许降级可用，系统不循环请求权限，服务/日志/分析/分享没有越权精确数据。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.permission-denial-and-privacy
  - key: global-ac-release-scope-boundary
    source_ref: docs/source-plan.md#cross-outcome.acceptance.release-scope-boundary
    statement: |-
      - **AC release-scope-boundary**
        - Accepts: OBL release-phase-integrity
        - Given: MVP 排期同时出现 V3 AR 和小程序分享提案。
        - When: 后续长程工作流拆分交付范围。
        - Then: MVP 必做闭环保持可运行，V3/小程序可延后且不会以空壳阻塞；PWA/小程序不能替代 RN APP 的最终完成证明。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.release-scope-boundary
  - key: global-ac-time-coordinate-consistency
    source_ref: docs/source-plan.md#cross-outcome.acceptance.time-coordinate-consistency
    statement: |-
      - **AC time-coordinate-consistency**
        - Accepts: OBL time-coordinate-unit-consistency
        - Given: 用户与地点跨时区、观星夜跨午夜且高德地图显示 GCJ-02。
        - When: 生成报告、路线、天空、离线包和分享摘要。
        - Then: 天文/天气/存储均用同一 WGS84/UTC/IANA 语义，展示本地时间/单位明确，高德转换不反写权威坐标且无无时区时间串。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.time-coordinate-consistency
  - key: global-ac-versioned-conflict-recovery
    source_ref: docs/source-plan.md#cross-outcome.acceptance.versioned-conflict-recovery
    statement: |-
      - **AC versioned-conflict-recovery**
        - Accepts: OBL versioned-recoverable-change
        - Given: 用户编辑、管理员事实更新和后台重试同时涉及同一计划/地点引用。
        - When: revision 或业务键冲突发生。
        - Then: 原始/已保存版本保留，冲突/影响可预览并由授权流程解决，重试不重复覆盖且恢复点可追溯。
    disposition:
      type: acceptance
      refs:
        - GLOBAL.global-acceptance.versioned-conflict-recovery
  - key: global-obl-accessible-responsive-themes
    source_ref: docs/source-plan.md#cross-outcome.obligation.accessible-responsive-themes
    statement: "- **OBL accessible-responsive-themes** [repo evidence + necessary derivation: S-DESIGN/S-CONTEXT]：所有 APP 页面以 390×844 为主要基线并适配更小/更大手机、安全区、横竖屏（仅适用沉浸工具）、文本放大和键盘；44px 目标、屏幕阅读器顺序/名称、颜色非唯一、reduced motion、日/夜/红光对比与稳定布局必须覆盖 loading/empty/no-results/error/disabled/saving/success。"
    disposition:
      type: global_constraint
      refs:
        - constraint.accessible-responsive-themes
  - key: global-obl-conclusion-action-evidence-hierarchy
    source_ref: docs/source-plan.md#cross-outcome.obligation.conclusion-action-evidence-hierarchy
    statement: "- **OBL conclusion-action-evidence-hierarchy** [direct: S-PRODUCT 八, S-DESIGN]：用户面产品统一按第一层“今晚是否值得/何时何地”、第二层“出发/导航/主备/提醒”等可执行建议、第三层天气/天文/光污染/路线/来源专业证据组织；高级数据按需展开，安全阻断始终越级可见。"
    disposition:
      type: global_constraint
      refs:
        - constraint.conclusion-action-evidence-hierarchy
  - key: global-obl-data-state-and-provenance
    source_ref: docs/source-plan.md#cross-outcome.obligation.data-state-and-provenance
    statement: "- **OBL data-state-and-provenance** [direct: S-ARCH 7.1/9.4, S-PRODUCT 风险]：所有影响决策的数据/结论能表示 loading、fresh、stale、partial、degraded、unknown、error，显示 generatedAt/expiresAt、来源/许可、版本、可信度、warnings 和缓存/缺失；预测/估算/用户实况/人工核验不能混成确定事实。"
    disposition:
      type: global_constraint
      refs:
        - constraint.data-state-and-provenance
  - key: global-obl-offline-critical-continuity
    source_ref: docs/source-plan.md#cross-outcome.obligation.offline-critical-continuity
    statement: "- **OBL offline-critical-continuity** [direct: S-ARCH 3.3～3.4]：现场关键读取本地优先，网络刷新不清空可用缓存；离线写入本地事务与幂等队列，断网/杀进程/重启后可恢复；同步失败/冲突逐项可见，不能用在线专属页面壳声称离线完成。"
    disposition:
      type: global_constraint
      refs:
        - constraint.offline-critical-continuity
  - key: global-obl-permission-and-privacy-minimization
    source_ref: docs/source-plan.md#cross-outcome.obligation.permission-and-privacy-minimization
    statement: "- **OBL permission-and-privacy-minimization** [direct: S-ARCH 3.5/15]：登录、精确/后台位置、相机/相册、通知、联系人、AR 和外部分享按任务最小化、即时说明、拒绝可降级/撤回；服务端执行坐标/对象/字段权限，精确位置/轨迹/EXIF/secret 不进分析、普通日志或公开产物。"
    disposition:
      type: global_constraint
      refs:
        - constraint.permission-and-privacy-minimization
  - key: global-obl-release-phase-integrity
    source_ref: docs/source-plan.md#cross-outcome.obligation.release-phase-integrity
    statement: "- **OBL release-phase-integrity** [direct: S-PRODUCT 十～十二]：MVP/V1/V2/V3 范围按 Section 3 保存；提前实现后续能力可以，但不得让 V2/V3 空壳成为 MVP 前置，也不得因后续目标尚未实现而把 MVP 的外部导航/简单行程/基础摄影/轻贡献降为静态占位；最终产品形态仍为 RN APP。"
    disposition:
      type: global_constraint
      refs:
        - constraint.release-phase-integrity
  - key: global-obl-shared-decision-context
    source_ref: docs/source-plan.md#cross-outcome.obligation.shared-decision-context
    statement: "- **OBL shared-decision-context** [direct + repo evidence: S-PRODUCT 闭环, S-CONTEXT]：当前位置/手动出发地、观星夜/时刻、当前偏好、观测目标、选中地点、主备角色、路线方案、行程 revision、数据新鲜度和风险是共享决策上下文；今晚、地图、详情、行程、天空、摄影和现场切换时必须原子更新或显式标 stale，不能各页维护互相矛盾副本。"
    disposition:
      type: global_constraint
      refs:
        - constraint.shared-decision-context
  - key: global-obl-time-coordinate-unit-consistency
    source_ref: docs/source-plan.md#cross-outcome.obligation.time-coordinate-unit-consistency
    statement: "- **OBL time-coordinate-unit-consistency** [direct: S-ARCH 6.1/7.1/19.3～19.4]：存储与计算用 WGS84、UTC、地点 IANA 时区和国际单位，观星夜按当地日落日期；展示可本地化单位但 API/缓存/离线/分享保留原单位/时区/坐标语义，禁止无时区时间或无品牌坐标 tuple。"
    disposition:
      type: global_constraint
      refs:
        - constraint.time-coordinate-unit-consistency
  - key: global-obl-versioned-recoverable-change
    source_ref: docs/source-plan.md#cross-outcome.obligation.versioned-recoverable-change
