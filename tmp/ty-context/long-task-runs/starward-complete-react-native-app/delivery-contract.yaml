  - key: admin-data-operations
    title: 数据管线、运营治理与推荐重放
    depends_on:
      - forecast-and-astronomy
      - map-route-discovery
      - spot-detail-and-trust
      - community-contribution
      - notifications-and-toolbox
      - identity-profile-privacy
    product:
      observable_result: 获授权运营人员可在强认证后台维护/合并/关闭观星点，处理媒体/实况/评论/纠错和风险，查看天气/天文/地图/路线/光污染等数据源运行、版本、许可、缺失与成本，管理失败任务和缓存/预热，以具体 NightReport 快照重放评分/窗口/主备结果并比较规则版本；所有变更经过服务端权限、校验、审计和可恢复版本，不直接覆盖原始数据。
      owner:
        label: admin-data-operations owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/admin-web/**
          - apps/api/src/modules/admin/**
          - workers/**
          - data-pipelines/**
          - packages/contracts/**
      requirements:
        - key: domain-module-coverage
          statement: "- **REQ domain-module-coverage** [direct: S-ARCH 五]：后端模块化单体覆盖 Identity、Profile、Spot、Weather、Astronomy、Geo Environment、Route、Recommendation、Night Report、Itinerary、Collaboration、Field Report、Shooting、Notification 和 Admin；跨模块只经明确领域接口/事件，不能把业务逻辑堆进 Controller 或客户端。"
          required_proof_surfaces:
            - api_contract
        - key: core-entity-coverage
          statement: "- **REQ core-entity-coverage** [direct: S-ARCH 7.2]：核心实体至少包含 User、UserPreferenceProfile、Equipment、Spot、SpotAccess、SpotFacility、SpotHorizonSector、SpotMedia、SpotVerification、SpotStatusHistory、WeatherProviderRun、WeatherForecastHour、AstronomyEphemeris、ObservationWindow、LightPollutionCell、HorizonProfile、RouteEstimate、NightReport、RecommendationSnapshot、Itinerary、ItineraryStop、FieldReport、ShootingPlan、CelestialEvent、NotificationSubscription、DataSourceRun、DataQualityIssue、ModerationCase、AuditLog。"
          required_proof_surfaces:
            - api_contract
        - key: provider-source-registry
          statement: "- **REQ provider-source-registry** [direct + external research: S-ARCH 六, S-USER, S-RESEARCH]：每类外部/计算源保存供应商、许可/条款版本、用途、覆盖、归属文本、缓存/派生/再分发/终止边界、版本/运行批次、分辨率、获取/发布时间、状态、成本/计费单位、quota/rate/SLA 和健康；同时保存价格证据日期/币种/税费/汇率日期、免费量/最低消费/合同期、加权计费规则、1k/10k/100k MAU 用量、直接与隐性成本、12 个月 TCO、有效新鲜输出成本、硬门结果、预算/用量告警、续费/退出和批准记录。天气统一 WeatherProvider（forecast/current/warnings/health）。当前推荐中国常规天气/预警以 QWeather 按量候选、Open-Meteo 免费端点仅作非商业 POC且付费端点仅作经价值验证的候选、ECMWF Open Data 作离线基准/备用研究；这不表示合同已批准，生产组合由 DEC weather-provider-contracts、DEC provider-budget-and-paid-redundancy 与 EXT commercial-provider-rights-and-quotas 确认。"
          required_proof_surfaces:
            - ui_browser
        - key: qualified-lowest-tco-selection
          statement: "- **REQ qualified-lowest-tco-selection** [direct + external research: S-USER, S-RESEARCH]：每项数据/地图/路线/推送/对象存储能力先以不可被价格抵消的硬门筛选候选：来源/字段/版本/run/时间/修改链可追溯且同地点/时段/单位对照通过批准的真实性阈值；首发地区/目标网络的到达率、新鲜度、完整度、延迟、错误/限流/恢复通过批准的稳定性阈值；商业许可、归属、缓存/派生/再分发/地域/终止边界可证；健康、过期、熔断、迁移和诚实降级可实施。任一硬门失败即淘汰；只在提供等价最小必需能力的合格候选中，以同一日期/币种/税费、同一容量/失败场景选择预计 12 个月 TCO 最低者。默认每项能力只购买一个合格主源，以合法缓存、本地计算、开放基准或 `unknown`/隐藏降级作后备；第二付费源、套餐升级和预算上限由 DEC provider-budget-and-paid-redundancy 批准。"
          required_proof_surfaces:
            - ui_browser
        - key: astronomy-geo-pipelines
          statement: "- **REQ astronomy-geo-pipelines** [direct + external research: S-ARCH 6.3～6.7, S-RESEARCH]：Astronomy Engine/自有包记录算法/星表/观察者/海拔/计算时间/time scale 并以 JPL 低频黄金集验证；Gaia 星表按批准字段/星等/epoch 裁切和 HEALPix 分块并保留 release/MD5/credits/known issues；CelesTrak 使用支持六位 catalog number 的 OMM JSON/CSV + SGP4、保存 epoch/内容 hash/获取时间，服务端不短于上游两小时更新政策且任一非 200 立即停止重试并告警。EOG Annual VNL v2.2 原始 GeoTIFF（EPSG:4326、15 arc-second、radiance+coverage）保留 CC BY 4.0 notice/修改/版本/checksum，经不可变 raw→裁剪/COG/overviews/瓦片/网格指数；零值结合 cloud-free coverage，radiance 不直译实测 Bortle。Copernicus DEM GLO-30/90 经 CCM 注册/适用许可合法获取，保留补缺/nodata/DSM provenance 并预计算带算法版本/采样参数的地平线，不运行时依赖可变在线 View Service；2026-07-28 GLO-30 访问变化必须在实施日复核。"
          required_proof_surfaces:
            - ui_browser
        - key: aggregate-rest-api
          statement: "- **REQ aggregate-rest-api** [direct: S-ARCH 九]：移动端主要 API 采用 REST/OpenAPI/JSON `/v1`、Idempotency-Key、ETag、游标分页、标准错误码和生成 TypeScript Client，不以 GraphQL 作为主接口；保留 `/night-reports`、`/spots`/corrections、`/forecasts`、`/astronomy/state|events`、`/sky/catalog-manifest`、`/routes/estimate`、`/itineraries`/offline-pack、`/field-reports`、`/media/uploads`、`/shooting-plans`、`/sync/changes|operations`、`/map-tiles/{layer}/{z}/{x}/{y}` 语义。"
          required_proof_surfaces:
            - api_contract
        - key: response-data-status
          statement: "- **REQ response-data-status** [direct: S-ARCH 9.4]：聚合响应统一携带 generatedAt、expiresAt、dataFreshness、confidence、sources、warnings、partial；部分供应商失败可返回降级结果，但逐项说明缺失、缓存来源和降低的结论可信度。"
          required_proof_surfaces:
            - api_contract
        - key: four-layer-cache
          statement: "- **REQ four-layer-cache** [direct: S-ARCH 十]：缓存分 L1 设备 SQLite/文件、L2 CDN 瓦片/图片/星表/静态、L3 Redis 接口/聚合、L4 PostgreSQL 规范化/物化；使用请求合并、分布式锁、Single Flight、TTL 抖动、stale-while-revalidate、热门预热和新模型批量预计算；键含网格、观星夜、Profile Hash、目标、天气/规则/光污染版本。"
          required_proof_surfaces:
            - data_state
        - key: cache-freshness-policy
          statement: "- **REQ cache-freshness-policy** [direct: S-ARCH 10.2]：来源建议 TTL 保留为基线：当前天气 5～15 分钟；小时天气 30 分钟～3 小时；当前夜间报告 10～20 分钟；未来报告 1～3 小时；天文日/银河长期至算法变更；光污染/地形/图片版本化永久；路线基础 6～24 小时、交通路线 5～30 分钟；地点 10～30 分钟；实况 1～5 分钟；生产精确值由 DEC cache-ttl-policy 决定。"
          required_proof_surfaces:
            - data_state
        - key: background-job-catalog
          statement: "- **REQ background-job-catalog** [direct: S-ARCH 11.1]：任务目录覆盖 weather.ingest、weather.normalize、weather.quality-check、astronomy.precompute、light-pollution.import、light-pollution.tiles、terrain.import、terrain.horizon、satellite.orbit-update、notification.evaluate、media.process、moderation.scan、night-report.prewarm、data-retention.cleanup。"
          required_proof_surfaces:
            - ui_browser
        - key: job-reliability
          statement: "- **REQ job-reliability** [direct: S-ARCH 11.2]：每个任务幂等、可重试、有唯一业务键、记录输入/输出版本和耗时、失败死信、可人工重放，不重复覆盖有效数据；批量任务有 dry-run/范围/速率/暂停/恢复和结果摘要。"
          required_proof_surfaces:
            - ui_browser
        - key: provider-failure-controls
