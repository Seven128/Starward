        label: forecast-and-astronomy owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/forecast/**
          - apps/mobile/public/forecast-capabilities.json
          - apps/api/src/modules/forecast/**
          - workers/weather/**
          - packages/domain/src/forecast/**
          - packages/astronomy-core/**
          - packages/weather-schema/**
      requirements:
        - key: hourly-forecast
          statement: "- **REQ hourly-forecast** [direct: S-PRODUCT 6.3A]：按小时展示晴/多云/阴/雨/雷雨等天气、总云、高云（产品解释为 5km 以上）、中云（2～5km）、低云（2km 以下）、天空通透度、视宁度/实验性稳定度、地面水平能见度、温度/体感、湿度、露点/结露风险、小时降水量/概率、风速/阵风/风向、气压/变化参考、AQI、雾概率和月亮亮度/方位/高度；若供应商层定义不同必须说明并标准化，不能只换标签。"
          required_proof_surfaces:
            - ui_browser
        - key: model-comparison
          statement: "- **REQ model-comparison** [direct: S-PRODUCT 6.3B, S-ARCH 6.1]：高级模式显示主模型、对比模型、晴天钟式模型、分歧和可信度；普通用户看到系统解释而非被迫自行判读。"
          required_proof_surfaces:
            - ui_browser
        - key: fifteen-day-trend
          statement: "- **REQ fifteen-day-trend** [direct: S-PRODUCT 6.3C]：15 日趋势包括每日天气、高低温、云量、降雨、月相/月升落、无月黑夜长度、银河窗口和观星等级；远期明确低可信度。"
          required_proof_surfaces:
            - ui_browser
        - key: twilight-timeline
          statement: "- **REQ twilight-timeline** [direct: S-PRODUCT 6.3D]：按夜晚 → 天文晨光 → 航海晨光 → 民用晨光 → 白天 → 民用昏影 → 航海昏影 → 天文昏影 → 夜晚连续展示，并提炼完全天黑、无月黑夜和最佳观星三个结果。"
          required_proof_surfaces:
            - ui_browser
        - key: weather-map-layers
          statement: "- **REQ weather-map-layers** [direct: S-PRODUCT 6.3E]：提供卫星云图、云量、雾、降雨、风场、空气质量、光污染和综合指数图层；每层显示数据源、生成/下次更新时间、透明度和图例。"
          required_proof_surfaces:
            - ui_browser
        - key: astronomy-domain
          statement: "- **REQ astronomy-domain** [direct: S-ARCH 5.5/6.3]：计算日升落、三类蒙影、月相/照明/月升落、行星、银河、天体升起/中天/落下、无月黑夜、窗口、星图状态、日月食与天象事件；服务端为权威，客户端可离线计算动画。"
          required_proof_surfaces:
            - runtime_behavior
        - key: milky-way-visibility
          statement: "- **REQ milky-way-visibility** [direct: S-ARCH 6.4]：银河可见性联合天文黑夜、月光、云量、光污染、核心高度、目标方向遮挡和通透度，并提供升起/中天/落下、方位、高度、拱桥姿态及时间交集。"
          required_proof_surfaces:
            - ui_browser
        - key: transparency-seeing-boundary
          statement: "- **REQ transparency-seeing-boundary** [direct: S-ARCH 6.2]：首期称“通透度估计”，输入高/中/低云、能见度、湿度、露点差、PM2.5、PM10、气溶胶、海拔和月光，输出估计等级、原始因素、可信度与不确定性；数据模型保留 seeing_provider_value、seeing_estimated_value、seeing_confidence、seeing_method_version，无明确专业模型/现场校准时只能显示“实验性大气稳定度”。"
          required_proof_surfaces:
            - runtime_behavior
        - key: satellite-data
          statement: "- **REQ satellite-data** [direct: S-ARCH 6.5]：空间站/亮星卫星使用带 epoch 的 OMM JSON 与 SGP4，考虑太阳照明和观察位置；空间站 6～12 小时、一般亮星卫星每日更新，过期时降低可信度。"
          required_proof_surfaces:
            - runtime_behavior
        - key: time-coordinate-provenance
          statement: "- **REQ time-coordinate-provenance** [direct: S-ARCH 6.3/7.1/19.4]：所有时间权威保存 UTC、地点保存 IANA 时区、API 不接受无时区字符串；天文结果记录算法/星表版本、观察位置/海拔、计算时间和 time scale。"
          required_proof_surfaces:
            - runtime_behavior
        - key: hourly-matrix-user-task
          statement: "  - User task: 比较连续小时和专业指标。"
          required_proof_surfaces:
            - ui_browser
        - key: model-selector-user-task
          statement: "  - User task: 查看主模型、对比模型和分歧解释。"
          required_proof_surfaces:
            - ui_browser
        - key: trend-calendar-user-task
          statement: "  - User task: 选择未来日期进行周末规划。"
          required_proof_surfaces:
            - ui_browser
        - key: twilight-window-strip-user-task
          statement: "  - User task: 判断天黑、无月和最佳窗口的连续关系。"
          required_proof_surfaces:
            - ui_browser
        - key: weather-layer-panel-user-task
          statement: "  - User task: 切换一个主要栅格/矢量气象层并理解图例。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-seeing-data-source
          statement: "  - Approved resolution (owner, 2026-07-20): MVP/V1 只显示可解释的通透度估计及输入/置信度，正式“视宁度”字段为 disabled/数据未获验证，不用普通天气变量生成一个看似客观的 arcsec 数字；实验性大气稳定度仅可在明确“实验”开关内显示且不参与安全硬阻断。只有专业源许可、目标区域/设备范围、与现场或权威样本的容差、版本和 reviewer 全部通过后，才在通过区域启用正式视宁度并保留旧版重放。"
          required_proof_surfaces:
            - runtime_behavior
