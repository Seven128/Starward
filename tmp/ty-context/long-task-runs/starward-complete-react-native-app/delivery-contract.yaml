  - key: community-contribution
    title: 地点贡献、实况、评价与纠错
    depends_on:
      - spot-detail-and-trust
      - identity-profile-privacy
      - field-offline-safety
    product:
      observable_result: 用户可围绕观星地点/行程提交新地点、结构化长期事实、限时现场实况、图片、多维评价和纠错；提交可离线暂存、经过归属/隐私/审核后显示明确状态，长期事实与当晚临时状态不会互相覆盖，争议和确认数量可见；MVP 保持轻社区，不扩展为通用信息流或私信网络。
      owner:
        label: community-contribution owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/community/**
          - apps/api/src/modules/community/**
          - workers/media/**
          - packages/domain/src/community/**
      requirements:
        - key: new-spot-submission
          statement: "- **REQ new-spot-submission** [direct: S-PRODUCT 场景/6.11A]：新地点提交包含地图选点/经纬度、名称、实景图、拍摄日期/时间/镜头方向、地点描述、可观测/适合拍摄方向、交通方式、驾车与徒步路线、停车/搬运、主观实际光污染和观测体验、四周遮挡、厕所/平台/露营等设施及安全提示；坐标精度、来源、公开级别和是否私人/敏感土地必须显式确认。"
          required_proof_surfaces:
            - ui_browser
        - key: field-report-submission
          statement: "- **REQ field-report-submission** [direct: S-PRODUCT 6.11B]：实况包含当前云量、银河可见、实际能见度、风、雾、现场人数、临时灯光、道路状态、现场图片和到达时间；单位/枚举/unknown 明确，自动位置/时间可由用户核对。"
          required_proof_surfaces:
            - ui_browser
        - key: long-term-vs-transient
          statement: "- **REQ long-term-vs-transient** [direct: S-PRODUCT 6.11B, S-ARCH 5.12]：厕所、停车容量、直达、常规光源、永久遮挡等长期事实与云量/能见度/雾/人数/临时道路/厕所关闭/临时照明/银河可见等实况分离；临时实况必须有 TTL，不能永久覆盖长期事实。"
          required_proof_surfaces:
            - ui_browser
        - key: correction-categories
          statement: "- **REQ correction-categories** [direct: S-PRODUCT 6.11C]：纠错支持地点不存在、坐标错误、道路无法通行、已关闭、图片不属该地、设施过期和安全风险，并允许证据、位置/时间、紧急程度和联系偏好；安全类优先进入运营处置。"
          required_proof_surfaces:
            - ui_browser
        - key: contribution-trust-display
          statement: "- **REQ contribution-trust-display** [direct: S-PRODUCT 6.11D]：每条地点数据展示上传者（按隐私可匿名）、更新时间、验证状态、确认用户数、最近有效实况和争议；用户能查看自己的草稿、排队、处理中、待审核、已发布、驳回/需补充与撤回状态。"
          required_proof_surfaces:
            - ui_browser
        - key: light-community-scope
          statement: "- **REQ light-community-scope** [direct: S-PRODUCT 6.11E]：MVP 社区仅评论、多维评分、图片、实况、纠错和行程分享；不建设通用信息流、关注/粉丝、私信或与观星决策无关动态，且不得以参考图扩展此范围。"
          required_proof_surfaces:
            - ui_browser
        - key: media-upload-privacy
          statement: "- **REQ media-upload-privacy** [direct: S-ARCH 12, 15]：上传前说明公开范围并预览/移除 GPS、设备序列和隐私 EXIF；拍摄时间/方向/参数由用户作为结构化字段确认，原始 EXIF 仅可在明确授权后内部留作审核证据。"
          required_proof_surfaces:
            - ui_browser
        - key: contribution-moderation
          statement: "- **REQ contribution-moderation** [direct: S-ARCH 5.15]：新地点、媒体、实况、评论/评分和纠错具有自动扫描、重复/归属检查、人工审核、举报、申诉/补充和审计路径；具体自动发布、贡献等级与确认阈值由 DEC moderation-trust-policy 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: new-spot-wizard-user-task
          statement: "  - User task: 提交可核验的新观星点。"
          required_proof_surfaces:
            - ui_browser
        - key: field-report-form-user-task
          statement: "  - User task: 快速报告当晚临时条件。"
          required_proof_surfaces:
            - ui_browser
        - key: multidimensional-review-form-user-task
          statement: "  - User task: 以多维评分、短评和媒体记录亲历体验。"
          required_proof_surfaces:
            - ui_browser
        - key: correction-report-user-task
          statement: "  - User task: 报告具体错误或安全风险并提供证据。"
          required_proof_surfaces:
            - ui_browser
        - key: media-privacy-review-user-task
          statement: "  - User task: 查看将公开的图像和结构化拍摄信息并去除敏感数据。"
          required_proof_surfaces:
            - ui_browser
        - key: contribution-status-center-user-task
          statement: "  - User task: 查看草稿、同步、审核、争议、补充和发布结果。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-moderation-trust-policy
          statement: "  - Approved resolution (owner, 2026-07-20): 新地点、坐标/门禁/停车/安全更改、媒体和永久设施在 MVP 全部人工审核；普通登录用户可发布带 `unverified` 的低风险结构化临时实况，云/天空 TTL 2h，拥挤/停车/道路 TTL 4h，设施临时不可用 TTL 24h，风险报告立即显示“待核实警告”且 6h 未确认即过期/降级。完成至少 5 次通过审核、争议率 ≤10% 的贡献者才可短期自动发布低风险实况；两个独立到访确认提高可信度，位置证明只保存必要派生事实。高风险报告 2h 内初审、其他 24h，争议冻结自动聚合并进入人工队列，申诉 7 天内响应；所有阈值/TTL 可配置、版本化并防刷，不把信誉替代来源与新鲜度。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - contribution flows
        - moderation status
        - media privacy pipeline
      controls:
        - key: new-spot-wizard
          location: "  - Location: 地图空状态/新增、地点贡献入口。"
          trigger: "  - Trigger: 点击“上传新地点”或在地图长按选点。"
          input: "  - Input: REQ new-spot-submission 全部字段、坐标精度/访问级别和重复候选。"
