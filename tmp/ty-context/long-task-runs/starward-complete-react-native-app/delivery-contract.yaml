    technical:
      obligations:
        - key: token-security
          statement: "- **OBL token-security** [direct: S-ARCH 5.1, 15.4]：全链路 HTTPS；access 短期、refresh 轮换/撤销且绑定 device session；令牌进 SecureStore，第三方 key 只在服务端/受限原生配置；认证接口限流/风险控制/日志脱敏。"
          required_proof_surfaces:
            - data_state
            - implementation_structure
            - security_boundary
            - ui_browser
        - key: privacy-enforcement-server-side
          statement: "- **OBL privacy-enforcement-server-side** [direct: S-ARCH 15]：坐标/行程/媒体/导出/删除/协作权限由服务端对象级和字段级授权执行，客户端隐藏不构成安全边界；敏感操作审计且不把敏感字段写日志/遥测。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-data-retention-deletion
          statement: "  - Approved resolution (owner, 2026-07-20): 采用最小保留基线并由中国法务门复核：未显式保存的精确位置/安全轨迹在会话结束 24h 内删除，联系人授权在会话/邀请结束 24h 内删除；上传原图/EXIF 处理成功 24h 后删除并只留去 EXIF 派生物；应用诊断日志 30d、原始产品分析 90d、聚合指标 13 个月、安全/权限/审核证据 180d，备份最长 90d。用户行程/收藏/媒体在主动删除或注销前保留；注销立即撤销会话与分享，提供 7d 可撤销冷静期，之后 30d 内从主系统清除、90d 内自然退出备份。公共事实贡献允许用户选择删除个人内容或匿名保留事实，涉及争议/安全/法定义务时只保留最小证据并标法律保留；离线草稿/包由用户可见清理且登出/撤权处理敏感内容。"
          required_proof_surfaces:
            - ui_browser
      expected_change_paths:
        - apps/mobile/src/features/profile/**
        - apps/api/src/modules/identity/**
        - apps/api/src/modules/privacy/**
        - packages/domain/src/identity/**
        - packages/contracts/src/security-policy.ts
        - infrastructure/database/migrations/manifest.json
        - infrastructure/database/migrations/20260720_identity_up.sql
        - infrastructure/database/migrations/20260720_identity_down.sql
      forbidden_paths:
        - node_modules/**
        - .git/**
        - docs/design-system/source/**
      forbidden_shortcuts: []
      bindings:
        - key: outcome-carrier
          kind: file
          target: apps/mobile/src/features/profile/index.ts
          carrier_paths:
            - apps/mobile/src/features/profile/index.ts
            - packages/contracts/src/security-policy.ts
            - infrastructure/database/migrations/manifest.json
            - infrastructure/database/migrations/20260720_identity_up.sql
            - infrastructure/database/migrations/20260720_identity_down.sql
          existence: planned
      rollback_and_recovery:
        rollback: Stop writes for identity-profile-privacy, restore the last compatible version or immutable source pointer, and preserve every user/external record created before the rollback boundary.
        recovery: Replay idempotent work for identity-profile-privacy, reconcile revisions and provider/source versions, expose unresolved conflicts, and rerun the named verification check before reopening writes.
        verification_check_keys:
          - data-boundary
    acceptance:
      checks:
        - key: ui-acceptance
          proof_surface: ui_browser
          runner:
            type: playwright_test
            target: ui/starward.spec.mjs
            argv:
              - --config
              - playwright.config.mjs
              - --grep
              - \[outcome:identity-profile-privacy\]
            cwd: tests/acceptance
            effect: test_sandbox
            timeout_ms: 120000
          verification_inputs:
            - tests/acceptance/ui/starward.spec.mjs
            - tests/acceptance/ui/support.mjs
            - tests/acceptance/ui/contracts.mjs
            - tests/acceptance/ui/engine.mjs
            - tests/acceptance/ui/drivers/identity-profile-privacy.mjs
            - tests/acceptance/specs/identity-profile-privacy.json
            - tests/acceptance/playwright.config.mjs
            - tests/acceptance/package.json
            - tests/acceptance/package-lock.json
            - tests/acceptance/start-mobile-web.mjs
          input_paths:
            - apps/mobile/src/features/profile/index.ts
            - apps/mobile/**
          expected_output_paths:
            - apps/mobile/src/features/profile/index.ts
          positive_assertions:
            - key: guest-login-merge
              criterion: |-
                - **AC guest-login-merge**
                  - Accepts: REQ auth-methods, REQ guest-upgrade, CTRL auth-gate-sheet, CTRL guest-data-merge
