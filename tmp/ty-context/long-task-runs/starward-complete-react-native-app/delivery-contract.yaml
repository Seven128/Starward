          required_proof_surfaces:
            - data_state
            - implementation_structure
            - security_boundary
            - ui_browser
        - key: collaboration-transport
          statement: "- **OBL collaboration-transport** [direct: S-ARCH 5.11]：V2 实时协作经鉴权 WebSocket 推增量 Patch；断线后按游标补齐，冲突按字段处理，CRDT 只允许在明确的自由文本边界局部引入。"
          required_proof_surfaces:
            - ui_browser
