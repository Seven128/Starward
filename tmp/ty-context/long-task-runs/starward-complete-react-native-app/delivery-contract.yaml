    technical:
      obligations:
        - key: amap-adapter
          statement: "- **OBL amap-adapter** [direct + external research: S-ARCH 4.1, S-RESEARCH]：中国主场景使用获法人技术服务许可的 Android/iOS 高德原生 3D SDK，后端使用高德 Web 路线、后台使用高德 JS；React Native 上层只经统一 MapAdapter 使用用户位置、相机、Marker、Polyline、合法 Tile Layer 和投影能力，平台差异不得渗入业务模型。MapView/OfflineMapManager 初始化前完成高德隐私告知/同意接口，披露其位置/搜索/设备/网络/传感器采集，保留不可移除 logo；离线地图只走合同允许的双端原生能力，禁止服务端抓取高德或 OSM 公共瓦片。"
          required_proof_surfaces:
            - api_contract
            - implementation_structure
            - security_boundary
        - key: authoritative-coordinate-boundary
          statement: "- **OBL authoritative-coordinate-boundary** [direct: S-ARCH 4.2]：数据库、天气、天文、遥感和 PostGIS 只以 WGS84 为权威；GCJ-02 仅在高德适配层生成/缓存且可按算法版本重建，保存坐标来源、水平精度和验证时间。"
          required_proof_surfaces:
            - api_contract
        - key: spatial-query-boundary
          statement: "- **OBL spatial-query-boundary** [direct: S-ARCH 4.3～4.4]：Spot 使用 PostGIS geography(Point,4326) 与 GiST/KNN 空间索引，区域/光污染/地形/路线等用 geometry(Polygon/LineString,4326)；视口/附近查询、过滤和路线候选必须有上限、分页/游标和取消过期请求。"
          required_proof_surfaces:
            - api_contract
        - key: approved-candidate-routing-limits
          statement: "  - Approved resolution (owner, 2026-07-20): 先按用户明确最大距离/时间与数据覆盖做 PostGIS 预筛，单次最多 200 点；完整规则评分前 24 点，真实路线最多 8 点，最终展示 1 个主选+最多 4 个备选。路线并发 4、单候选超时 2.5 秒、整批软预算 6 秒且受 provider quota/cost circuit breaker 控制；超时先返回直线距离/合法缓存并异步补齐，不把直线当驾车时间。低密地区可扩大半径但不突破用户硬条件，高密/低端设备只收紧数量；所有动态调整保存原因、版本和实际调用成本。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-route-provider-fallback-and-quotas
          statement: "  - Approved resolution (owner, 2026-07-20): 中国首发只实现高德一个生产 Provider Adapter，购买/启用满足原生地图+定位+搜索+服务端驾车/步行/骑行路线的最低合法 SKU，具体 key、配额、SLA、价格和缓存期限由 EXT 合同门注入；不预购第二商业地图/路线源。APP 内显示路线快照，实际导航优先调用用户设备上已安装且支持目标坐标的外部地图，高德优先、其他应用仅作用户选择；provider 超时遵守候选批预算并退到带时间戳的合法 snapshot 或明确标注的直线距离。无离线许可时离线包不抓取底图；坐标为 approximate/area/restricted 时只导航到获授权入口或模糊区域，不泄露/推算精确点。"
