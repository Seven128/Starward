          statement: "- **REQ auth-methods** [direct: S-PRODUCT 6.13, S-ARCH 5.1]：身份服务支持手机验证码、Apple 登录和微信登录；具体地区/平台组合与审核要求由 DEC supported-os-device-matrix/DEC localization-scope 固化，不显示当前构建不可用的可点击登录方式。"
