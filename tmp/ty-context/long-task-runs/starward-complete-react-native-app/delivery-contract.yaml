          failure_state: "  - Failure: 保留草稿/媒体队列，字段错误就地修正，可导出或重试。"
          feedback: "  - Feedback: 步骤进度、来源/事实与主观感受区别、精确坐标风险和发布范围可见。"
        - key: field-report-form
