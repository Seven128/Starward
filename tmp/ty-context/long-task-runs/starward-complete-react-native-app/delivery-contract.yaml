          target: apps/mobile/app/_layout.tsx
          carrier_paths:
            - apps/mobile/app/_layout.tsx
          existence: planned
    acceptance:
      checks:
        - key: ui-acceptance
          proof_surface: ui_browser
          runner:
            type: playwright_test
            target: ui/starward.spec.mjs
            argv:
              - --config
              - playwright.config.mjs
              - --grep
              - \[outcome:mobile-shell-and-preferences\]
            cwd: tests/acceptance
            effect: test_sandbox
            timeout_ms: 120000
          verification_inputs:
            - tests/acceptance/ui/starward.spec.mjs
            - tests/acceptance/ui/support.mjs
            - tests/acceptance/ui/contracts.mjs
            - tests/acceptance/ui/engine.mjs
            - tests/acceptance/ui/drivers/mobile-shell-and-preferences.mjs
            - tests/acceptance/specs/mobile-shell-and-preferences.json
            - tests/acceptance/playwright.config.mjs
            - tests/acceptance/package.json
            - tests/acceptance/package-lock.json
            - tests/acceptance/start-mobile-web.mjs
          input_paths:
            - apps/mobile/app/_layout.tsx
            - apps/mobile/**
          expected_output_paths:
            - apps/mobile/app/_layout.tsx
          positive_assertions:
            - key: guest-manual-location
              criterion: |-
                - **AC guest-manual-location**
                  - Accepts: REQ guest-basic-query, REQ permission-minimization, CTRL permission-step
                  - Given: 新用户未登录且拒绝前台定位。
                  - When: 用户选择手动城市或出发地并继续。
                  - Then: 用户能进入基础今晚查询，界面明确使用手动位置且不重复强迫授权。
              claims:
                - result
                - requirement.guest-basic-query
                - requirement.permission-minimization
                - requirement.permission-step-user-task
                - control.permission-step.location
                - control.permission-step.trigger
                - control.permission-step.input
                - control.permission-step.loading
                - control.permission-step.empty
                - control.permission-step.success
                - control.permission-step.failure
                - control.permission-step.feedback
                - requirement.approved-guest-auth-capability-matrix
              observation: playwright.case.guest-manual-location.passed
              operator: equals
              expected: true
            - key: preference-save-and-switch
              criterion: |-
