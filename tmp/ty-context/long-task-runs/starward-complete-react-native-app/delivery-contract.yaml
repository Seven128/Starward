  - key: itinerary-and-collaboration
    title: 可执行行程与后续协作
    depends_on:
      - tonight-decision
      - map-route-discovery
      - spot-detail-and-trust
      - identity-profile-privacy
    product:
      observable_result: 用户可从今晚、地点、分享链接或行程首页创建一份可执行观星计划，获得主备地点、出发/到达/观测/返回时段、路线、装备和风险，在总览、时间线、地图和待规划候选之间编辑且可恢复历史；MVP 可复制/分享，V2 才开放多人共同编辑和图文攻略候选提取，协作冲突不会静默覆盖。
      owner:
        label: itinerary-and-collaboration owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/itinerary/**
          - apps/api/src/modules/itinerary/**
          - packages/domain/src/itinerary/**
          - apps/web/src/app/share/**
      requirements:
        - key: itinerary-home
          statement: "- **REQ itinerary-home** [direct: S-PRODUCT 6.7A]：行程首页区分进行中、历史、收藏的公开行程，提供新建、从观星地点快速生成、从分享链接复制；小红书等图文提取只作为 V2 候选来源，不进入 MVP 完成条件。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-inputs-and-generation
          statement: "- **REQ itinerary-inputs-and-generation** [direct: S-PRODUCT 6.7B]：新建输入包含名称、日期、出发地、人数、交通方式、观测目标、用户类型、最晚返回、露营/过夜、是否共同编辑；系统生成主/备地点、出发/到达/返回、观测窗口、路线、装备清单和风险提醒。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-overview
          statement: "- **REQ itinerary-overview** [direct: S-PRODUCT 6.7C]：总览完整显示标题、日期/时长、备注、图片空间、路线地图、天气、总驾驶/徒步、主地点和备选地点；地点、天气和路线快照均显示生成/更新时间。"
          required_proof_surfaces:
            - ui_browser
        - key: observation-timeline
          statement: "- **REQ observation-timeline** [direct: S-PRODUCT 6.7C]：单夜按“出发、日落前勘察、蓝调、晚间观测、无月黑夜、银河最佳窗口、返回、次日清晨”等真实阶段组织，而非机械 DAY 1；多日露营才提供 Day 1/Day 2，并允许阶段按目标裁剪。"
          required_proof_surfaces:
            - ui_browser
        - key: unplanned-candidates
          statement: "- **REQ unplanned-candidates** [direct: S-PRODUCT 6.7C]：待规划区保存用户、好友、系统备选及后续分享内容识别地点；可在地图查看分布并将候选加入正式时段，未采用候选保持来源和原因。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-route-options
          statement: "- **REQ itinerary-route-options** [direct: S-PRODUCT 6.7D]：至少提供最省时间、最少徒步、光污染更低、设施更完整、天气备选；每条显示车程、到达、收费、道路、最后步行、到达时天气/天象和能否赶上窗口，MVP 将详细导航交给外部地图。"
          required_proof_surfaces:
            - ui_browser
        - key: versioned-editing
          statement: "- **REQ versioned-editing** [direct: S-PRODUCT 6.7E, S-ARCH 5.10]：用户可拖拽地点/时段、增删地点、把候选纳入计划、设主备、改出发时间并重算、天气变化后刷新，保存/查看/恢复历史版本；刷新不得静默覆盖用户编辑。"
          required_proof_surfaces:
            - ui_browser
        - key: copy-share-export
          statement: "- **REQ copy-share-export** [direct: S-PRODUCT 6.7F]：支持复制为我的行程、分享给好友、生成图片摘要/微信分享卡片、导出地点列表和导航入口；每个出口遵守地点坐标访问策略和隐私设置。"
          required_proof_surfaces:
            - ui_browser
        - key: share-link-web-surface
          statement: "- **REQ share-link-web-surface** [direct: S-PRODUCT 6.7A/6.7F, S-ARCH 总体架构]：分享链接可落到轻量 Next.js 分享页/官网或授权深链，展示允许公开的行程/地点摘要、复制到 APP/打开 APP/下载入口；它不承担完整专业能力、不替代 RN APP，并在登录/邀请撤回/坐标受限/链接过期时服务端返回正确投影。"
          required_proof_surfaces:
            - ui_browser
        - key: collaborative-plan
          statement: "- **REQ collaborative-plan** [direct: S-PRODUCT 6.7G, V2]：V2 支持邀请好友，把候选放入待规划、地图查看、加入时段并实时共享最终方案；共同编辑覆盖地点、出发时间、车辆、装备分工、食物补给、露营和主备方案，角色/邀请/撤销规则由 DEC collaboration-roles 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: collaboration-conflicts
          statement: "- **REQ collaboration-conflicts** [direct: S-ARCH 5.11]：结构化行程使用服务器顺序号、实体 revision、乐观锁、WebSocket 增量 Patch、字段级冲突提示、操作日志和可恢复版本；不先用全局 CRDT，只有自由文本确需同时编辑时才局部采用。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-offline-handoff
          statement: "- **REQ itinerary-offline-handoff** [direct: S-ARCH 3.4]：已生成行程提供“下载观测数据包”和更新状态，在出发前检查坐标权限、地图范围、天气/天文/路线版本、主备和紧急联系人；包的离线行为由 OUT field-offline-safety 验收。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-library-user-task
          statement: "  - User task: 找到进行中/历史/收藏计划或开始新计划。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-creation-form-user-task
          statement: "  - User task: 提供生成计划所需约束。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-detail-tabs-user-task
          statement: "  - User task: 在摘要、正式安排、候选和空间路线之间切换。"
          required_proof_surfaces:
            - ui_browser
        - key: itinerary-overview-card-user-task
          statement: "  - User task: 一屏核对行程、地图、天气、驾驶/徒步与主备地点。"
          required_proof_surfaces:
            - ui_browser
        - key: observation-timeline-editor-user-task
          statement: "  - User task: 排序、增删和调整观星阶段及地点。"
          required_proof_surfaces:
            - ui_browser
        - key: candidate-tray-user-task
          statement: "  - User task: 比较候选并加入时段/设为备选/移除。"
          required_proof_surfaces:
            - ui_browser
        - key: route-option-comparator-user-task
          statement: "  - User task: 按时间、徒步、暗度、设施或天气选择方案。"
          required_proof_surfaces:
            - ui_browser
        - key: version-and-share-actions-user-task
          statement: "  - User task: 保存/恢复版本、复制、分享、导出、下载离线包。"
          required_proof_surfaces:
            - ui_browser
        - key: collaboration-panel-user-task
          statement: "  - User task: 邀请、查看成员/车辆/装备分工并处理更新冲突。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-collaboration-roles
          statement: "  - Approved resolution (owner, 2026-07-20): V2 采用 owner/editor/viewer 三级、一次性或可撤销邀请默认 7 天有效；owner 管理成员/角色、受限坐标授权、删除/转移和最终冲突，editor 可编辑路线、日程、候选、清单与任务但不能暴露受限坐标、改角色或永久删除，viewer 只读并可评论/确认被分配任务。成员移除/离开立即撤销新访问和离线密钥，历史 revision 保留审计化身份；车辆/装备/联系人分工须被指派人确认。冲突保留双方 revision 与字段级差异，owner 解决但不能静默覆盖；唯一 owner 离开前必须转移，删除/转移需重新认证、影响预览和短期可撤销。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-content-import-policy
          statement: "  - Approved resolution (owner, 2026-07-20): V2 只支持用户主动粘贴文本/链接、系统 Share Sheet 和获批官方 API/用户自有或明确许可内容，不做小红书或任何平台的自动抓取、绕登录、批量索引或后台爬取。导入仅生成私有候选地点/日期/路线/设施/备注，逐字段显示来源片段、置信度和坐标敏感提示，用户确认后才写入行程，永不自动发布为地点事实。原文正文/截图只为解析在加密临时区保留最长 24h 后删除，最终保留用户确认的结构化字段、必要来源 URL/许可和修改记录；平台条款/版权不允许时禁用该入口而保留手工录入。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - itinerary library
        - itinerary editor
        - share and collaboration surfaces
      controls:
        - key: itinerary-library
          location: "  - Location: “行程”一级页。"
          trigger: "  - Trigger: 搜索、切换分组/筛选、点击卡片、新建/复制链接。"
          input: "  - Input: 行程列表、状态、日期、地点缩略、参与者、离线包状态和分享链接。"
          loading_state: "  - Loading: 分组标题与卡片骨架稳定，刷新不清空已有列表。"
          empty_state: "  - Empty: 各分组有真实空状态和“从今晚/地点生成”动作；V2 导入明确标版本。"
          success_state: "  - Success: 卡片显示标题、日期/时长、主备、最新状态并进入同一行程。"
          failure_state: "  - Failure: 列表缓存可读，失败项可单独重试；无效分享链接说明原因。"
          feedback: "  - Feedback: 进行中、过期天气、未下载离线包和协作更新有可访问徽标。"
        - key: itinerary-creation-form
          location: "  - Location: 新建/复制后编辑页。"
          trigger: "  - Trigger: 点击新建、从地点快速生成或复制为我的。"
          input: "  - Input: REQ itinerary-inputs-and-generation 的全部用户字段及预填地点/日期。"
          loading_state: "  - Loading: 生成时保留输入并逐步显示地点、路线、窗口状态。"
          empty_state: "  - Empty: 可选项显示未限制；日期、出发地等必需项有就地说明。"
          success_state: "  - Success: 生成带版本和来源的可编辑草案，不直接替用户确认出发。"
          failure_state: "  - Failure: 字段输入和本地草稿保留，可移除失败约束或重试。"
