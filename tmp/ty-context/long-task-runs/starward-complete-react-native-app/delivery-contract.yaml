    depends_on:
      - mobile-shell-and-preferences
    product:
      observable_result: 用户可从摘要下钻到小时、15 日、模型对比、昼夜蒙影、地图图层和天体事件；每项都携带单位、时间、模型/算法版本、可信度与数据状态，并明确“估计透明度/实验性大气稳定度”等边界。
