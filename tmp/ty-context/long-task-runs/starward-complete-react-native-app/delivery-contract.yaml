  - key: obl-admin-data-operations-api-contract-generation
    source_ref: docs/source-plan.md#admin-data-operations.obligation.api-contract-generation
    statement: "- **OBL api-contract-generation** [direct: S-ARCH 9.1]：OpenAPI 是客户端/服务端聚合契约来源，生成 TypeScript Client；错误、分页、幂等、缓存验证和数据状态统一，破坏性演进走新版本/兼容迁移。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.api-contract-generation
  - key: obl-admin-data-operations-cache-invalidation-events
    source_ref: docs/source-plan.md#admin-data-operations.obligation.cache-invalidation-events
    statement: "- **OBL cache-invalidation-events** [direct: S-ARCH 十]：供应商新运行、地点/风险/实况、路线、规则、数据集/算法变化发布明确失效事件；stale-while-revalidate 只在允许数据类型使用并保持旧版本标识。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.cache-invalidation-events
  - key: obl-admin-data-operations-provider-cost-and-quota-ledger
    source_ref: docs/source-plan.md#admin-data-operations.obligation.provider-cost-and-quota-ledger
    statement: "- **OBL provider-cost-and-quota-ledger** [direct + derived from S-USER/S-RESEARCH]：为每个候选和已用 provider 维护版本化、可审计且不含 secret 的成本/配额台账，按同一能力/地区/质量门和 1k/10k/100k MAU 的基准/上行/失败场景计算 `订阅/API/超额 + 计算 + 存储/请求/取回 + 出网/CDN + 监控/重试 + 工程运维 + 合规/归属 + 迁移/退出` 的 12 个月 TCO；免费/open data 同样计加工与托管。实际账单/有效输出按月回填预测偏差，采购/续费/升档前重取官方价格和合同；预算告警、硬上限、功能降级和第二付费源触发器可配置并由 DEC provider-budget-and-paid-redundancy 批准，任何套餐不得静默自动升级。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.provider-cost-and-quota-ledger
  - key: obl-admin-data-operations-source-data-immutability
    source_ref: docs/source-plan.md#admin-data-operations.obligation.source-data-immutability
    statement: "- **OBL source-data-immutability** [direct + external research: S-ARCH 7.1, S-RESEARCH]：所有外部/用户/计算数据保存 UTC、IANA 时区、观星夜、WGS84、供应商/适用许可与归属、下载 URL/时间/大小/checksum、原始格式/CRS/nodata/coverage、算法/工具/规则版本、lineage、来源/审核/可信度；raw restricted 对象不可变，只追加可回滚派生版本，数据库保存引用/当前指针且 Redis 不是唯一真值，临时实况 TTL，推荐可重放。供应商合同禁止保存的数据不进入 raw；删除/撤权/许可终止按 manifest 清理。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.source-data-immutability
  - key: obl-community-contribution-immutable-contribution-evidence
    source_ref: docs/source-plan.md#community-contribution.obligation.immutable-contribution-evidence
    statement: "- **OBL immutable-contribution-evidence** [direct: S-ARCH 7.1, 5.12]：贡献保存来源、原始值、用户、时间/位置精度、审核、置信度和版本；采纳生成新地点版本，不覆盖原始证据；临时实况由 expiresAt 从当前聚合退出。"
    disposition:
      type: claim
      refs:
        - community-contribution.obligation.immutable-contribution-evidence
  - key: obl-community-contribution-moderated-media-pipeline
    source_ref: docs/source-plan.md#community-contribution.obligation.moderated-media-pipeline
    statement: "- **OBL moderated-media-pipeline** [direct: S-ARCH 12]：客户端使用短期凭证直传对象存储，服务确认后异步处理/扫描/EXIF 清理/缩略/归属/审核；客户端只在发布状态返回后展示为公开，上传成功不等同审核通过。"
    disposition:
      type: claim
      refs:
        - community-contribution.obligation.moderated-media-pipeline
  - key: obl-field-offline-safety-bounded-background-location
    source_ref: docs/source-plan.md#field-offline-safety.obligation.bounded-background-location
    statement: "- **OBL bounded-background-location** [direct: S-ARCH 3.5]：单次、前台持续、限时后台定位是显式三种状态；后台能力要求 Development Build/平台配置，只能由安全会话启动并受自动停止、系统限制、显著说明和审计约束。"
    disposition:
      type: claim
      refs:
        - field-offline-safety.obligation.bounded-background-location
  - key: obl-field-offline-safety-offline-storage-stack
    source_ref: docs/source-plan.md#field-offline-safety.obligation.offline-storage-stack
    statement: "- **OBL offline-storage-stack** [direct: S-ARCH 3.3]：结构化缓存/队列使用 Expo SQLite（按需要启用 WAL/FTS/SQLCipher），大文件与地图用 Expo FileSystem，小型令牌用由 Android Keystore/iOS Keychain 支撑的 Expo SecureStore；包 manifest/哈希、事务迁移、空间回收和敏感字段边界可验证。"
    disposition:
      type: claim
      refs:
        - field-offline-safety.obligation.offline-storage-stack
  - key: obl-forecast-and-astronomy-astronomy-versioning
    source_ref: docs/source-plan.md#forecast-and-astronomy.obligation.astronomy-versioning
    statement: "- **OBL astronomy-versioning** [direct: S-ARCH 6.3]：使用 Astronomy Engine 外加自有领域封装，服务端/客户端共享语义；来源文档记录该库声称约 1 角分精度，但产品不得直接把声明当证明，结果和离线算法均版本化并按 EXT astronomy-authoritative-validation 的确认容差用黄金数据校验。"
    disposition:
      type: claim
      refs:
        - forecast-and-astronomy.obligation.astronomy-versioning
  - key: obl-forecast-and-astronomy-weather-model-schema
    source_ref: docs/source-plan.md#forecast-and-astronomy.obligation.weather-model-schema
    statement: "- **OBL weather-model-schema** [direct: S-ARCH 6.1]：WeatherProviderRun 至少保存 id、provider、model、modelRunTime、ingestedAt、resolutionKm、status、sourceLicense；每小时记录 gridCellId/providerRunId/validTimeUtc、temperature/apparentTemperature、humidity/dewPoint/pressure、total/low/mid/highCloud、visibility、precipitationAmount/probability、windSpeed/gust/direction、fogProbability 和 qualityFlags；内部统一 SI 单位，展示层转换，空值不转 0。"
    disposition:
      type: claim
      refs:
        - forecast-and-astronomy.obligation.weather-model-schema
  - key: obl-forecast-and-astronomy-weather-provider-normalization
    source_ref: docs/source-plan.md#forecast-and-astronomy.obligation.weather-provider-normalization
    statement: "- **OBL weather-provider-normalization** [direct + external research: S-ARCH 6.1, S-USER, S-RESEARCH]：天气供应商实现统一 Provider 接口并先标准化/质检再进入业务；QWeather 按量候选承担中国常规天气/预警，Open-Meteo 免费端点只用于非商业 POC、付费 customer endpoint 只在经验证的分层云/能见度/多模型增益值得其 12 个月 TCO 时采购，ECMWF Open Data 仅作批处理基准/后备研究，具体合同由 DEC weather-provider-contracts 与 DEC provider-budget-and-paid-redundancy 决定，不默认同时支付两个天气源。QWeather 天气可按条款缓存但 GeoAPI 禁止批量缓存/索引，预警展示完整 `refer.sources`；Open-Meteo 商业生产不得使用 free endpoint，付费数据仍保留 CC BY 4.0 attribution/modification chain；所有 key 仅服务端持有。"
    disposition:
      type: claim
      refs:
        - forecast-and-astronomy.obligation.weather-provider-normalization
  - key: obl-identity-profile-privacy-privacy-enforcement-server-side
    source_ref: docs/source-plan.md#identity-profile-privacy.obligation.privacy-enforcement-server-side
    statement: "- **OBL privacy-enforcement-server-side** [direct: S-ARCH 15]：坐标/行程/媒体/导出/删除/协作权限由服务端对象级和字段级授权执行，客户端隐藏不构成安全边界；敏感操作审计且不把敏感字段写日志/遥测。"
    disposition:
      type: claim
      refs:
        - identity-profile-privacy.obligation.privacy-enforcement-server-side
  - key: obl-identity-profile-privacy-token-security
    source_ref: docs/source-plan.md#identity-profile-privacy.obligation.token-security
    statement: "- **OBL token-security** [direct: S-ARCH 5.1, 15.4]：全链路 HTTPS；access 短期、refresh 轮换/撤销且绑定 device session；令牌进 SecureStore，第三方 key 只在服务端/受限原生配置；认证接口限流/风险控制/日志脱敏。"
    disposition:
      type: claim
      refs:
        - identity-profile-privacy.obligation.token-security
  - key: obl-itinerary-and-collaboration-collaboration-transport
    source_ref: docs/source-plan.md#itinerary-and-collaboration.obligation.collaboration-transport
    statement: "- **OBL collaboration-transport** [direct: S-ARCH 5.11]：V2 实时协作经鉴权 WebSocket 推增量 Patch；断线后按游标补齐，冲突按字段处理，CRDT 只允许在明确的自由文本边界局部引入。"
    disposition:
      type: claim
      refs:
        - itinerary-and-collaboration.obligation.collaboration-transport
  - key: obl-itinerary-and-collaboration-itinerary-version-model
    source_ref: docs/source-plan.md#itinerary-and-collaboration.obligation.itinerary-version-model
    statement: "- **OBL itinerary-version-model** [direct: S-ARCH 5.10～5.11]：Itinerary、时段、Stop、参与者、车辆、装备分工、目标、路线、天气快照、现场状态和版本是结构化实体；写入携带 revision/幂等键，服务端顺序号与操作日志支持重放和恢复。"
    disposition:
      type: claim
      refs:
        - itinerary-and-collaboration.obligation.itinerary-version-model
  - key: obl-map-route-discovery-amap-adapter
    source_ref: docs/source-plan.md#map-route-discovery.obligation.amap-adapter
    statement: "- **OBL amap-adapter** [direct + external research: S-ARCH 4.1, S-RESEARCH]：中国主场景使用获法人技术服务许可的 Android/iOS 高德原生 3D SDK，后端使用高德 Web 路线、后台使用高德 JS；React Native 上层只经统一 MapAdapter 使用用户位置、相机、Marker、Polyline、合法 Tile Layer 和投影能力，平台差异不得渗入业务模型。MapView/OfflineMapManager 初始化前完成高德隐私告知/同意接口，披露其位置/搜索/设备/网络/传感器采集，保留不可移除 logo；离线地图只走合同允许的双端原生能力，禁止服务端抓取高德或 OSM 公共瓦片。"
    disposition:
      type: claim
      refs:
        - map-route-discovery.obligation.amap-adapter
  - key: obl-map-route-discovery-authoritative-coordinate-boundary
    source_ref: docs/source-plan.md#map-route-discovery.obligation.authoritative-coordinate-boundary
