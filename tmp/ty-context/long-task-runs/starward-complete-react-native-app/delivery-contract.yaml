schema_version: long-task-delivery-v2
task:
  id: starward-complete-react-native-app
  title: Starward complete React Native stargazing product
  goal: Deliver the complete MVP, V1, V2 and V3 Starward iOS/Android React Native product, its modular backend, data pipelines, admin and sharing surfaces, with truthful provider/data states, the formal Starward design and interaction system, production quality controls, and all machine-verifiable requirements passing while every named external confirmation remains explicit until supplied by its owner.
  source_paths:
    - docs/source-plan.md
  context_refs:
    - project_context/global.md
    - project_context/architecture.md
    - project_context/areas/main.md
    - project_context/areas/main/verification.md
  context_snapshot_mode: referenced
source_claims:
  - key: ac-admin-data-operations-admin-security
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.admin-security
    statement: |-
      - **AC admin-security**
        - Accepts: REQ admin-security-audit, CTRL admin-access-audit
        - Given: 无精确坐标权限的审核员登录且 MFA 过期。
        - When: 尝试读取 invite_only 坐标并执行地点下线。
        - Then: 坐标字段服务端拒绝、敏感写入要求重认证，成功/失败尝试均记录不含 secret 的审计。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.admin-security
  - key: ac-admin-data-operations-api-data-status
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.api-data-status
    statement: |-
      - **AC api-data-status**
        - Accepts: REQ aggregate-rest-api, REQ response-data-status, OBL api-contract-generation
        - Given: 一个聚合响应部分使用缓存、一个字段缺失并有 warning。
        - When: 生成客户端请求 `/v1` 接口。
        - Then: OpenAPI/客户端类型、幂等/ETag/分页/错误一致，generatedAt/expiresAt/freshness/confidence/sources/warnings/partial 准确描述降级。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.api-acceptance.api-data-status
  - key: ac-admin-data-operations-cache-policy
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.cache-policy
    statement: |-
      - **AC cache-policy**
        - Accepts: REQ four-layer-cache, REQ cache-freshness-policy, OBL cache-invalidation-events
        - Given: 新天气模型到达且同一网格/夜晚/预设有并发热门请求。
        - When: 旧报告进入失效和重算。
        - Then: 请求合并/锁/抖动/预热防击穿，旧结果仅以 stale 标识返回，新结果键含全部版本且不会污染其他预设。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.data-acceptance.cache-policy
  - key: ac-admin-data-operations-domain-and-entities
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.domain-and-entities
    statement: |-
      - **AC domain-and-entities**
        - Accepts: REQ domain-module-coverage, REQ core-entity-coverage, OBL source-data-immutability
        - Given: 一份 NightReport 涉及用户预设、地点子实体、天气运行、天文窗口、路线、推荐快照和实况。
        - When: 管理员/工程人员追溯报告。
        - Then: 每个领域实体和版本/来源/时区/坐标/规则关联可达，原始输入未被后续更新覆盖。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.api-acceptance.domain-and-entities
  - key: ac-admin-data-operations-job-idempotent-replay
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.job-idempotent-replay
    statement: |-
      - **AC job-idempotent-replay**
        - Accepts: REQ background-job-catalog, REQ job-reliability, CTRL job-operations-console
        - Given: 任一目录任务写入后失败并进入死信。
        - When: 授权人员以同一业务键重放。
        - Then: 有效数据不重复覆盖，输入/输出版本、跳过/写入/失败/耗时和审计清楚且可暂停恢复。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.job-idempotent-replay
  - key: ac-admin-data-operations-moderation-case
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.moderation-case
    statement: |-
      - **AC moderation-case**
        - Accepts: REQ moderation-admin, CTRL moderation-queue
        - Given: 高风险纠错附带媒体和原始 EXIF，贡献者可补充。
        - When: 审核员处理并请求补充或下线地点。
        - Then: 原始证据仅获授权可见，决定/理由/通知/公开状态/申诉与审计原子保存且原贡献不被覆盖。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.moderation-case
  - key: ac-admin-data-operations-qualified-lowest-tco-provider-selection
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.qualified-lowest-tco-provider-selection
    statement: |-
      - **AC qualified-lowest-tco-provider-selection**
        - Accepts: REQ qualified-lowest-tco-selection, REQ provider-source-registry, REQ data-source-admin, OBL provider-cost-and-quota-ledger, CTRL data-source-dashboard
        - Given: 同一项生产能力有免费、按量和固定月费候选，其中至少一个价格更低但有真实性/目标区稳定性/许可硬门缺口，并已有 1k/10k/100k MAU 与故障场景。
        - When: 团队选择、续费或升级生产 provider。
        - Then: 任何硬门失败者先被淘汰；其余候选按等价最小能力和同一日期/币种/税费的 12 个月完整 TCO 排序，选择最低者并保存价格/假设/有效输出成本/降级/退出证据；第二付费源或升档只有在批准的预算与增量收益触发器成立时发生，不能因免费或标价低绕过质量，也不能静默自动购买。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.qualified-lowest-tco-provider-selection
  - key: ac-admin-data-operations-replay-and-release
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.replay-and-release
    statement: |-
      - **AC replay-and-release**
        - Accepts: REQ recommendation-replay-admin, CTRL recommendation-replay-console, CTRL rule-release-control
        - Given: 一个错误案例有完整历史快照和现场反馈，规则草案改变主备排序。
        - When: 管理员重放、比较并尝试发布。
        - Then: 历史复现与当前模拟分开，分项/阻断/解释差异可追溯；证据/审批不足时禁止发布，失败保持旧版本。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.replay-and-release
  - key: ac-admin-data-operations-source-operation
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.source-operation
    statement: |-
      - **AC source-operation**
        - Accepts: REQ data-source-admin, CTRL data-source-dashboard
        - Given: 路线供应商错误率/成本异常并影响多个报告。
        - When: 运营查看并切换/暂停供应商。
        - Then: 健康、用量/成本、影响报告与备用状态可见，变更需权限/审计且后续报告准确标降级/恢复。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.source-operation
  - key: ac-admin-data-operations-source-pipelines
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.source-pipelines
    statement: |-
      - **AC source-pipelines**
        - Accepts: REQ provider-source-registry, REQ astronomy-geo-pipelines, REQ provider-failure-controls, CTRL data-source-dashboard, NCOMP direct-provider-pass-through
        - Given: 天气源字段缺失且卫星轨道过期、光污染/DEM 有明确版本。
        - When: 新批次进入系统并被后台查看。
        - Then: 天气在质检前不进入业务、轨道可信度下降，四类源的健康/版本/许可/影响可见且备用/熔断状态真实。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.source-pipelines
  - key: ac-admin-data-operations-spot-merge-and-risk
    source_ref: docs/source-plan.md#admin-data-operations.acceptance.spot-merge-and-risk
    statement: |-
      - **AC spot-merge-and-risk**
        - Accepts: REQ spot-admin, CTRL admin-spot-editor
        - Given: 两个重复地点分别有媒体、评论、受限坐标和一个最新安全警告。
        - When: 管理员预览并确认合并。
        - Then: 引用/来源/策略/状态历史按计划迁移，安全警告不丢，生成新版本/缓存失效/审计且可回滚。
    disposition:
      type: acceptance
      refs:
        - admin-data-operations.ui-acceptance.spot-merge-and-risk
  - key: ac-community-contribution-media-sanitization
    source_ref: docs/source-plan.md#community-contribution.acceptance.media-sanitization
    statement: |-
      - **AC media-sanitization**
        - Accepts: REQ media-upload-privacy, CTRL media-privacy-review, OBL moderated-media-pipeline
        - Given: 图片包含精确 GPS 和设备序列而用户仅确认拍摄方向/时间。
        - When: 媒体完成处理和审核。
        - Then: 公开版本移除敏感 EXIF，只显示确认的结构化字段；处理失败不会把原图公开。
    disposition:
      type: acceptance
      refs:
        - community-contribution.ui-acceptance.media-sanitization
  - key: ac-community-contribution-multidimensional-review
    source_ref: docs/source-plan.md#community-contribution.acceptance.multidimensional-review
    statement: |-
      - **AC multidimensional-review**
        - Accepts: REQ light-community-scope, CTRL multidimensional-review-form, NCOMP unscoped-social-feed
        - Given: 用户只体验了天空、交通和摄影三维度。
        - When: 发布评价。
        - Then: 未体验维度保持空，已填维度/时间/验证状态可见，产品未要求关注、发动态或进入通用信息流。
    disposition:
      type: acceptance
      refs:
        - community-contribution.ui-acceptance.multidimensional-review
  - key: ac-community-contribution-new-spot-privacy
    source_ref: docs/source-plan.md#community-contribution.acceptance.new-spot-privacy
    statement: |-
      - **AC new-spot-privacy**
        - Accepts: REQ new-spot-submission, CTRL new-spot-wizard
        - Given: 用户选择一个可能属于私人土地的精确位置并上传实景。
        - When: 完成新地点提交。
        - Then: 重复/土地与公开级别提示出现，精确坐标不会默认公开，草稿/审核 ID 和字段来源完整。
    disposition:
      type: acceptance
      refs:
        - community-contribution.ui-acceptance.new-spot-privacy
  - key: ac-community-contribution-safety-correction
    source_ref: docs/source-plan.md#community-contribution.acceptance.safety-correction
    statement: |-
      - **AC safety-correction**
        - Accepts: REQ correction-categories, CTRL correction-report
        - Given: 用户报告道路已封且地点存在安全风险。
        - When: 提交含现场时间和证据的纠错。
        - Then: 系统生成高优先级工单、说明未完成核验，并按规则在地点/导航前显示临时风险而不声称已永久关闭。
    disposition:
      type: acceptance
      refs:
        - community-contribution.ui-acceptance.safety-correction
  - key: ac-community-contribution-transient-report-expiry
    source_ref: docs/source-plan.md#community-contribution.acceptance.transient-report-expiry
    statement: |-
      - **AC transient-report-expiry**
        - Accepts: REQ field-report-submission, REQ long-term-vs-transient, CTRL field-report-form, OBL immutable-contribution-evidence
        - Given: 用户报告“今晚厕所关闭、起雾、看到银河”，长期事实是通常有厕所。
        - When: 实况发布并超过有效期。
        - Then: 有效期内临时状态影响当前展示，过期后退出当前聚合但历史证据保留且未改写长期厕所事实。
    disposition:
      type: acceptance
      refs:
        - community-contribution.ui-acceptance.transient-report-expiry
  - key: ac-community-contribution-trust-and-moderation-status
    source_ref: docs/source-plan.md#community-contribution.acceptance.trust-and-moderation-status
    statement: |-
      - **AC trust-and-moderation-status**
        - Accepts: REQ contribution-trust-display, REQ contribution-moderation, CTRL contribution-status-center
        - Given: 一条贡献被两人确认、另一人争议并要求补充。
        - When: 上传者和普通用户分别查看。
        - Then: 上传者看到审核/补充动作，普通用户看到允许公开的上传者、时间、验证、确认数、最新实况和争议，不把争议内容显示为确定事实。
    disposition:
      type: acceptance
      refs:
        - community-contribution.ui-acceptance.trust-and-moderation-status
  - key: ac-field-offline-safety-bounded-safety-session
    source_ref: docs/source-plan.md#field-offline-safety.acceptance.bounded-safety-session
    statement: |-
      - **AC bounded-safety-session**
        - Accepts: REQ safety-session, CTRL safety-session-panel, OBL bounded-background-location
        - Given: 用户明确授权限时后台定位并设返程/联系人。
        - When: 开启后主动结束或达到自动停止时间。
        - Then: 开启范围/状态持续可见，结束时后台定位和计划任务可证实停止，拒绝权限时不会宣称已保护。
    disposition:
      type: acceptance
      refs:
        - field-offline-safety.ui-acceptance.bounded-safety-session
  - key: ac-field-offline-safety-explicit-location-share
    source_ref: docs/source-plan.md#field-offline-safety.acceptance.explicit-location-share
    statement: |-
      - **AC explicit-location-share**
        - Accepts: REQ location-sharing-consent, CTRL location-share-action
        - Given: 当前地点为受限坐标且用户选择一个外部分享应用。
        - When: 用户预览精度/接收者/有效期并确认。
        - Then: 载荷只含策略允许字段，失败/未知不会显示已送达，也不会后台自动重发。
    disposition:
      type: acceptance
      refs:
        - field-offline-safety.ui-acceptance.explicit-location-share
  - key: ac-field-offline-safety-offline-field-use
    source_ref: docs/source-plan.md#field-offline-safety.acceptance.offline-field-use
    statement: |-
      - **AC offline-field-use**
        - Accepts: REQ field-core-status, REQ field-toolkit, REQ offline-capabilities, CTRL field-dashboard, CTRL field-tool-grid, NCOMP cached-shell-only
        - Given: 用户在完全断网现场打开一份已校验包。
        - When: 查看状态并依次打开离线地图、天空方向、拍摄、清单、实况和备选。
        - Then: 所有来源承诺能力可用并标缓存时间，联网专属动作明确降级且页面不白屏。
    disposition:
      type: acceptance
      refs:
        - field-offline-safety.ui-acceptance.offline-field-use
  - key: ac-field-offline-safety-offline-write-replay
    source_ref: docs/source-plan.md#field-offline-safety.acceptance.offline-write-replay
    statement: |-
      - **AC offline-write-replay**
        - Accepts: REQ offline-write-sync, CTRL offline-sync-queue
        - Given: 用户断网新增实况、两张图片并修改清单，第一次联网上传中断。
        - When: 网络再次恢复。
        - Then: 队列按依赖/幂等键续传且不重复发布，逐项显示待审核/已发布/失败/冲突并保留草稿。
    disposition:
      type: acceptance
      refs:
        - field-offline-safety.ui-acceptance.offline-write-replay
  - key: ac-field-offline-safety-pack-integrity
    source_ref: docs/source-plan.md#field-offline-safety.acceptance.pack-integrity
    statement: |-
      - **AC pack-integrity**
        - Accepts: REQ complete-observation-pack, REQ local-storage-boundaries, CTRL offline-pack-manager, OBL offline-storage-stack
        - Given: 行程含主备、停车/步行、地图、天气/天文、摄影、清单和联系人且设备空间足够。
        - When: 用户下载并校验观测包。
        - Then: 每个组件版本/大小/过期/哈希和坐标授权可见，只有全部必需组件通过才标“可离线”。
    disposition:
      type: acceptance
      refs:
        - field-offline-safety.ui-acceptance.pack-integrity
  - key: ac-field-offline-safety-parking-and-backup-offline
    source_ref: docs/source-plan.md#field-offline-safety.acceptance.parking-and-backup-offline
    statement: |-
      - **AC parking-and-backup-offline**
        - Accepts: REQ parking-and-backup, CTRL return-to-parking, CTRL backup-switcher
        - Given: 当前地点条件恶化、网络中断且包内有已验证停车点和备选路线快照。
        - When: 用户查看停车方向并确认切换备选。
        - Then: 方位/距离/缓存路线语义与精度可见，主备上下文原子切换且旧计划可撤回。
    disposition:
      type: acceptance
      refs:
        - field-offline-safety.ui-acceptance.parking-and-backup-offline
  - key: ac-field-offline-safety-red-mode-accessible
    source_ref: docs/source-plan.md#field-offline-safety.acceptance.red-mode-accessible
    statement: |-
      - **AC red-mode-accessible**
        - Accepts: REQ night-red-mode, CTRL night-red-mode-toggle
        - Given: 用户在现场从夜间切换红光并启用文本放大/reduced motion。
        - When: 浏览地图覆盖、状态、危险和禁用工具。
        - Then: 无白帧，危险/选择/禁用不只靠颜色且仍可读，系统 UI 无法控制的边界提前说明。
    disposition:
      type: acceptance
      refs:
        - field-offline-safety.ui-acceptance.red-mode-accessible
  - key: ac-forecast-and-astronomy-astronomy-provenance
    source_ref: docs/source-plan.md#forecast-and-astronomy.acceptance.astronomy-provenance
    statement: |-
      - **AC astronomy-provenance**
        - Accepts: REQ astronomy-domain, REQ satellite-data, REQ time-coordinate-provenance, OBL astronomy-versioning
        - Given: 用户查询天体位置或空间站过境。
        - When: 系统生成结果。
        - Then: 结果使用正确位置/时区并携带算法/星表或轨道 epoch/版本；过期轨道降低可信度。
    disposition:
      type: acceptance
      refs:
        - forecast-and-astronomy.runtime-acceptance.astronomy-provenance
  - key: ac-forecast-and-astronomy-experimental-atmosphere-label
    source_ref: docs/source-plan.md#forecast-and-astronomy.acceptance.experimental-atmosphere-label
    statement: |-
      - **AC experimental-atmosphere-label**
        - Accepts: REQ transparency-seeing-boundary, NCOMP experimental-seeing-as-fact
        - Given: 没有正式视宁度供应商或现场校准。
        - When: 用户查看大气稳定指标。
        - Then: 产品显示“通透度估计/实验性大气稳定度”、因素、可信度和不确定性，不显示正式视宁度结论。
    disposition:
      type: acceptance
      refs:
        - forecast-and-astronomy.runtime-acceptance.experimental-atmosphere-label
  - key: ac-forecast-and-astronomy-future-trend
    source_ref: docs/source-plan.md#forecast-and-astronomy.acceptance.future-trend
    statement: |-
      - **AC future-trend**
        - Accepts: REQ fifteen-day-trend, CTRL trend-calendar
        - Given: 用户选择远期日期。
        - When: 查看趋势并把日期带入计划。
        - Then: 每日条件与天文窗口可见，低可信度显著，且不会被描述为实时确定结果。
    disposition:
      type: acceptance
      refs:
        - forecast-and-astronomy.ui-acceptance.future-trend
  - key: ac-forecast-and-astronomy-hourly-professional-view
    source_ref: docs/source-plan.md#forecast-and-astronomy.acceptance.hourly-professional-view
    statement: |-
      - **AC hourly-professional-view**
        - Accepts: REQ hourly-forecast, CTRL hourly-matrix, OBL weather-model-schema
        - Given: 目标地点有完整小时天气和月亮数据。
        - When: 用户从摘要进入专业视图并选择一个小时。
        - Then: 全部指标以明确单位/质量状态对齐展示，选中时间同步且没有把缺失值显示为 0。
    disposition:
      type: acceptance
      refs:
        - forecast-and-astronomy.ui-acceptance.hourly-professional-view
  - key: ac-forecast-and-astronomy-layer-provenance
    source_ref: docs/source-plan.md#forecast-and-astronomy.acceptance.layer-provenance
    statement: |-
      - **AC layer-provenance**
        - Accepts: REQ weather-map-layers, CTRL weather-layer-panel
        - Given: 用户在地图选择一个有时间版本的气象或光污染图层。
        - When: 图层完成加载。
        - Then: 图例、数据源、生成/下次更新时间、年份或批次和透明度控制与图层一致。
    disposition:
      type: acceptance
      refs:
