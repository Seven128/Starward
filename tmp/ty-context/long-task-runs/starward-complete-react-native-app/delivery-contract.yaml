        - key: performance-slos
          statement: "- **REQ performance-slos** [direct: S-ARCH 十八]：来源建议 SLO 为缓存首页 P75 ≤1.2s、非缓存 NightReport P95 ≤3s、地点列表 P95 ≤1s、API ≥99.9%、地图主流设备接近 60 FPS、天空最低 30/目标 60 FPS、崩溃会话率 <0.3%、离线包成功率 ≥99%、推送重复率 <0.1%、数据源新鲜度达标率 ≥99%；路线超时先回直线距离/缓存并异步补全。生产 SLO/测量窗口由 DEC production-slo-measurement 决定。"
          required_proof_surfaces:
