  - key: tonight-decision
    title: 今晚结论、推荐和主备方案
    depends_on:
      - mobile-shell-and-preferences
      - forecast-and-astronomy
      - map-route-discovery
      - spot-detail-and-trust
    product:
      observable_result: 用户选择位置、观星夜、偏好和目标后，一次获得“是否建议出发、何时出发、去哪里、能看什么、怎么走、何时失效”的可解释结论；安全阻断、数据不确定性、主地点和多种备选不会被一个总分掩盖。
      owner:
        label: tonight-decision owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/tonight/**
          - apps/api/src/modules/night-report/**
          - packages/scoring-engine/**
          - packages/contracts/**
      requirements:
        - key: night-context
          statement: "- **REQ night-context** [direct: S-PRODUCT 三/6.2A, S-ARCH 9.3]：报告输入至少包含位置或出发地、今晚/明晚/自定义日期、所在地时区、当前偏好预设、观测目标和必要路线条件；首页顶部显示当前定位名称、经纬度、数据对应的具体观测点、最后更新时间、手动刷新和定位精度；“观星夜”以地点当地日落所属日期定义。"
          required_proof_surfaces:
            - ui_browser
        - key: decision-summary
          statement: "- **REQ decision-summary** [direct: S-PRODUCT 6.2B/核心场景]：首层显示综合评分和“非常适合、适合、条件一般、不建议、存在安全风险”之一，并显示最佳窗口、可观测总时长、有利条件、阻碍因素、距窗口时间、建议出发时间及是否需要立即出发。"
          required_proof_surfaces:
            - ui_browser
        - key: condition-summary
          statement: "- **REQ condition-summary** [direct: S-PRODUCT 6.2C]：摘要覆盖当前天气、温度/体感、总/高/中/低云、地面水平能见度、空气质量、风速/风向、降雨概率、湿度/露点、光污染、月相/照明、月升落、日升落、天文昏影/晨光、无月黑夜和银河窗口；普通用户默认摘要，专业用户下钻完整数据。"
          required_proof_surfaces:
            - ui_browser
        - key: visible-targets
          statement: "- **REQ visible-targets** [direct: S-PRODUCT 6.2D]：按时间列出银河、月亮、明亮行星、主要星座、流星雨、彗星、空间站和特殊天象；每项给出可见/最佳时间、方位、高度、亮度或难度、天气/月光影响和推荐地点。"
          required_proof_surfaces:
            - ui_browser
        - key: recommended-spots
          statement: "- **REQ recommended-spots** [direct: S-PRODUCT 6.2E]：首页显示三至五个地点，包含名称、实景、距离/车程、综合匹配、光污染、最佳时段、天气、直达/徒步、设施标签、适合人群、推荐原因和风险/缺点，并支持看地图、加入计划、导航和设为备选。"
          required_proof_surfaces:
            - ui_browser
        - key: primary-and-backups
          statement: "- **REQ primary-and-backups** [direct: S-PRODUCT 6.2F, S-ARCH 7.3]：系统至少区分主地点、近距离备选、天气备选和更暗但更远的进阶点；天气、降雨、道路或到达窗口变化时提示切换并解释为何更稳妥。"
          required_proof_surfaces:
            - ui_browser
        - key: layered-scoring
          statement: "- **REQ layered-scoring** [direct: S-PRODUCT 6.6, S-ARCH 八]：分别计算天气、天文、暗度、地点、可达、安全、用户匹配与数据可信度；综合分应用可信度/新鲜度惩罚，安全规则独立于加权平均。"
          required_proof_surfaces:
            - runtime_behavior
        - key: scoring-factor-coverage
          statement: "- **REQ scoring-factor-coverage** [direct: S-PRODUCT 6.6C]：排序必须保留五组因素：天空质量含光污染、高/中/低云、通透度、视宁度/实验性稳定度、能见度、月光、空气质量、湿度/露点、风、降雨/雾；目标匹配含地平线上方、高度、无遮挡方位、最亮/最高时刻、银河核心、月光干扰和摄影前景；地点质量含暗度、开阔、安全、交通、停车、平台、厕所、露营、信号和最近实况；出行成本含距离、驾车、收费、徒步、山路强度和能否赶上窗口；可信度含模型一致、资料新鲜、实况数量、核验和预报提前量。"
          required_proof_surfaces:
            - runtime_behavior
        - key: profile-weighting-intent
          statement: "- **REQ profile-weighting-intent** [direct: S-PRODUCT 6.6D]：新手更重易达/设施/安全/明确目标；摄影更重光污染/云/银河方向/月光/前景/风；目视更重暗度/通透度/视宁度/无遮挡/设备搬运；亲子更重车程/厕所/停车/安全/较早窗口；露营更重营地/过夜安全/水电/全天预报；具体权重由 DEC recommendation-weights-thresholds 决定。"
          required_proof_surfaces:
            - runtime_behavior
        - key: hard-blockers
          statement: "- **REQ hard-blockers** [direct: S-PRODUCT 6.6B, S-ARCH 8.2]：雷暴/暴雨/强对流、关闭、道路不可达、潮汐/山洪等重大风险、设备不安全风速、硬性直达条件不满足、目标方向完全遮挡、数据严重过期、到达晚于窗口结束必须警告或阻断，不能被高分抵消。"
          required_proof_surfaces:
            - runtime_behavior
        - key: continuous-window
          statement: "- **REQ continuous-window** [direct: S-ARCH 8.3]：按 DEC observation-window-resolution 确定的 15 或 30 分钟粒度联合天气、天文、月光、目标高度、遮挡、光污染和用户条件，返回连续通过区间而非单一最佳时刻。"
          required_proof_surfaces:
            - runtime_behavior
        - key: explainability-and-validity
          statement: "- **REQ explainability-and-validity** [direct: S-PRODUCT 6.6E, S-ARCH 8.5/9.4]：结果说明推荐原因、未选更近点原因、主要风险、模型分歧、失效条件、有效截止、备选优势、generatedAt/expiresAt、freshness、confidence、sources、warnings 和 partial。"
          required_proof_surfaces:
            - ui_browser
        - key: learning-ranking-boundary
          statement: "- **REQ learning-ranking-boundary** [direct: S-ARCH 8.6]：后续可用用户点击、导航、行程完成、现场实况、推荐满意度和主备切换训练地点排序；学习模型只能优化非阻断排序，不能替代安全阻断、天文几何、许可证规则、数据过期判断或用户硬条件，训练/上线仍受 DEC recommendation-weights-thresholds 和 DEC analytics-consent-policy 约束。"
          required_proof_surfaces:
            - runtime_behavior
        - key: route-timeout-degradation
          statement: "- **REQ route-timeout-degradation** [direct: S-ARCH 十八]：路线供应商超时时先返回直线距离与缓存路线并标明降级，异步补全真实路线，不阻塞整个首页。"
          required_proof_surfaces:
            - ui_browser
        - key: location-date-refresh-user-task
          statement: "  - User task: 确认报告对应地点/日期并刷新。"
          required_proof_surfaces:
            - ui_browser
        - key: decision-hero-user-task
          statement: "  - User task: 一眼判断是否出发及下一步。"
          required_proof_surfaces:
            - ui_browser
        - key: condition-summary-expander-user-task
          statement: "  - User task: 查看关键条件并进入专业预报。"
          required_proof_surfaces:
            - ui_browser
        - key: visible-target-timeline-user-task
          statement: "  - User task: 按时间选择今晚值得看的目标。"
          required_proof_surfaces:
            - ui_browser
        - key: recommendation-card-user-task
          statement: "  - User task: 比较并对地点采取地图、计划、导航或备选动作。"
          required_proof_surfaces:
            - ui_browser
        - key: plan-backup-selector-user-task
          statement: "  - User task: 确认主地点并理解三类备选。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-observation-window-resolution
          statement: "  - Approved resolution (owner, 2026-07-20): 统一用地点本地时区上的 15 分钟网格计算，底层保留原始 run 分辨率；中性/新手/目视窗口最短连续 60 分钟，摄影最短 120 分钟，未选择目标的首页以 90 分钟为默认执行窗口。硬阻断、天体高度/地平线遮挡和允许的暮光条件在整个窗口内不得断裂；软质量短降只拆成“条件较弱”子段，不把断裂窗口合并成连续窗口。相邻窗口间隔 <15 分钟且条件/来源版本一致才合并，同分优先更早到达、持续更长、返程更安全者；跨午夜仍属于同一观星夜，无天文夜或高纬边界时明确给出暮光模式/无可执行窗口。"
          required_proof_surfaces:
            - runtime_behavior
      owner_surfaces:
        - Tonight tab
        - NightReport API
        - recommendation and backup selector
      controls:
        - key: location-date-refresh
          location: "  - Location: 今晚首页顶部紧凑上下文区。"
          trigger: "  - Trigger: 点击地点、日期分段或刷新图标。"
          input: "  - Input: 当前定位/手动出发地、今晚/明晚/自定义日期、定位精度、更新时间。"
          loading_state: "  - Loading: 局部刷新指示；旧报告保留并标 stale，避免整页清空。"
          empty_state: "  - Empty: 无位置时给手动城市/地图选点，不展示伪推荐。"
          success_state: "  - Success: 上下文更新并产生新报告；变化摘要可见。"
          failure_state: "  - Failure: 保留旧报告和过期标记，显示重试/改位置。"
          feedback: "  - Feedback: 明确观星夜日期、时区、精度、上次/下次更新时间。"
        - key: decision-hero
          location: "  - Location: 今晚首页首个主要内容区。"
          trigger: "  - Trigger: 报告加载或上下文改变。"
          input: "  - Input: 结论等级、综合/分层分数、最佳窗口、时长、原因、风险、距窗口时间。"
          loading_state: "  - Loading: 保持卡片尺寸的骨架；不先显示默认分数。"
          empty_state: "  - Empty: 数据不足时显示“暂无法判断”和缺失项。"
          success_state: "  - Success: 结论、窗口和一个明确下一步动作同时可见。"
          failure_state: "  - Failure: 安全/数据错误采用可读说明和替代入口，不只显示错误码。"
          feedback: "  - Feedback: 颜色之外使用标题、图标和原因；安全风险优先级最高。"
        - key: condition-summary-expander
          location: "  - Location: 决策卡下方的连续摘要条/紧凑网格。"
          trigger: "  - Trigger: 点击摘要项或“查看完整条件”。"
          input: "  - Input: 天气、云层、风、湿度/露点、光污染、月相和关键时间。"
          loading_state: "  - Loading: 每项独立骨架并保持列宽。"
          empty_state: "  - Empty: 缺失项标“暂无数据”并说明来源状态。"
          success_state: "  - Success: 摘要可扫读，点击进入对应专业行/时间。"
          failure_state: "  - Failure: 单项失败不清空其他指标。"
          feedback: "  - Feedback: 单位、趋势、更新时间和异常/不确定状态靠近数据。"
        - key: visible-target-timeline
          location: "  - Location: 首页决策与条件之后。"
          trigger: "  - Trigger: 滚动、选择目标或打开全部。"
          input: "  - Input: 目标、可见/最佳时间、方位、高度、难度、影响因素、推荐点。"
