      non_completing_outcomes:
        - key: direct-provider-pass-through
          statement: "- **NCOMP direct-provider-pass-through** [direct: S-ARCH 11.3]：外部供应商响应未经标准化/质检直接返回移动端，不能算数据平台完成。"
    technical:
      obligations:
        - key: source-data-immutability
          statement: "- **OBL source-data-immutability** [direct + external research: S-ARCH 7.1, S-RESEARCH]：所有外部/用户/计算数据保存 UTC、IANA 时区、观星夜、WGS84、供应商/适用许可与归属、下载 URL/时间/大小/checksum、原始格式/CRS/nodata/coverage、算法/工具/规则版本、lineage、来源/审核/可信度；raw restricted 对象不可变，只追加可回滚派生版本，数据库保存引用/当前指针且 Redis 不是唯一真值，临时实况 TTL，推荐可重放。供应商合同禁止保存的数据不进入 raw；删除/撤权/许可终止按 manifest 清理。"
          required_proof_surfaces:
            - api_contract
            - implementation_structure
            - population_coverage
            - security_boundary
        - key: api-contract-generation
          statement: "- **OBL api-contract-generation** [direct: S-ARCH 9.1]：OpenAPI 是客户端/服务端聚合契约来源，生成 TypeScript Client；错误、分页、幂等、缓存验证和数据状态统一，破坏性演进走新版本/兼容迁移。"
          required_proof_surfaces:
            - api_contract
        - key: cache-invalidation-events
          statement: "- **OBL cache-invalidation-events** [direct: S-ARCH 十]：供应商新运行、地点/风险/实况、路线、规则、数据集/算法变化发布明确失效事件；stale-while-revalidate 只在允许数据类型使用并保持旧版本标识。"
          required_proof_surfaces:
            - data_state
        - key: provider-cost-and-quota-ledger
          statement: "- **OBL provider-cost-and-quota-ledger** [direct + derived from S-USER/S-RESEARCH]：为每个候选和已用 provider 维护版本化、可审计且不含 secret 的成本/配额台账，按同一能力/地区/质量门和 1k/10k/100k MAU 的基准/上行/失败场景计算 `订阅/API/超额 + 计算 + 存储/请求/取回 + 出网/CDN + 监控/重试 + 工程运维 + 合规/归属 + 迁移/退出` 的 12 个月 TCO；免费/open data 同样计加工与托管。实际账单/有效输出按月回填预测偏差，采购/续费/升档前重取官方价格和合同；预算告警、硬上限、功能降级和第二付费源触发器可配置并由 DEC provider-budget-and-paid-redundancy 批准，任何套餐不得静默自动升级。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-weather-provider-contracts
          statement: "  - Approved resolution (owner, 2026-07-20): 实现时以服务端 Provider Adapter 和冻结 fixtures 为先；生产常规天气/小时/日预报/官方预警/AQI 首选 QWeather 最小 SKU 与 JWT，仅在合同、首发区 30+ 地点 POC、归属/cache/保留/QPM/SLA 和 12 个月 TCO 门通过后启用。Open-Meteo 免费端点只用于非商业 POC；只有低/中/高云、多模型或历史能力带来可量化增益且最低商业档总 TCO 合格时才购买，不默认与 QWeather 双付费；ECMWF Open Data 只做服务端离线基准。FY-4B/其他卫星实况在自动化、商业再展示/派生、30 天延迟/缺帧与成本全通过前保持 disabled，UI 退回有来源的预报云量。任何生产响应保存 provider/model/run/issuedAt/expiresAt/许可与归属，失败按 fresh→合法 stale→partial/unknown 降级，预警过期不继续冒充当前。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-provider-budget-and-paid-redundancy
          statement: "  - Approved resolution (owner, 2026-07-20): 本决策不授权任何自动付款：未取得 owner 逐项批准前，production paid budget 为 CNY 0，开发只用本地 fixtures、允许的开放数据和非商业 POC；系统仍实现按能力/阶段/币种/税费/汇率的 12 个月 TCO 台账、70%/90% 告警和 100% 硬停/按功能降级，但具体金额由采购记录注入配置且升级/续费不得自动发生。每项能力最多一个合格最低 TCO 付费主源，保留合法缓存、本地算法、开放基准和诚实 unknown；第二付费源只在相同测试窗口内证明单源造成的已量化用户/安全/SLO 损失持续两个周期或发生一次批准的严重事件，且预期避免损失大于第二源完整 12 个月 TCO 后，由 owner 再批准。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-object-storage-cdn-provider-and-region
          statement: "  - Approved resolution (owner, 2026-07-20): 开发/staging 使用本地 S3-compatible MinIO 和同一对象契约；中国 production 只允许华南境内单 region、单供应商，在运营主体/域名 ICP/安全/删除/恢复门和 OSS/COS 同规格 12 个月 TCO 报价完成后选最低合格的一家，未确认前 production public gate 保持关闭且不假定供应商。接口不使用最低公分母以外的不可迁移能力；bucket/权限固定分为 raw-restricted、derived-private、public-assets、user-media、audit，默认私有、服务端加密、版本/生命周期/签名 URL/归属/删除任务分层，禁止未批准跨境和双云复制。第二云只按付费冗余触发器另批，不作为 MVP 默认成本。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-cache-ttl-policy
          statement: "  - Approved resolution (owner, 2026-07-20): 初始生产策略为当前天气 TTL 10min/SWR 30min，小时天气 60min/SWR 3h，未来 NightReport 2h/SWR 6h，当前 NightReport 15min/SWR 60min，路线基础 12h/SWR 24h，含交通路线 10min/SWR 30min，地点静态资料 24h、开放/门禁/风险状态 15min，临时实况 2min 且不得超过自身字段 TTL；天文结果按算法/星表版本，VIIRS/DEM/图片按不可变数据版本。官方预警、关闭、撤权、敏感坐标和规则撤回不使用 SWR，事件到达立即失效；离线过期数据可读但显示年龄/来源/限制，安全/预警/导航不得把过期值称为当前。供应商更短合同 TTL 优先，较长 TTL 需新 POC/审批，所有键含 provider/model/run/grid/night/profile/rule/dataset 版本并加抖动/Single Flight。"
          required_proof_surfaces:
            - data_state
      expected_change_paths:
        - apps/admin-web/**
        - apps/api/src/modules/admin/**
        - workers/**
        - data-pipelines/**
        - packages/contracts/**
      forbidden_paths:
        - node_modules/**
        - .git/**
        - docs/design-system/source/**
      forbidden_shortcuts: []
      bindings:
        - key: outcome-carrier
          kind: file
          target: apps/admin-web/src/app/page.tsx
          carrier_paths:
            - apps/admin-web/src/app/page.tsx
          existence: planned
      rollback_and_recovery:
        rollback: Stop writes for admin-data-operations, restore the last compatible version or immutable source pointer, and preserve every user/external record created before the rollback boundary.
        recovery: Replay idempotent work for admin-data-operations, reconcile revisions and provider/source versions, expose unresolved conflicts, and rerun the named verification check before reopening writes.
        verification_check_keys:
          - data-acceptance
    acceptance:
      checks:
        - key: api-acceptance
          proof_surface: api_contract
          runner:
            type: node_oracle
            target: verify-structured.mjs
            argv:
              - --scope
              - outcome
              - --outcome
              - admin-data-operations
              - --surface
              - api_contract
              - --carrier
              - apps/admin-web/src/app/page.tsx
            cwd: tools/long-task
            effect: read_only
            timeout_ms: 120000
          verification_inputs:
            - tools/long-task/verify-structured.mjs
            - tests/acceptance/structured/contracts.mjs
            - tests/acceptance/structured/probes.mjs
            - tests/acceptance/specs/admin-data-operations.json
            - tests/acceptance/package.json
            - tests/acceptance/package-lock.json
            - tools/long-task/package.json
            - tools/long-task/package-lock.json
          input_paths:
            - apps/admin-web/src/app/page.tsx
          expected_output_paths:
            - apps/admin-web/src/app/page.tsx
          positive_assertions:
            - key: domain-and-entities
              criterion: |-
                - **AC domain-and-entities**
                  - Accepts: REQ domain-module-coverage, REQ core-entity-coverage, OBL source-data-immutability
                  - Given: 一份 NightReport 涉及用户预设、地点子实体、天气运行、天文窗口、路线、推荐快照和实况。
                  - When: 管理员/工程人员追溯报告。
