        - key: outdoor-validation
          statement: "- **REQ outdoor-validation** [direct: S-ARCH 17.5]：户外验证覆盖山区 GPS、真实指南针、金属/汽车干扰、无网、冬夏温度、夜间亮度、相机上传、路线最后一公里和天气/现场一致性；完成证明依赖 EXT outdoor-device-field-validation。"
          required_proof_surfaces:
