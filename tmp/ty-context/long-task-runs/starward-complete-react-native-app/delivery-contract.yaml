        - key: technical-observability
          statement: "- **REQ technical-observability** [direct: S-ARCH 16.1]：采用 OpenTelemetry 关联 API 延迟/错误、数据库查询、Redis 命中、外部接口耗时、任务失败、地图瓦片/图片处理失败、移动端崩溃/页面启动、离线同步失败、电量和传感器性能异常，并可按版本/平台/地区/数据源追踪且不含精确位置。"
