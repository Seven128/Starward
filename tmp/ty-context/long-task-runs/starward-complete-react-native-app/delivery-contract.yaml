    statement: "- **REQ official-source-production-gates** [direct + repo evidence: S-USER, S-RESEARCH]：当前机器交付必须逐类消费 S-RESEARCH 的移动栈、天气、地图/路线、地点、VIIRS、DEM、天文/星表/卫星、专业工具、推送、对象存储/CDN、离线与成本结论，并为 QWeather、Open-Meteo、高德路线、EOG VIIRS、Copernicus DEM、Gaia、CelesTrak、获批 FY-4 订单落盘和 S3 兼容对象层建立可执行生产 carrier、环境注入、校验/归一化、不可变落盘、失败降级与验收证据；同时保留 `source_baseline`、`recommended`、`contract_gate`、`poc_gate`、`external_confirmation`、`defer` 状态。`implementationStatus=passed` 只表示代码、配置、运行手册与 contract fixture 完成，不表示已采购、已许可、已注入真实密钥、已校准或已通过目标区 POC；外部激活未完成时生产流量和 promotion 必须 fail-closed。动态版本/价格/配额/条款在锁依赖、签合同、续费/扩容和 production gate 重取官方证据；每项生产源先通过真实性/可追溯、首发区质量/稳定性、合法可运营和安全降级硬门，再由 REQ qualified-lowest-tco-selection 在合格等价候选中选 12 个月 TCO 最低者。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.requirement.official-source-production-gates
  - key: req-quality-release-observability-outdoor-validation
    source_ref: docs/source-plan.md#quality-release-observability.requirement.outdoor-validation
    statement: "- **REQ outdoor-validation** [direct: S-ARCH 17.5]：户外验证覆盖山区 GPS、真实指南针、金属/汽车干扰、无网、冬夏温度、夜间亮度、相机上传、路线最后一公里和天气/现场一致性；完成证明依赖 EXT outdoor-device-field-validation。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.requirement.outdoor-validation
  - key: req-quality-release-observability-performance-slos
    source_ref: docs/source-plan.md#quality-release-observability.requirement.performance-slos
    statement: "- **REQ performance-slos** [direct: S-ARCH 十八]：来源建议 SLO 为缓存首页 P75 ≤1.2s、非缓存 NightReport P95 ≤3s、地点列表 P95 ≤1s、API ≥99.9%、地图主流设备接近 60 FPS、天空最低 30/目标 60 FPS、崩溃会话率 <0.3%、离线包成功率 ≥99%、推送重复率 <0.1%、数据源新鲜度达标率 ≥99%；路线超时先回直线距离/缓存并异步补全。生产 SLO/测量窗口由 DEC production-slo-measurement 决定。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.requirement.performance-slos
  - key: req-quality-release-observability-platform-extension-boundary
    source_ref: docs/source-plan.md#quality-release-observability.requirement.platform-extension-boundary
    statement: "- **REQ platform-extension-boundary** [direct: S-PRODUCT 十二, S-USER]：本 Source Plan 的最终完成形态是 APP；PWA 仅可用于早期数据/推荐/字段/界面验证，小程序仅后续承担分享、轻查询、邀请和拉新，不需全专业能力且不能作为 APP 完成证明。"
    disposition:
