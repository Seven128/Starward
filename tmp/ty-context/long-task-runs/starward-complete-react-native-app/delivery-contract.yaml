        - key: astronomy-golden-tests
          statement: "- **REQ astronomy-golden-tests** [direct: S-ARCH 17.2]：天文黄金集覆盖不同纬度、南北半球、高海拔、跨日期、极区、日月升落、月相、行星和银河中心，并定期与 JPL Horizons 或其他确认的权威结果比对，记录容差/版本/差异。"
          required_proof_surfaces:
