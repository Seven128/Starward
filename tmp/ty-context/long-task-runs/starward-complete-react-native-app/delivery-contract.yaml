            - implementation_structure
        - key: official-source-production-gates
          statement: "- **REQ official-source-production-gates** [direct + repo evidence: S-USER, S-RESEARCH]：当前机器交付必须逐类消费 S-RESEARCH 的移动栈、天气、地图/路线、地点、VIIRS、DEM、天文/星表/卫星、专业工具、推送、对象存储/CDN、离线与成本结论，并为 QWeather、Open-Meteo、高德路线、EOG VIIRS、Copernicus DEM、Gaia、CelesTrak、获批 FY-4 订单落盘和 S3 兼容对象层建立可执行生产 carrier、环境注入、校验/归一化、不可变落盘、失败降级与验收证据；同时保留 `source_baseline`、`recommended`、`contract_gate`、`poc_gate`、`external_confirmation`、`defer` 状态。`implementationStatus=passed` 只表示代码、配置、运行手册与 contract fixture 完成，不表示已采购、已许可、已注入真实密钥、已校准或已通过目标区 POC；外部激活未完成时生产流量和 promotion 必须 fail-closed。动态版本/价格/配额/条款在锁依赖、签合同、续费/扩容和 production gate 重取官方证据；每项生产源先通过真实性/可追溯、首发区质量/稳定性、合法可运营和安全降级硬门，再由 REQ qualified-lowest-tco-selection 在合格等价候选中选 12 个月 TCO 最低者。"
          required_proof_surfaces:
            - implementation_structure
        - key: interaction-motion-contract
          statement: "- **REQ interaction-motion-contract** [direct + repo evidence: S-USER, S-DESIGN, S-INTERACTION]：所有 RN 控件/转场实现即时 press-in、有效 press-out/可访问激活时单次 commit、取消不触发；直接操控保持抓取偏移和连续跟手，运行中可重抓/反向并从 live presentation value 衔接，释放速度只在合法边界/快照点内参与 settle；Bottom Sheet、地图/滚动、iOS 导航、Android system/predictive back 和辅助技术手势明确仲裁；触觉可关闭/不可用且非唯一反馈；reduced motion 移除大位移/景深/重复/弹性而非只加速；日/夜/红光的可控表面无蓝白闪，无法主题化的 OS/供应商表面不得在现场模式中静默打开，须先提示并提供取消/返回或非现场替代；双平台共享任务/状态但保留各自原生惯例，精确 token 由 DEC interaction-motion-token-baseline 与真机 POC 决定。"
          required_proof_surfaces:
            - runtime_behavior
        - key: modular-monolith-topology
          statement: "- **REQ modular-monolith-topology** [direct: S-ARCH 1.3]：起步采用模块化单体 API + 独立数据任务进程 + 独立媒体/瓦片能力，不提前拆十几个微服务、Kafka 或 Kubernetes 全家桶；只有 CPU/内存/吞吐隔离明确且有指标证据时拆热点模块。"
          required_proof_surfaces:
            - implementation_structure
        - key: monorepo-shape
          statement: "- **REQ monorepo-shape** [direct: S-ARCH 二十]：工程概念结构覆盖 apps/mobile|admin-web|api，workers/weather|geospatial|media|notification，packages/contracts|domain|astronomy-core|scoring-engine|coordinate-system|weather-schema|ui-system|amap-native|telemetry|test-fixtures，data-pipelines/light-pollution|terrain|star-catalog|satellite，infrastructure/terraform|docker|monitoring，以及 docs/product|architecture|data-sources|adr|runbooks；真实路径由后续 Contract 绑定。"
          required_proof_surfaces:
            - implementation_structure
        - key: environment-isolation
          statement: "- **REQ environment-isolation** [direct: S-ARCH 13.1]：development、staging、production 独立数据库、Redis、对象存储 Bucket、API Key、推送证书和 OAuth 配置；测试/预发密钥、数据和通知不得接入真实用户/生产通道。"
          required_proof_surfaces:
