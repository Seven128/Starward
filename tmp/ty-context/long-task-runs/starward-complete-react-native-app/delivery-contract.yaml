        - key: production-topology
          statement: "- **REQ production-topology** [direct: S-ARCH 13.2～13.3]：生产链路为 CDN/WAF → 负载均衡 → 多副本 API → PostgreSQL/PostGIS 主备、Redis 高可用、对象存储、Worker、调度器、日志/监控；容器角色包括 api、worker-general/weather/geospatial/media/notification、admin-web，地理栅格与普通 API 隔离资源。"
          required_proof_surfaces:
