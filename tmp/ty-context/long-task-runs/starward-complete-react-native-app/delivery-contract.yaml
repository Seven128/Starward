        - key: dependency-ordered-delivery
          statement: "- **REQ dependency-ordered-delivery** [direct: S-ARCH 二十一]：建设顺序先坐标/时区观星夜/领域模型/来源许可/Monorepo/API/移动构建/PostGIS，再天气/天文/光污染/地形/高德路线/地点，再小时条件/阻断/窗口/推荐/主备/NightReport，再行程/离线/现场/实况/摄影/通知，最后天空/AR/空间站天象/协作/贡献/校准学习；这是依赖顺序，不替代 MVP/V1/V2/V3 范围。"
