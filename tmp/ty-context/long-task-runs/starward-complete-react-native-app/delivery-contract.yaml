  - key: sky-orientation-ar
    title: 360°天空、方向与可选 AR
    depends_on:
      - mobile-shell-and-preferences
      - forecast-and-astronomy
      - spot-detail-and-trust
    product:
      observable_result: 用户可为任一地点/时间在所有受支持设备上查看 2D/3D 天空，搜索并跟踪星座、银河、日月、行星、恒星、深空目标及后续天象轨迹，把方位/高度与地点真实遮挡对齐；现场可用稳定方向引导，传感器异常可校准/手动降级，V3 支持的设备可额外开启 AR 与摄影视场，但 AR 从不成为核心路径。
      owner:
        label: sky-orientation-ar owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/sky/**
          - apps/mobile/modules/orientation/**
          - apps/mobile/modules/sky-ar/**
          - packages/astronomy-core/**
      requirements:
        - key: universal-sky-view
          statement: "- **REQ universal-sky-view** [direct: S-PRODUCT 6.8A, S-ARCH 3.7]：所有支持设备具备可手势旋转的 2D/3D 星空视图，按所选 WGS84 地点、IANA 时区和时刻显示星座、银河、月亮、太阳、行星、主要恒星、深空目标、地平线、方位角和高度角。"
          required_proof_surfaces:
            - ui_browser
        - key: sky-time-control
          statement: "- **REQ sky-time-control** [direct: S-PRODUCT 6.8B]：可选择现在、今晚最佳、自定义时刻、拖动时间轴，并快速跳到月落、银河最高、指定天体升起/落下；选定时刻同步今晚、地点、摄影和轨迹状态。"
          required_proof_surfaces:
            - ui_browser
        - key: orientation-guidance
          statement: "- **REQ orientation-guidance** [direct: S-PRODUCT 6.8C, S-ARCH 3.6]：现场方向融合 Device Motion、磁力计、陀螺仪、加速度/重力、GPS、地磁偏角和设备朝向，输出稳定方位/俯仰/横滚，显示向左/右转角、目标离地平线高度和当前精度。"
          required_proof_surfaces:
            - ui_browser
        - key: orientation-calibration
          statement: "- **REQ orientation-calibration** [direct: S-ARCH 3.6]：检测磁场异常/漂移，提供 8 字校准；汽车、金属平台附近提示误差；传感器缺失、精度低或权限拒绝时允许触控浏览、手动北向/地点和文字方位降级。"
          required_proof_surfaces:
            - ui_browser
        - key: real-obstruction-overlay
          statement: "- **REQ real-obstruction-overlay** [direct: S-PRODUCT 6.8D]：可叠加地点全景或有效遮挡轮廓，显示山体/建筑，判断目标遮挡、银河升起方向、日落/月升/银河与前景重合，并辅助选择具体机位和镜头方向；估算/人工/实拍来源可区分。"
          required_proof_surfaces:
            - ui_browser
        - key: celestial-trajectories
          statement: "- **REQ celestial-trajectories** [direct: S-PRODUCT 6.8E]：轨迹覆盖日出/日落、月升/月落、银河中心升起/中天/落下、行星升起/最高/落下，以及 V3 空间站过境路径和流星雨辐射点，路径带日期、方向、高度和可见窗口。"
          required_proof_surfaces:
            - ui_browser
        - key: camera-field-of-view
          statement: "- **REQ camera-field-of-view** [direct: S-PRODUCT 6.8F, V3]：高级视场模拟按机型、传感器尺寸、镜头焦段、手机主摄/超广角计算覆盖范围，叠加目标与前景以辅助构图；未知裁切系数或镜头信息不可假设默认准确。"
          required_proof_surfaces:
            - ui_browser
        - key: optional-ar
          statement: "- **REQ optional-ar** [direct: S-ARCH 3.7, V3]：iOS 用 ARKit、支持安卓用 ARCore，不支持设备降级为摄像头+传感器叠加或通用天空；能力检测、追踪质量和相机权限在开启前可见，关闭 AR 后回到同一地点/时间/目标。"
          required_proof_surfaces:
            - ui_browser
        - key: sky-rendering-budget
          statement: "- **REQ sky-rendering-budget** [direct: S-ARCH 3.7]：天空使用 GPU 加速并按亮度/天空区块拆分星表，避免一次加载完整目录；层级、标签密度和动画按设备性能/热状态降级，核心方位与目标不可因装饰效果丢失。"
          required_proof_surfaces:
            - ui_browser
        - key: sky-canvas-user-task
          statement: "  - User task: 浏览完整天空并选择天体/方向。"
          required_proof_surfaces:
            - ui_browser
        - key: sky-object-and-layer-panel-user-task
          statement: "  - User task: 搜索目标、开关银河/星座/深空/轨迹/遮挡并控制标签。"
          required_proof_surfaces:
            - ui_browser
        - key: sky-time-scrubber-user-task
          statement: "  - User task: 查看天空随时间运动并跳至关键事件。"
          required_proof_surfaces:
            - ui_browser
        - key: orientation-follow-toggle-user-task
          statement: "  - User task: 让手机朝向控制星图或恢复手势浏览。"
          required_proof_surfaces:
            - ui_browser
        - key: orientation-calibration-sheet-user-task
          statement: "  - User task: 校准方向或选择手动降级。"
          required_proof_surfaces:
            - ui_browser
        - key: obstruction-and-trajectory-overlay-user-task
          statement: "  - User task: 比较目标轨迹与真实地平线/前景。"
          required_proof_surfaces:
            - ui_browser
        - key: field-of-view-overlay-user-task
          statement: "  - User task: 选择设备镜头并预览覆盖范围。"
          required_proof_surfaces:
            - ui_browser
        - key: ar-mode-toggle-user-task
          statement: "  - User task: 在支持设备上把天空目标叠加摄像头。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - 2D/3D sky
        - orientation guidance
        - optional AR
