    technical:
      obligations:
        - key: immutable-contribution-evidence
          statement: "- **OBL immutable-contribution-evidence** [direct: S-ARCH 7.1, 5.12]：贡献保存来源、原始值、用户、时间/位置精度、审核、置信度和版本；采纳生成新地点版本，不覆盖原始证据；临时实况由 expiresAt 从当前聚合退出。"
          required_proof_surfaces:
            - data_state
            - implementation_structure
            - security_boundary
            - ui_browser
        - key: moderated-media-pipeline
          statement: "- **OBL moderated-media-pipeline** [direct: S-ARCH 12]：客户端使用短期凭证直传对象存储，服务确认后异步处理/扫描/EXIF 清理/缩略/归属/审核；客户端只在发布状态返回后展示为公开，上传成功不等同审核通过。"
          required_proof_surfaces:
            - ui_browser
      expected_change_paths:
        - apps/mobile/src/features/community/**
        - apps/api/src/modules/community/**
        - workers/media/**
        - packages/domain/src/community/**
      forbidden_paths:
        - node_modules/**
        - .git/**
        - docs/design-system/source/**
      forbidden_shortcuts: []
      bindings:
        - key: outcome-carrier
          kind: file
          target: apps/mobile/src/features/community/index.ts
          carrier_paths:
            - apps/mobile/src/features/community/index.ts
          existence: planned
      rollback_and_recovery:
        rollback: Stop writes for community-contribution, restore the last compatible version or immutable source pointer, and preserve every user/external record created before the rollback boundary.
        recovery: Replay idempotent work for community-contribution, reconcile revisions and provider/source versions, expose unresolved conflicts, and rerun the named verification check before reopening writes.
        verification_check_keys:
