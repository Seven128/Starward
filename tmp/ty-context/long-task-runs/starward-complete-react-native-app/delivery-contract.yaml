  - key: approved-ai-provider-privacy
    source_ref: docs/source-plan.md#decision.ai-provider-privacy
    statement: "  - Approved resolution (owner, 2026-07-20): V1/V2 默认只用确定性规则解释，AI provider、网络调用和预算均 disabled；完整摄影方案不依赖 AI 才可完成。未来仅在供应商、境内/跨境、处理者条款、零训练/最短保留、内容安全、成本和法务获批后由服务端按用户逐次 opt-in 调用，只发送经枚举的派生参数与粗粒度环境，不发送精确地点、路线、联系人、身份、原始媒体/EXIF 或自由文本秘密；结果标模型/版本/生成时间/不确定性，可举报并回退规则解释。无批准 provider、超预算、超时或撤回同意时静默禁用网络 AI 而不损坏核心流程。"
    disposition:
      type: claim
      refs:
        - shooting-assistant.requirement.approved-ai-provider-privacy
  - key: approved-analytics-consent-policy
    source_ref: docs/source-plan.md#decision.analytics-consent-policy
    statement: "  - Approved resolution (owner, 2026-07-20): 必要的崩溃/安全/服务健康遥测与可选产品分析分离，均数据最小化；产品分析在中国首发采用明示 opt-in、默认关闭、首方自建/自托管优先，拒绝不影响核心功能。禁止精确坐标/路线/联系人/受限地点进入事件，位置只在客户端转换为城市或约 20km 网格；用户标识为 30d 轮换的伪匿名 ID，原始事件 90d、聚合 13 个月。撤回后停止采集并在 30d 内删除可关联历史，未成年人不进入产品分析、A/B 或广告归因；任何第三方、跨境、精细归因或实验另走法务/同意门，样本不足明确不可判断。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.obligation.approved-analytics-consent-policy
  - key: approved-background-safety-policy
    source_ref: docs/source-plan.md#decision.background-safety-policy
    statement: "  - Approved resolution (owner, 2026-07-20): 首版采用本地计时+可选限时后台位置，不做自动报警、联系人外发或升级；用户主动创建会话并逐次选择分享对象/通道，默认 4h、最大 12h，在计划结束后 30min 自动停止并提示确认安全。前台导航可高精度，后台采用平衡精度且约 5min 或 250m 变化采样、低电/系统限制时自动降频并显示；系统杀进程、离线或权限撤回不能伪装为持续跟踪。未返回先设备本地提醒两次，外发只能由用户主动操作并显示发送/receipt/失败/未知，APP 明确不提供救援或必达保证；会话结束后按保留策略删除精确轨迹。"
    disposition:
      type: claim
      refs:
        - field-offline-safety.requirement.approved-background-safety-policy
  - key: approved-cache-ttl-policy
    source_ref: docs/source-plan.md#decision.cache-ttl-policy
    statement: "  - Approved resolution (owner, 2026-07-20): 初始生产策略为当前天气 TTL 10min/SWR 30min，小时天气 60min/SWR 3h，未来 NightReport 2h/SWR 6h，当前 NightReport 15min/SWR 60min，路线基础 12h/SWR 24h，含交通路线 10min/SWR 30min，地点静态资料 24h、开放/门禁/风险状态 15min，临时实况 2min 且不得超过自身字段 TTL；天文结果按算法/星表版本，VIIRS/DEM/图片按不可变数据版本。官方预警、关闭、撤权、敏感坐标和规则撤回不使用 SWR，事件到达立即失效；离线过期数据可读但显示年龄/来源/限制，安全/预警/导航不得把过期值称为当前。供应商更短合同 TTL 优先，较长 TTL 需新 POC/审批，所有键含 provider/model/run/grid/night/profile/rule/dataset 版本并加抖动/Single Flight。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.approved-cache-ttl-policy
  - key: approved-candidate-routing-limits
    source_ref: docs/source-plan.md#decision.candidate-routing-limits
    statement: "  - Approved resolution (owner, 2026-07-20): 先按用户明确最大距离/时间与数据覆盖做 PostGIS 预筛，单次最多 200 点；完整规则评分前 24 点，真实路线最多 8 点，最终展示 1 个主选+最多 4 个备选。路线并发 4、单候选超时 2.5 秒、整批软预算 6 秒且受 provider quota/cost circuit breaker 控制；超时先返回直线距离/合法缓存并异步补齐，不把直线当驾车时间。低密地区可扩大半径但不突破用户硬条件，高密/低端设备只收紧数量；所有动态调整保存原因、版本和实际调用成本。"
    disposition:
      type: claim
      refs:
        - map-route-discovery.obligation.approved-candidate-routing-limits
  - key: approved-collaboration-roles
    source_ref: docs/source-plan.md#decision.collaboration-roles
    statement: "  - Approved resolution (owner, 2026-07-20): V2 采用 owner/editor/viewer 三级、一次性或可撤销邀请默认 7 天有效；owner 管理成员/角色、受限坐标授权、删除/转移和最终冲突，editor 可编辑路线、日程、候选、清单与任务但不能暴露受限坐标、改角色或永久删除，viewer 只读并可评论/确认被分配任务。成员移除/离开立即撤销新访问和离线密钥，历史 revision 保留审计化身份；车辆/装备/联系人分工须被指派人确认。冲突保留双方 revision 与字段级差异，owner 解决但不能静默覆盖；唯一 owner 离开前必须转移，删除/转移需重新认证、影响预览和短期可撤销。"
    disposition:
      type: claim
      refs:
        - itinerary-and-collaboration.requirement.approved-collaboration-roles
  - key: approved-content-import-policy
    source_ref: docs/source-plan.md#decision.content-import-policy
    statement: "  - Approved resolution (owner, 2026-07-20): V2 只支持用户主动粘贴文本/链接、系统 Share Sheet 和获批官方 API/用户自有或明确许可内容，不做小红书或任何平台的自动抓取、绕登录、批量索引或后台爬取。导入仅生成私有候选地点/日期/路线/设施/备注，逐字段显示来源片段、置信度和坐标敏感提示，用户确认后才写入行程，永不自动发布为地点事实。原文正文/截图只为解析在加密临时区保留最长 24h 后删除，最终保留用户确认的结构化字段、必要来源 URL/许可和修改记录；平台条款/版权不允许时禁用该入口而保留手工录入。"
    disposition:
      type: claim
      refs:
        - itinerary-and-collaboration.requirement.approved-content-import-policy
  - key: approved-data-retention-deletion
    source_ref: docs/source-plan.md#decision.data-retention-deletion
    statement: "  - Approved resolution (owner, 2026-07-20): 采用最小保留基线并由中国法务门复核：未显式保存的精确位置/安全轨迹在会话结束 24h 内删除，联系人授权在会话/邀请结束 24h 内删除；上传原图/EXIF 处理成功 24h 后删除并只留去 EXIF 派生物；应用诊断日志 30d、原始产品分析 90d、聚合指标 13 个月、安全/权限/审核证据 180d，备份最长 90d。用户行程/收藏/媒体在主动删除或注销前保留；注销立即撤销会话与分享，提供 7d 可撤销冷静期，之后 30d 内从主系统清除、90d 内自然退出备份。公共事实贡献允许用户选择删除个人内容或匿名保留事实，涉及争议/安全/法定义务时只保留最小证据并标法律保留；离线草稿/包由用户可见清理且登出/撤权处理敏感内容。"
    disposition:
      type: claim
      refs:
        - identity-profile-privacy.obligation.approved-data-retention-deletion
  - key: approved-dependency-version-baseline
    source_ref: docs/source-plan.md#decision.dependency-version-baseline
    statement: "  - Approved resolution (owner, 2026-07-20): 新项目锁定 2026-07-20 最新正式稳定的 Expo SDK 57 / React Native 0.86 / React 19.2.3 / Node.js 22 LTS（≥22.13），只用 New Architecture 和 Development Build；移动依赖先采用 SDK 57 官方矩阵（Reanimated 4.5.0、Worklets 0.10 系列、Gesture Handler 2.32 系列、Skia 2.6.2），其余通过 `expo install`、`expo-doctor`、双端原生构建和 lockfile 冻结精确版本。启用 Worklets bundle mode 并把官方已知的 Reanimated/Hermes 内存增长列为真机门；门失败则回退 SDK 56 兼容矩阵或关闭未达标复杂动画。安全/patch 每月评估，兼容 minor 每季度在 CI+双端回归后升级，Expo/RN/原生 SDK major、runtimeVersion、schema 或权限变化单独评审并重建二进制；OTA 只发布与既有 runtime 兼容的 JS/样式/资源。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.obligation.approved-dependency-version-baseline
  - key: approved-guest-auth-capability-matrix
    source_ref: docs/source-plan.md#decision.guest-auth-capability-matrix
    statement: "  - Approved resolution (owner, 2026-07-20): 游客可完成基础查询、手动地点/时间、偏好预览、本地收藏、本地单人行程、本地离线包和仅设备内提醒；上传地点/实况/媒体、评论/评价、公开分享、跨设备同步、远端通知、协作与账号数据导出/注销必须登录。游客写入只保存在本地稳定 UUID，不形成匿名公开贡献；登录时逐类预览并幂等合并，服务器同 ID/同 revision 优先、冲突保留双副本供选择，取消登录不删除游客数据，退出账号可选择保留为设备本地副本。"
    disposition:
      type: claim
      refs:
        - mobile-shell-and-preferences.requirement.approved-guest-auth-capability-matrix
  - key: approved-interaction-motion-token-baseline
    source_ref: docs/source-plan.md#decision.interaction-motion-token-baseline
    statement: "  - Approved resolution (owner, 2026-07-20): 建立 Starward 自有、按 press/drag/scrub/sheet/navigation 分族且允许 iOS/Android 原生差异的 token；初始 POC 候选为按下反馈 ≤80ms、普通按钮 scale 0.98/opacity 0.88（地图标记与危险操作不缩放）、释放 120ms、drag 激活 6dp、方向锁 8dp 且主轴位移比 ≥1.25、grab hitSlop 12dp、sheet 25%/55%/90% 三档候选、提交/成功/警告/错误才触觉且同语义 120ms 内节流。连续手势保持 1:1、可中断/反向并继承释放速度，越界只视觉阻尼且取消不提交；系统 back、地图 pan/pinch、Sheet pan/scroll 采用显式 simultaneous/exclusive 关系。Reduced Motion 使用系统设置，禁用视差/速度投影/弹簧，改为 ≤120ms 淡变或立即切换；POC 可在不改变这些语义的前提下调参并把最终值写入 design token，而不是复制 web/Apple 常数。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.obligation.approved-interaction-motion-token-baseline
  - key: approved-light-pollution-calibration
    source_ref: docs/source-plan.md#decision.light-pollution-calibration
    statement: "  - Approved resolution (owner, 2026-07-20): MVP/V1 只发布 EOG Annual VNL v2.2 的 radiance 参考值、数据年份、coverage/quality、空间分辨率、许可归属和“卫星夜光不等于现场天空亮度”的解释，不显示 Bortle、银河可见保证或伪造 SQM。系统预留版本化校准模型与置信区间，但只有 named astronomy reviewer 批准区域/季节/地貌分层的质量规则、足量独立 SQM/现场样本和 held-out 验证后，才在通过区域显示宽区间；未通过/样本外区域保持 radiance-only/unknown，模型更新可重放与回滚。"
    disposition:
      type: claim
      refs:
        - spot-detail-and-trust.requirement.approved-light-pollution-calibration
  - key: approved-localization-scope
    source_ref: docs/source-plan.md#decision.localization-scope
    statement: "  - Approved resolution (owner, 2026-07-20): 首发只承诺中国大陆简体中文，默认 24 小时制、公制、摄氏度、米/公里、m/s、hPa 与角度；内部统一 UTC/ISO 8601、IANA 时区、WGS84 和标准单位，UI 总显示地点本地日期/时区并正确处理跨午夜观星夜。首日即使用可本地化 message key、复数/数字/日期格式和天文术语表，VoiceOver/TalkBack 文案不用符号替代读法；繁中、英语、英制和 12 小时制进入后续语言包，不计入首发完成声明。"
    disposition:
      type: claim
      refs:
        - mobile-shell-and-preferences.requirement.approved-localization-scope
  - key: approved-map-layer-composition-and-density
    source_ref: docs/source-plan.md#decision.map-layer-composition-and-density
    statement: "  - Approved resolution (owner, 2026-07-20): 任一时刻只启用一个主栅格（云量/降水/光污染/地形之一）叠加一个底图，预警边界、地点/聚合、路线、选中态、天体方向和用户位置作为有序矢量/符号层；所有时变层共享同一时间游标并显示 issuedAt/validAt/opacity/来源，切换失败保留旧层但标 stale。视口内 ≤80 点显示原始 marker，81～500 点聚合，>500 点显示密度/服务端网格且继续提供排序列表；缩放、设备性能和 reduced motion 只影响表现，不改变筛选语义。屏幕阅读器/键盘用户始终可用与地图选择同步的列表、筛选和详情，颜色不是唯一图层状态。"
    disposition:
      type: claim
      refs:
        - map-route-discovery.requirement.approved-map-layer-composition-and-density
  - key: approved-moderation-trust-policy
    source_ref: docs/source-plan.md#decision.moderation-trust-policy
    statement: "  - Approved resolution (owner, 2026-07-20): 新地点、坐标/门禁/停车/安全更改、媒体和永久设施在 MVP 全部人工审核；普通登录用户可发布带 `unverified` 的低风险结构化临时实况，云/天空 TTL 2h，拥挤/停车/道路 TTL 4h，设施临时不可用 TTL 24h，风险报告立即显示“待核实警告”且 6h 未确认即过期/降级。完成至少 5 次通过审核、争议率 ≤10% 的贡献者才可短期自动发布低风险实况；两个独立到访确认提高可信度，位置证明只保存必要派生事实。高风险报告 2h 内初审、其他 24h，争议冻结自动聚合并进入人工队列，申诉 7 天内响应；所有阈值/TTL 可配置、版本化并防刷，不把信誉替代来源与新鲜度。"
    disposition:
      type: claim
      refs:
        - community-contribution.requirement.approved-moderation-trust-policy
  - key: approved-mvp-launch-region-and-spot-seed
    source_ref: docs/source-plan.md#decision.mvp-launch-region-and-spot-seed
    statement: "  - Approved resolution (owner, 2026-07-20): 首发采用“全国可浏览、仅深圳及粤港澳大湾区已核验覆盖可生成地点推荐”的单城市群深耕模式；首批至少 30 个人工核验地点，覆盖城市边缘公园、海岸、山地、露营/郊野、天文场馆周边等类型，每点具备合法可达性、精确/模糊坐标级别、开放/门禁、停车与最后一公里、设施、风险、光环境、照片来源和最近核验时间。天气/路线/瓦片 POC 覆盖该区域，区域外允许手动查看有来源的天气/天文但显示“地点资料不足”且不伪造主备推荐。扩区需同时满足连续 30 天数据质量、地图/路线/许可、至少 20 个同标准核验点、现场抽检和成本/SLO 门。"
    disposition:
      type: claim
      refs:
        - spot-detail-and-trust.requirement.approved-mvp-launch-region-and-spot-seed
  - key: approved-notification-defaults-cooldowns
    source_ref: docs/source-plan.md#decision.notification-defaults-cooldowns
    statement: "  - Approved resolution (owner, 2026-07-20): 所有通知类别默认关闭并显式 opt-in；创建行程时可预览建议的出发前 24h/3h 条件复核、窗口开始 60min 和用户自定提醒，但不自动勾选。默认免打扰为地点本地 22:00～08:00，用户可按类别覆盖；官方严重预警也只有在用户订阅该行程风险后可越过免打扰，且文案不称紧急救援。相同 provider event+区域 6h 冷却，实质条件跨阈变化 2h，长期天象/计划 24h；只在状态边沿产生幂等事件。MVP 以本地提醒+APP 内收件箱为权威，APNs/FCM/国内厂商按发行渠道 POC 后启用，Expo Push 只用于非关键 POC；保存 receipt/去重/失效 token，失败时打开 APP 重算而不沿用旧安全信息。"
    disposition:
      type: claim
      refs:
        - notifications-and-toolbox.requirement.approved-notification-defaults-cooldowns
  - key: approved-object-storage-cdn-provider-and-region
    source_ref: docs/source-plan.md#decision.object-storage-cdn-provider-and-region
    statement: "  - Approved resolution (owner, 2026-07-20): 开发/staging 使用本地 S3-compatible MinIO 和同一对象契约；中国 production 只允许华南境内单 region、单供应商，在运营主体/域名 ICP/安全/删除/恢复门和 OSS/COS 同规格 12 个月 TCO 报价完成后选最低合格的一家，未确认前 production public gate 保持关闭且不假定供应商。接口不使用最低公分母以外的不可迁移能力；bucket/权限固定分为 raw-restricted、derived-private、public-assets、user-media、audit，默认私有、服务端加密、版本/生命周期/签名 URL/归属/删除任务分层，禁止未批准跨境和双云复制。第二云只按付费冗余触发器另批，不作为 MVP 默认成本。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.approved-object-storage-cdn-provider-and-region
  - key: approved-observation-window-resolution
    source_ref: docs/source-plan.md#decision.observation-window-resolution
    statement: "  - Approved resolution (owner, 2026-07-20): 统一用地点本地时区上的 15 分钟网格计算，底层保留原始 run 分辨率；中性/新手/目视窗口最短连续 60 分钟，摄影最短 120 分钟，未选择目标的首页以 90 分钟为默认执行窗口。硬阻断、天体高度/地平线遮挡和允许的暮光条件在整个窗口内不得断裂；软质量短降只拆成“条件较弱”子段，不把断裂窗口合并成连续窗口。相邻窗口间隔 <15 分钟且条件/来源版本一致才合并，同分优先更早到达、持续更长、返程更安全者；跨午夜仍属于同一观星夜，无天文夜或高纬边界时明确给出暮光模式/无可执行窗口。"
    disposition:
      type: claim
      refs:
        - tonight-decision.requirement.approved-observation-window-resolution
  - key: approved-offline-pack-policy
    source_ref: docs/source-plan.md#decision.offline-pack-policy
    statement: "  - Approved resolution (owner, 2026-07-20): 离线包由行程建议但必须用户确认，默认仅 Wi‑Fi，蜂窝需逐次允许；下载前展示组件/许可/版本/动态过期/体积/剩余空间，500MB 提醒、单包 2GB 硬上限、全局 4GB 默认上限、最多 2 个并发且至少保留 `max(1GB, 10%设备空间)`。必需组件为 manifest、地点/坐标权限、合法路线 snapshot、精简天气/天文、规则与关键文本；VIIRS/DEM/地平线/星表/媒体/获许可底图按能力可选。每对象 hash、断点、临时区、全包校验后原子激活、上一版回滚；静态资产按版本，动态数据到期仍可读但显著 stale 且安全/预警不得离线冒充当前。受限坐标/联系人/安全会话设备加密并最短保留，登出、成员撤权、链接失效和许可终止触发密钥撤销/清理；没有地图离线许可就不抓底图。"
    disposition:
      type: claim
      refs:
        - field-offline-safety.obligation.approved-offline-pack-policy
  - key: approved-preference-profile-defaults
    source_ref: docs/source-plan.md#decision.preference-profile-defaults
    statement: "  - Approved resolution (owner, 2026-07-20): 所有距离、时间、徒步、路况、露营、设施、目标和设备字段初始为 unknown/未选择，不把示例值静默变成硬条件；跳过后使用“中性基础模式”，只执行经批准的安全/关闭/法律硬阻断，其他因素等权或低置信排序并明确提示补全偏好。新手/亲子/摄影/目视预设仅在用户主动选择后展开全部具体值和硬/软含义，保存前可逐项修改并显示会排除多少候选；设备未知时不给特定镜头/望远镜结论。"
    disposition:
      type: claim
      refs:
        - mobile-shell-and-preferences.requirement.approved-preference-profile-defaults
  - key: approved-production-slo-measurement
    source_ref: docs/source-plan.md#decision.production-slo-measurement
    statement: "  - Approved resolution (owner, 2026-07-20): 十项来源建议先作为 staging/launch gate，不在无流量基线时对外宣称 production SLA；上线后按 28 天滚动窗口、版本/平台/设备档/网络/冷热缓存分层测量，连续 30 天真实基线和足够样本经 owner 批准后才升为正式 SLO。保留 API ≥99.9%、缓存首页 P75 ≤1.2s、非缓存 NightReport P95 ≤3s、地点列表 P95 ≤1s、主流地图接近 60FPS、天空最低 30/目标 60FPS、崩溃会话率 <0.3%、离线包成功 ≥99%、推送重复 <0.1%、数据新鲜度 ≥99%；每项同时报告分母、样本数、测量起止、版本和排除项，样本不足显示不可判断。计划维护单列但不抹掉用户影响，availability 错误预算 0.1%；推送不把 provider accepted 当设备送达，路线超时成功只在明确降级结果可用时计入。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.obligation.approved-production-slo-measurement
  - key: approved-professional-tool-data-sources
    source_ref: docs/source-plan.md#decision.professional-tool-data-sources
    statement: "  - Approved resolution (owner, 2026-07-20): Astronomy Engine 固定版本承担本地日月行星、暮光和食相等确定性计算并用 JPL Horizons 低频黄金集验证；Gaia 只以官方版本/校验和制作经许可的区域/星等裁切离线资产。空间站/卫星采用服务端集中获取 CelesTrak OMM+SGP4，遵守更新节奏、六位 catalog ID、非 200 停止重试与过期隐藏；JPL API 只作低频验证/必要小天体查询，不当高可用批量源。NOAA SWPC 极光和彗星/流星数量等远端工具逐项通过覆盖、许可、更新与区域 POC 后启用，否则 disabled/experimental；APOD/机构内容只展示逐媒体确认可用的 credit/copyright 或外链，不因 NASA 名称自动再发布。所有工具显示来源/版本/更新时间/置信与实验标签，缺许可或过期不生成伪倒计时/确定数量。"
    disposition:
      type: claim
      refs:
        - notifications-and-toolbox.obligation.approved-professional-tool-data-sources
  - key: approved-provider-budget-and-paid-redundancy
    source_ref: docs/source-plan.md#decision.provider-budget-and-paid-redundancy
    statement: "  - Approved resolution (owner, 2026-07-20): 本决策不授权任何自动付款：未取得 owner 逐项批准前，production paid budget 为 CNY 0，开发只用本地 fixtures、允许的开放数据和非商业 POC；系统仍实现按能力/阶段/币种/税费/汇率的 12 个月 TCO 台账、70%/90% 告警和 100% 硬停/按功能降级，但具体金额由采购记录注入配置且升级/续费不得自动发生。每项能力最多一个合格最低 TCO 付费主源，保留合法缓存、本地算法、开放基准和诚实 unknown；第二付费源只在相同测试窗口内证明单源造成的已量化用户/安全/SLO 损失持续两个周期或发生一次批准的严重事件，且预期避免损失大于第二源完整 12 个月 TCO 后，由 owner 再批准。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.approved-provider-budget-and-paid-redundancy
  - key: approved-recommendation-weights-thresholds
    source_ref: docs/source-plan.md#decision.recommendation-weights-thresholds
    statement: "  - Approved resolution (owner, 2026-07-20): 所有官方关闭/法律/已确认安全阻断和用户明确硬条件先于加权评分；五维初始权重（天空/目标/地点/出行/可信度）为中性 35/20/15/15/15、新手/亲子 25/10/25/25/15、摄影 35/25/15/10/15、目视 40/20/20/5/15。总分 ≥75 为推荐、60～74 为有条件、<60 不推荐；综合可信度 <0.60 时不得给强肯定结论，缺失维度不按 0 惩罚而是降低置信并解释。主选与备选必须在天气/路线/设施等失败模式上有实质差异，不能只取相邻分数；权重/阈值全部版本化、可重放、双人审批和回滚，先用专家/现场样本校准，未经样本与偏差审查不引入学习排序。"
    disposition:
      type: claim
      refs:
        - tonight-decision.obligation.approved-recommendation-weights-thresholds
  - key: approved-recovery-objectives
    source_ref: docs/source-plan.md#decision.recovery-objectives
    statement: "  - Approved resolution (owner, 2026-07-20): 核心 PostgreSQL 真值（账号权限、行程/协作、地点审核、规则版本、provider/audit 元数据）目标 RPO ≤15min、RTO ≤2h；用户媒体和不可轻易重建对象 RPO ≤1h、RTO ≤8h；可从 immutable raw/官方源重建的派生瓦片/报告 RPO ≤24h、RTO ≤24h，Redis/本地缓存不备份且可清空重建。首发采用同一合规区域的加密 PITR+对象版本/生命周期，不默认昂贵跨云热备；每月抽样恢复、每季度完整隔离恢复演练，校验引用、权限、删除墓碑、受限坐标和实际 RPO/RTO。未通过演练的环境不得标 production-ready。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.obligation.approved-recovery-objectives
  - key: approved-route-provider-fallback-and-quotas
    source_ref: docs/source-plan.md#decision.route-provider-fallback-and-quotas
    statement: "  - Approved resolution (owner, 2026-07-20): 中国首发只实现高德一个生产 Provider Adapter，购买/启用满足原生地图+定位+搜索+服务端驾车/步行/骑行路线的最低合法 SKU，具体 key、配额、SLA、价格和缓存期限由 EXT 合同门注入；不预购第二商业地图/路线源。APP 内显示路线快照，实际导航优先调用用户设备上已安装且支持目标坐标的外部地图，高德优先、其他应用仅作用户选择；provider 超时遵守候选批预算并退到带时间戳的合法 snapshot 或明确标注的直线距离。无离线许可时离线包不抓取底图；坐标为 approximate/area/restricted 时只导航到获授权入口或模糊区域，不泄露/推算精确点。"
    disposition:
      type: claim
      refs:
        - map-route-discovery.obligation.approved-route-provider-fallback-and-quotas
  - key: approved-safety-thresholds
    source_ref: docs/source-plan.md#decision.safety-thresholds
    statement: "  - Approved resolution (owner, 2026-07-20): 在专业/法务/现场确认前，唯一自动硬阻断来源是有效期内的官方严重预警、官方/管理方封路封园/门禁、法律/土地访问限制、已核验地点危险和用户/设备制造商明确限制；普通数值预报的风、降雨、能见度、潮汐等只生成带来源/时效的分级警告，不自行发明通用“安全线”。规则按地点类型、出行方式、目标和设备配置，来源冲突时采用官方/现场核验优先并显示差异；任何正式数值阻断须由 named safety reviewer 批准、带适用范围/版本/回放证据，UI 明确这是辅助决策而非救援或安全保证。"
    disposition:
      type: claim
      refs:
        - tonight-decision.obligation.approved-safety-thresholds
  - key: approved-seeing-data-source
    source_ref: docs/source-plan.md#decision.seeing-data-source
    statement: "  - Approved resolution (owner, 2026-07-20): MVP/V1 只显示可解释的通透度估计及输入/置信度，正式“视宁度”字段为 disabled/数据未获验证，不用普通天气变量生成一个看似客观的 arcsec 数字；实验性大气稳定度仅可在明确“实验”开关内显示且不参与安全硬阻断。只有专业源许可、目标区域/设备范围、与现场或权威样本的容差、版本和 reviewer 全部通过后，才在通过区域启用正式视宁度并保留旧版重放。"
    disposition:
      type: claim
      refs:
        - forecast-and-astronomy.requirement.approved-seeing-data-source
  - key: approved-spot-coordinate-default-visibility
    source_ref: docs/source-plan.md#decision.spot-coordinate-default-visibility
    statement: "  - Approved resolution (owner, 2026-07-20): 所有用户新提交地点默认 `approximate`、中心抖动/区域半径 1km 且待审核；只有管理员核验低生态/私人/安全风险、合法公共可达入口和公开来源后可升为 `exact`。生态敏感、私人土地、未核验山野/海岸和高风险地点默认 `area`（2～10km 依风险）或 `restricted/invite_only`，精确坐标只在已授权详情、导航和加密离线包中按最小权限返回。公开分享、截图、分析、推送、日志、缓存/CDN 和错误信息都沿用同级或更模糊坐标，禁止从路线终点/图片 EXIF/相邻对象反推；申请精确位置需登录、用途说明、到期和审计。"
    disposition:
      type: claim
      refs:
        - spot-detail-and-trust.obligation.approved-spot-coordinate-default-visibility
  - key: approved-supported-os-device-matrix
    source_ref: docs/source-plan.md#decision.supported-os-device-matrix
    statement: "  - Approved resolution (owner, 2026-07-20): 安装下限跟随 SDK 57：iOS 16.4+、Android 7/API 24+、compile/target API 36；正式全功能测试档为 iOS 16.4+ 支持机型与 Android 10+、≥4GB RAM、≥64GB 存储，兼容降级档为 Android 7～9、3GB RAM，2GB RAM/32-bit 不承诺。无 GMS 设备必须完成核心查询、地图、离线和本地提醒，远端推送按国内厂商通道能力显示；缺磁力计/陀螺仪/气压计时隐藏对应能力并允许手动方向，AR 仅对通过 ARKit/ARCore 认证设备开放。低端档关闭 AR、高密 Skia/粒子、昂贵模糊和复杂物理转场并降低天空帧率/图层密度，但不得降级安全、来源、状态与可访问性。"
    disposition:
      type: claim
      refs:
        - quality-release-observability.obligation.approved-supported-os-device-matrix
  - key: approved-weather-provider-contracts
    source_ref: docs/source-plan.md#decision.weather-provider-contracts
    statement: "  - Approved resolution (owner, 2026-07-20): 实现时以服务端 Provider Adapter 和冻结 fixtures 为先；生产常规天气/小时/日预报/官方预警/AQI 首选 QWeather 最小 SKU 与 JWT，仅在合同、首发区 30+ 地点 POC、归属/cache/保留/QPM/SLA 和 12 个月 TCO 门通过后启用。Open-Meteo 免费端点只用于非商业 POC；只有低/中/高云、多模型或历史能力带来可量化增益且最低商业档总 TCO 合格时才购买，不默认与 QWeather 双付费；ECMWF Open Data 只做服务端离线基准。FY-4B/其他卫星实况在自动化、商业再展示/派生、30 天延迟/缺帧与成本全通过前保持 disabled，UI 退回有来源的预报云量。任何生产响应保存 provider/model/run/issuedAt/expiresAt/许可与归属，失败按 fresh→合法 stale→partial/unknown 降级，预警过期不继续冒充当前。"
    disposition:
      type: claim
      refs:
        - admin-data-operations.obligation.approved-weather-provider-contracts
