  - key: spot-detail-and-trust
    title: 地点详情、真实性与风险判断
    depends_on:
      - map-route-discovery
      - forecast-and-astronomy
    product:
      observable_result: 用户可在一个地点详情中由“今晚是否适合”逐层核对光污染/遮挡、实景、交通最后一公里、设施、安全和用户实况，理解数据来源、更新时间、可信度及精确坐标公开范围，并完成收藏、主备、导航、天空、拍摄、实况或纠错操作；资料缺失、过期、冲突和临时关闭不会被漂亮卡片掩盖。
      owner:
        label: spot-detail-and-trust owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/spots/**
          - apps/api/src/modules/spots/**
          - packages/domain/src/spots/**
          - workers/geospatial/**
          - infrastructure/database/migrations/manifest.json
          - infrastructure/database/migrations/20260720_platform_up.sql
          - infrastructure/database/migrations/20260720_platform_down.sql
      requirements:
        - key: spot-identity-and-freshness
          statement: "- **REQ spot-identity-and-freshness** [direct: S-PRODUCT 6.5A]：详情基础信息完整包含名称、经纬度/访问级别、地址、海拔、地点类型、开放时间、收费、数据更新时间、数据可信度和最近用户实况时间。"
          required_proof_surfaces:
            - ui_browser
        - key: spot-tonight-comparison
          statement: "- **REQ spot-tonight-comparison** [direct: S-PRODUCT 6.5B]：今晚区包含综合评分、最佳/无月/银河窗口、云量变化、降雨、风、月光、可见天象、数据可信度和相对附近地点优劣，并延续硬阻断/原因/行动/专业证据层级。"
          required_proof_surfaces:
            - ui_browser
        - key: light-pollution-evidence
          statement: "- **REQ light-pollution-evidence** [direct: S-PRODUCT 6.5C, S-ARCH 6.6]：光污染区显示地图、指数/合法推导的 Bortle 区间、主要光源与城市光穹方向、用户实测、路灯/营地灯/车辆灯等临时风险，以及数据集年份、许可、置信度和估算方法；规范化数据保留 radiance_nw_cm2_sr、light_pollution_index、estimated_sky_brightness、estimated_bortle_min/max、confidence、dataset_version，VIIRS 辐射值不得直接命名为 Bortle。"
          required_proof_surfaces:
            - ui_browser
        - key: directional-horizon
          statement: "- **REQ directional-horizon** [direct: S-PRODUCT 6.5D, S-ARCH 6.7]：记录北、东北、东、东南、南、西南、西、西北遮挡、整体开阔度、山体/树林/建筑/电塔类型和适合方向；可将版本化 DEM 地形、人工修正、全景识别轮廓取最大有效遮挡并叠加星图。"
          required_proof_surfaces:
            - ui_browser
        - key: spot-media-provenance
          statement: "- **REQ spot-media-provenance** [direct: S-PRODUCT 6.5E, S-ARCH 12]：媒体覆盖地点全景、各方向实景、白天、夜间和星空样片，并显示拍摄日期/时间、手机或相机、镜头/焦段、方向、曝光、备注、可信度和是否原地点拍摄；公开资产移除精确 GPS、序列号与隐私 EXIF。"
          required_proof_surfaces:
            - ui_browser
        - key: last-mile-access
          statement: "- **REQ last-mile-access** [direct: S-PRODUCT 6.5F]：交通区完整描述直达、停车位置/容量、停车后步行距离/时间、累计爬升、道路类型、夜间风险、越野车、雨后状况、门禁/预约和外部导航；位置类字段携带验证时间和来源。"
          required_proof_surfaces:
            - ui_browser
        - key: facilities-and-emergency
          statement: "- **REQ facilities-and-emergency** [direct: S-PRODUCT 目标用户/6.5G]：设施区覆盖厕所、饮用水、电源、手机信号、平整观测平台/大型设备展开空间、露营、住宿、补给、遮雨、垃圾处理和紧急求助条件，并能表达夜间开放、收费、容量、季节性、未知或临时不可用。"
          required_proof_surfaces:
            - ui_browser
        - key: spot-safety
          statement: "- **REQ spot-safety** [direct: S-PRODUCT 6.5H]：安全区覆盖山路/悬崖/水域、野生动物、治安、极端天气、潮汐/水位、封路、结伴要求和最近风险报告；高风险或关闭状态在首屏与导航前重复呈现且不能被总分抵消。"
          required_proof_surfaces:
            - ui_browser
        - key: multidimensional-reviews
          statement: "- **REQ multidimensional-reviews** [direct: S-PRODUCT 6.5I]：评价维度包括天空暗度、开阔度、实际云量、交通便利、设施完整、安全、拥挤、手机信号、摄影适配和目视适配；短实况保留到达时间和具体观察，不能压成一个平均总分。"
          required_proof_surfaces:
            - ui_browser
        - key: spot-actions
          statement: "- **REQ spot-actions** [direct: S-PRODUCT 6.5J]：详情提供收藏、分享、加入今晚计划、设为主地点、设为备选地点、立即导航、查看 360°天空、获取拍摄参数、上传实况和纠错；动作按登录、坐标访问、风险和数据可用性显示 disabled 原因。"
          required_proof_surfaces:
            - ui_browser
        - key: coordinate-visibility
          statement: "- **REQ coordinate-visibility** [direct: S-PRODUCT 风险, S-ARCH 15.3]：地点坐标支持 public_exact、public_approximate、verified_only、invite_only、private、hidden；对可能引发人流/垃圾、私人土地侵入、夜间扰民、生态破坏或不安全驾驶的敏感/高风险地点，不默认公开精确坐标，并支持模糊/仅核验可见、暂停推荐和季节性关闭；地图/分享/导航/离线所有出口遵守同一策略。"
          required_proof_surfaces:
            - ui_browser
        - key: trust-and-conflict
          statement: "- **REQ trust-and-conflict** [direct: S-PRODUCT 6.11D, S-ARCH 5.3]：地点事实显示来源、核验方式、最近确认、样本数、置信度、审核状态和冲突；官方/管理员、已核验贡献、普通贡献与过期临时实况权重不同，但具体等级/阈值由 DEC moderation-trust-policy 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: spot-hero-user-task
          statement: "  - User task: 识别地点并快速判断今晚是否可去。"
          required_proof_surfaces:
            - ui_browser
        - key: spot-media-gallery-user-task
          statement: "  - User task: 核对真实环境、方向和摄影参考。"
          required_proof_surfaces:
            - ui_browser
        - key: evidence-section-nav-user-task
          statement: "  - User task: 在今晚、天空、到达、设施、安全、实况之间快速跳转。"
          required_proof_surfaces:
            - ui_browser
        - key: horizon-polar-view-user-task
          statement: "  - User task: 判断指定方向、高度的遮挡和光穹。"
          required_proof_surfaces:
            - ui_browser
        - key: access-facility-fact-list-user-task
          statement: "  - User task: 核对车辆、步行、门禁和现场资源。"
          required_proof_surfaces:
            - ui_browser
        - key: safety-block-user-task
          statement: "  - User task: 理解是否应取消、结伴、换地点或采取防护。"
          required_proof_surfaces:
            - ui_browser
        - key: trust-panel-user-task
          statement: "  - User task: 判断资料为何可信、哪里不确定。"
          required_proof_surfaces:
            - ui_browser
        - key: spot-action-dock-user-task
          statement: "  - User task: 对当前地点执行收藏、主备、导航、天空、拍摄、实况或纠错。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-mvp-launch-region-and-spot-seed
          statement: "  - Approved resolution (owner, 2026-07-20): 首发采用“全国可浏览、仅深圳及粤港澳大湾区已核验覆盖可生成地点推荐”的单城市群深耕模式；首批至少 30 个人工核验地点，覆盖城市边缘公园、海岸、山地、露营/郊野、天文场馆周边等类型，每点具备合法可达性、精确/模糊坐标级别、开放/门禁、停车与最后一公里、设施、风险、光环境、照片来源和最近核验时间。天气/路线/瓦片 POC 覆盖该区域，区域外允许手动查看有来源的天气/天文但显示“地点资料不足”且不伪造主备推荐。扩区需同时满足连续 30 天数据质量、地图/路线/许可、至少 20 个同标准核验点、现场抽检和成本/SLO 门。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-light-pollution-calibration
          statement: "  - Approved resolution (owner, 2026-07-20): MVP/V1 只发布 EOG Annual VNL v2.2 的 radiance 参考值、数据年份、coverage/quality、空间分辨率、许可归属和“卫星夜光不等于现场天空亮度”的解释，不显示 Bortle、银河可见保证或伪造 SQM。系统预留版本化校准模型与置信区间，但只有 named astronomy reviewer 批准区域/季节/地貌分层的质量规则、足量独立 SQM/现场样本和 held-out 验证后，才在通过区域显示宽区间；未通过/样本外区域保持 radiance-only/unknown，模型更新可重放与回滚。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - spot detail
        - trust and safety evidence
        - spot APIs
      controls:
        - key: spot-hero
          location: "  - Location: 地点详情首屏，媒体之后或与媒体重叠的稳定标题区。"
          trigger: "  - Trigger: 打开详情或切换日期/预设。"
          input: "  - Input: 身份、今晚结论、主阻断、窗口、距离/车程、可信度、开放/风险状态。"
          loading_state: "  - Loading: 地点身份立即显示，动态今晚数据用固定骨架。"
          empty_state: "  - Empty: 无今晚报告时仍显示静态事实并给出生成/刷新入口。"
          success_state: "  - Success: 结论、最佳窗口、关键原因与主要行动首屏可读。"
          failure_state: "  - Failure: 动态失败与静态事实分离，不能把旧评分显示为当前。"
          feedback: "  - Feedback: 风险/关闭高于推荐分；更新时间、可信度和主备状态可见。"
        - key: spot-media-gallery
          location: "  - Location: 详情顶部图库及“实景与样片”区。"
          trigger: "  - Trigger: 滑动缩略图、打开全屏、切换白天/夜间/全景/样片。"
          input: "  - Input: 已审核媒体、方向/时间/设备/曝光、原地点证明、可信度。"
          loading_state: "  - Loading: 使用与媒体比例一致的占位并逐张加载。"
          empty_state: "  - Empty: 按类别显示缺失并提供上传入口，不用装饰图伪装实景。"
          success_state: "  - Success: 全屏图与结构化元数据、方向和审核状态对应。"
          failure_state: "  - Failure: 单图失败可重试/跳过，图库其余内容继续可用。"
          feedback: "  - Feedback: AI/处理图、非原地点、模糊位置和过期素材有显著标签。"
        - key: evidence-section-nav
          location: "  - Location: 首屏下方吸顶分段导航。"
          trigger: "  - Trigger: 点击分段或滚动进入区块。"
          input: "  - Input: 可用区块、缺失/风险徽标和当前滚动位置。"
          loading_state: "  - Loading: 导航结构稳定，动态徽标渐进出现。"
          empty_state: "  - Empty: 缺少内容的区块仍可进入并解释缺口。"
          success_state: "  - Success: 目标标题不被安全区/吸顶栏遮挡，选中状态同步。"
          failure_state: "  - Failure: 锚点失效时回到区块顶部，不改变地点。"
          feedback: "  - Feedback: 含高风险或未核验内容的区块显示非颜色唯一的提示。"
        - key: horizon-polar-view
          location: "  - Location: “光污染与地平线”区，可全屏。"
          trigger: "  - Trigger: 拖动方位、切换地平线/光污染/目标叠加或视角。"
          input: "  - Input: 0～359°地形/人工/全景轮廓、八向摘要、目标轨迹、版本/置信度。"
          loading_state: "  - Loading: 保留方位刻度和图例，轮廓分层加载。"
          empty_state: "  - Empty: 无轮廓时显示八向文字事实或明确未知。"
          success_state: "  - Success: 北向、方位/高度、有效遮挡、光源和目标交互一致。"
          failure_state: "  - Failure: 某数据层失败即隐藏该层并标注，不合成虚假轮廓。"
          feedback: "  - Feedback: 图例解释地形/人工/估算、较暗/较亮与数据版本；支持文字等价描述。"
        - key: access-facility-fact-list
          location: "  - Location: “到达与设施”区。"
          trigger: "  - Trigger: 展开分组或点击具体事实。"
          input: "  - Input: REQ last-mile-access 与 REQ facilities-and-emergency 的全部字段、来源、验证时间。"
          loading_state: "  - Loading: 静态事实优先呈现，动态开放/路线单独加载。"
          empty_state: "  - Empty: unknown 与“没有”严格区分并提供纠错。"
          success_state: "  - Success: 每行显示值、单位/状态、核验时间和必要说明。"
          failure_state: "  - Failure: 动态字段失败不覆盖已核验静态值，标明冲突。"
          feedback: "  - Feedback: 硬要求不满足、季节性/夜间限制和最后一公里风险被提升。"
        - key: safety-block
          location: "  - Location: 首屏风险条、独立安全区和导航确认。"
          trigger: "  - Trigger: 打开详情、风险更新、点击导航/加入计划。"
          input: "  - Input: 全部安全事实、风险等级、来源、时间、关闭状态和替代地点。"
          loading_state: "  - Loading: 未取到最新风险时明确“正在核对”，不短暂显示安全。"
          empty_state: "  - Empty: 无报告显示“暂无已知报告”，不等同“无风险”。"
          success_state: "  - Success: 风险、行动建议和主备替代清楚可见。"
          failure_state: "  - Failure: 风险源失败时按保守策略降级并阻止无提示导航。"
          feedback: "  - Feedback: 用户确认不能消除风险标签；高风险动作有再次说明和取消路径。"
        - key: trust-panel
          location: "  - Location: 每个关键事实的来源入口及详情末尾汇总。"
          trigger: "  - Trigger: 点击可信度/更新时间/来源标签。"
          input: "  - Input: 来源、许可、核验主体/方法、样本、冲突、规则/数据版本和审核状态。"
          loading_state: "  - Loading: 已知来源先显示，细节增量加载。"
          empty_state: "  - Empty: 无证据时直说“未核验”，提供贡献/纠错。"
          success_state: "  - Success: 用户能区分模型估算、公开数据、管理员核验与临时用户实况。"
          failure_state: "  - Failure: 证据接口失败时保留摘要并标不可验证。"
          feedback: "  - Feedback: 不用抽象星级代替来源、样本和新鲜度。"
        - key: spot-action-dock
          location: "  - Location: 详情底部安全区内，主动作与更多动作分层。"
          trigger: "  - Trigger: 点击主按钮/更多菜单。"
          input: "  - Input: 地点身份、权限、登录、坐标访问、风险、当前计划和数据可用性。"
          loading_state: "  - Loading: 单个写操作显示局部进度，防重复但不锁整页。"
          empty_state: "  - Empty: 不适用动作隐藏或 disabled 并给出原因/解锁路径。"
          success_state: "  - Success: 状态原子更新并同步到地图、今晚和行程。"
          failure_state: "  - Failure: 乐观更新回滚，用户输入/当前位置不丢失。"
          feedback: "  - Feedback: 导航/分享明确坐标精度，风险地点行动前再次提示。"
      non_completing_outcomes:
        - key: single-rating
          statement: "- **NCOMP single-rating** [direct: S-PRODUCT 6.5I]：只有一个总评分、没有维度/时间/样本/来源和短实况，不能算地点评价完成。"
    technical:
      obligations:
        - key: normalized-spot-entities
          statement: "- **OBL normalized-spot-entities** [direct: S-ARCH 5.3]：Spot 不得成为一个大 JSON；至少分离 spot、spot_access、spot_facility、spot_horizon_sector、spot_light_source、spot_media、spot_status_history、spot_verification、spot_visibility_policy，并保留版本/来源/审核。"
          required_proof_surfaces:
            - data_state
            - implementation_structure
            - security_boundary
            - ui_browser
        - key: media-privacy-pipeline
          statement: "- **OBL media-privacy-pipeline** [direct: S-ARCH 12]：媒体走短期上传凭证 → 对象存储 → 服务端确认 → 处理 → EXIF 清理 → 缩略图/WebP/AVIF → 审核 → 地点归属验证 → 发布；全景另存投影、方向、北向、遮挡轮廓、识别版本和人工修正。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-spot-coordinate-default-visibility
          statement: "  - Approved resolution (owner, 2026-07-20): 所有用户新提交地点默认 `approximate`、中心抖动/区域半径 1km 且待审核；只有管理员核验低生态/私人/安全风险、合法公共可达入口和公开来源后可升为 `exact`。生态敏感、私人土地、未核验山野/海岸和高风险地点默认 `area`（2～10km 依风险）或 `restricted/invite_only`，精确坐标只在已授权详情、导航和加密离线包中按最小权限返回。公开分享、截图、分析、推送、日志、缓存/CDN 和错误信息都沿用同级或更模糊坐标，禁止从路线终点/图片 EXIF/相邻对象反推；申请精确位置需登录、用途说明、到期和审计。"
          required_proof_surfaces:
            - ui_browser
      expected_change_paths:
        - apps/mobile/src/features/spots/**
        - apps/api/src/modules/spots/**
        - packages/domain/src/spots/**
        - workers/geospatial/**
        - infrastructure/database/migrations/manifest.json
        - infrastructure/database/migrations/20260720_platform_up.sql
        - infrastructure/database/migrations/20260720_platform_down.sql
      forbidden_paths:
        - node_modules/**
        - .git/**
        - docs/design-system/source/**
      forbidden_shortcuts: []
      bindings:
        - key: outcome-carrier
          kind: file
          target: apps/mobile/src/features/spots/index.ts
          carrier_paths:
            - apps/mobile/src/features/spots/index.ts
          existence: planned
      rollback_and_recovery:
        rollback: Stop writes for spot-detail-and-trust, restore the last compatible version or immutable source pointer, and preserve every user/external record created before the rollback boundary.
        recovery: Replay idempotent work for spot-detail-and-trust, reconcile revisions and provider/source versions, expose unresolved conflicts, and rerun the named verification check before reopening writes.
        verification_check_keys:
          - data-boundary
