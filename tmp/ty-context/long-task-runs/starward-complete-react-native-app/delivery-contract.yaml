          input: "  - Input: REQ field-report-submission 全部字段、地点/时间/位置精度、TTL 和媒体。"
          loading_state: "  - Loading: 本地保存立即完成，媒体/提交可后台排队。"
          empty_state: "  - Empty: 未观察项目可标 unknown/跳过，不强迫猜测。"
          success_state: "  - Success: 显示有效起止、待审核/已发布和地点当前状态影响。"
          failure_state: "  - Failure: 草稿保留，离线排队；过期前未同步时提示是否仍有意义。"
