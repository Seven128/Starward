global:
  product:
    non_goals:
      - key: generic-weather-dashboard
        statement: "- **NG generic-weather-dashboard**：不把产品做成只展示接口字段的天气仪表盘、通用星图或旅游路线工具。"
      - key: pwa-as-final-product
        statement: "- **NG pwa-as-final-product**：移动网页/PWA 可用于历史方案中的数据验证，但不能替代本轮明确要求的 React Native APP 完成形态。"
      - key: mini-program-full-parity
        statement: "- **NG mini-program-full-parity**：微信小程序仅是后续分享、轻查询、邀请和拉新入口，不承担全部专业能力。"
      - key: mvp-general-social-network
        statement: "- **NG mvp-general-social-network**：MVP 不做通用信息流、关注/粉丝、私信或与观星决策无关的动态。"
      - key: mvp-heavy-professional-suite
        statement: "- **NG mvp-heavy-professional-suite**：MVP 不做完整内置导航、完整 AR、高精度构图、所有天象工具、大规模共同编辑、自动解析所有社交平台攻略或专业设备控制。"
  technical:
    constraints:
      - key: shared-decision-context
        statement: "- **OBL shared-decision-context** [direct + repo evidence: S-PRODUCT 闭环, S-CONTEXT]：当前位置/手动出发地、观星夜/时刻、当前偏好、观测目标、选中地点、主备角色、路线方案、行程 revision、数据新鲜度和风险是共享决策上下文；今晚、地图、详情、行程、天空、摄影和现场切换时必须原子更新或显式标 stale，不能各页维护互相矛盾副本。"
      - key: conclusion-action-evidence-hierarchy
        statement: "- **OBL conclusion-action-evidence-hierarchy** [direct: S-PRODUCT 八, S-DESIGN]：用户面产品统一按第一层“今晚是否值得/何时何地”、第二层“出发/导航/主备/提醒”等可执行建议、第三层天气/天文/光污染/路线/来源专业证据组织；高级数据按需展开，安全阻断始终越级可见。"
      - key: data-state-and-provenance
        statement: "- **OBL data-state-and-provenance** [direct: S-ARCH 7.1/9.4, S-PRODUCT 风险]：所有影响决策的数据/结论能表示 loading、fresh、stale、partial、degraded、unknown、error，显示 generatedAt/expiresAt、来源/许可、版本、可信度、warnings 和缓存/缺失；预测/估算/用户实况/人工核验不能混成确定事实。"
      - key: time-coordinate-unit-consistency
        statement: "- **OBL time-coordinate-unit-consistency** [direct: S-ARCH 6.1/7.1/19.3～19.4]：存储与计算用 WGS84、UTC、地点 IANA 时区和国际单位，观星夜按当地日落日期；展示可本地化单位但 API/缓存/离线/分享保留原单位/时区/坐标语义，禁止无时区时间或无品牌坐标 tuple。"
      - key: permission-and-privacy-minimization
        statement: "- **OBL permission-and-privacy-minimization** [direct: S-ARCH 3.5/15]：登录、精确/后台位置、相机/相册、通知、联系人、AR 和外部分享按任务最小化、即时说明、拒绝可降级/撤回；服务端执行坐标/对象/字段权限，精确位置/轨迹/EXIF/secret 不进分析、普通日志或公开产物。"
      - key: offline-critical-continuity
        statement: "- **OBL offline-critical-continuity** [direct: S-ARCH 3.3～3.4]：现场关键读取本地优先，网络刷新不清空可用缓存；离线写入本地事务与幂等队列，断网/杀进程/重启后可恢复；同步失败/冲突逐项可见，不能用在线专属页面壳声称离线完成。"
      - key: accessible-responsive-themes
        statement: "- **OBL accessible-responsive-themes** [repo evidence + necessary derivation: S-DESIGN/S-CONTEXT]：所有 APP 页面以 390×844 为主要基线并适配更小/更大手机、安全区、横竖屏（仅适用沉浸工具）、文本放大和键盘；44px 目标、屏幕阅读器顺序/名称、颜色非唯一、reduced motion、日/夜/红光对比与稳定布局必须覆盖 loading/empty/no-results/error/disabled/saving/success。"
      - key: versioned-recoverable-change
        statement: "- **OBL versioned-recoverable-change** [direct: S-ARCH 5.11/7.1/11.2]：外部数据、地点事实、推荐、行程、摄影、规则和审核变更保留来源/版本；写入有幂等键/revision，冲突显式，批量/危险变更先影响预览并有恢复/回滚边界；不得静默覆盖用户编辑或有效原始数据。"
      - key: release-phase-integrity
        statement: "- **OBL release-phase-integrity** [direct: S-PRODUCT 十～十二]：MVP/V1/V2/V3 范围按 Section 3 保存；提前实现后续能力可以，但不得让 V2/V3 空壳成为 MVP 前置，也不得因后续目标尚未实现而把 MVP 的外部导航/简单行程/基础摄影/轻贡献降为静态占位；最终产品形态仍为 RN APP。"
    forbidden_paths: []
    forbidden_shortcuts:
      - key: client-side-source-stitching
        statement: "- **FS client-side-source-stitching**：移动端不得直接并发十几个供应商接口并在页面临时拼装结论；必须消费后端标准化、版本化、可解释的聚合结果。"
      - key: unexplained-single-score
        statement: "- **FS unexplained-single-score**：不得用一个无拆分、无阻断、无可信度、无原因的总分代表推荐。"
      - key: fake-or-guaranteed-data
        statement: "- **FS fake-or-guaranteed-data**：不得用看似真实的 fixture/fallback 遮蔽缺失，也不得使用“绝对晴朗、保证可见”等确定性承诺。"
      - key: lowest-sticker-price-provider
        statement: "- **FS lowest-sticker-price-provider**：不得因免费额度或最低接口/套餐标价选择未通过来源可追溯、目标区质量/稳定性、商业许可和安全降级硬门的数据源，也不得通过漏算加权调用、计算/存储/出网、工程运维、合规、故障或迁移成本伪造“最低价”。"
      - key: coordinate-mixing
        statement: "- **FS coordinate-mixing**：不得在业务层混用 WGS84/GCJ-02、反写高德坐标为权威值、用 GCJ-02 做天文计算或依赖肉眼修正。"
      - key: ai-invented-exposure
        statement: "- **FS ai-invented-exposure**：AI 不得随意编造曝光参数，只能解释确定性规则和提供有依据的个性化建议。"
      - key: ar-only-core
        statement: "- **FS ar-only-core**：AR 不得成为天空/现场核心路径的唯一实现；不支持设备必须有通用天空或摄像头+传感器降级。"
      - key: online-only-field-mode
        statement: "- **FS online-only-field-mode**：仅联网可用的现场模式不算完成。"
      - key: static-screen-completion
        statement: "- **FS static-screen-completion**：静态设计稿、预览 Kit、无真实状态流的页面壳或单一平台演示不能算 APP 完成。"
