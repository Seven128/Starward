  - key: notifications-and-toolbox
    title: 条件通知与专业天象工具
    depends_on:
      - tonight-decision
      - itinerary-and-collaboration
      - identity-profile-privacy
    product:
      observable_result: 用户可按地点/区域、目标和阈值订阅出发前、行程中及长期观星事件，控制时段/通道/冷却并从通知深链回到同一地点、时间、行程或备选决策；后续版本可在独立工具箱查询天象日历、空间站、天体位置、摄影计算器和专业内容，所有结果显示位置/时间/数据或算法版本，而不会把工具堆到新手首页。
      owner:
        label: notifications-and-toolbox owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/notifications/**
          - apps/mobile/src/features/toolbox/**
          - apps/api/src/modules/notifications/**
          - workers/notification/**
      requirements:
        - key: pretrip-notifications
          statement: "- **REQ pretrip-notifications** [direct: S-PRODUCT 九]：出发前通知覆盖今晚条件达到用户阈值、最佳窗口即将开始、收藏地点天气转好、月落、银河升起和特殊天象将发生。"
          required_proof_surfaces:
            - ui_browser
        - key: intrip-notifications
          statement: "- **REQ intrip-notifications** [direct: S-PRODUCT 九]：行程中通知覆盖云层快速增加、降雨风险上升、风速超过设备安全范围、主地点道路异常、建议切换备选、预计到达晚于最佳窗口，并引用受影响行程 revision/地点/窗口。"
          required_proof_surfaces:
            - ui_browser
        - key: long-term-notifications
          statement: "- **REQ long-term-notifications** [direct: S-PRODUCT 九]：长期通知覆盖周末附近优良窗口、新月前后、流星雨/日月食/行星观测、收藏地点新增实况或信息变更。"
          required_proof_surfaces:
            - ui_browser
        - key: notification-control
          statement: "- **REQ notification-control** [direct: S-PRODUCT 九, 6.13]：每条订阅可设地点/网格、目标、条件阈值、提前量、免打扰时段、通道和启用状态；提供总开关、类别开关、频率/冷却、历史与单条退订，默认值由 DEC notification-defaults-cooldowns 决定。"
          required_proof_surfaces:
            - ui_browser
        - key: notification-explainability
          statement: "- **REQ notification-explainability** [derived from recommendation principles]：通知正文说明“什么变化、何地何时、达到哪个阈值、建议什么”，附来源/生成时间和深链；过期、条件已反转或目标不可访问时打开降级摘要，不进入错误页面。"
          required_proof_surfaces:
            - ui_browser
        - key: event-driven-evaluation
          statement: "- **REQ event-driven-evaluation** [direct: S-ARCH 5.14]：新天气模型/道路/地点状态到达后，定位受影响网格/订阅，批量评估、去重和冷却；禁止为每个用户独立定时拉取；通道经 APNs、FCM、国内安卓厂商和本地通知适配器发送。"
          required_proof_surfaces:
            - data_state
        - key: celestial-calendar
          statement: "- **REQ celestial-calendar** [direct: S-PRODUCT 6.12, V3]：天象日历覆盖月相、日食/月食、流星雨、行星合月等事件、彗星、极光和重要提醒，按用户地点/时区显示可见性，而非只列全球事件标题。"
          required_proof_surfaces:
            - ui_browser
        - key: station-transits
          statement: "- **REQ station-transits** [direct: S-PRODUCT 6.12, V3]：空间站工具覆盖中国空间站/国际空间站未来若干日可见过境、开始/最高/结束时间、方位/高度、亮度、路径和凌日/凌月预报，并显示轨道 epoch/更新/可信度。"
          required_proof_surfaces:
            - ui_browser
        - key: object-position-tools
          statement: "- **REQ object-position-tools** [direct: S-PRODUCT 6.12]：天体位置覆盖日月升落、银河中心升落/中天、金火木土等行星、主要恒星升起/中天/落下、方位/高度/亮度及指定时间天空地图，并复用 Astronomy 领域语义。"
          required_proof_surfaces:
            - ui_browser
        - key: photography-tools
          statement: "- **REQ photography-tools** [direct: S-PRODUCT 6.12, V3]：摄影工具覆盖防脱焦、景深、反向景深、实时极轴镜模拟、最佳摄影时刻和镜头视场；输入单位、公式/规则版本、设备假设和输出限制可见。"
          required_proof_surfaces:
            - ui_browser
        - key: other-astronomy-tools
          statement: "- **REQ other-astronomy-tools** [direct: S-PRODUCT 6.12, V3]：其他工具覆盖 3D 星图、极光地图、流星雨流量监测/可见数量估算、日食/月食模拟和近期彗星可见性，明确实验性、地区覆盖与数据源。"
          required_proof_surfaces:
            - ui_browser
        - key: educational-content
          statement: "- **REQ educational-content** [direct: S-PRODUCT 6.12, low priority]：内容区可含 NASA APOD、天文机构图片、天象解释、新手指南和当月目标；版权/许可/来源/发布日期清晰，内容用于教育留存但不得占据“今晚”主决策位。"
          required_proof_surfaces:
            - ui_browser
        - key: notification-rule-editor-user-task
          statement: "  - User task: 创建/编辑地点、目标和阈值通知。"
          required_proof_surfaces:
            - ui_browser
        - key: notification-settings-center-user-task
          statement: "  - User task: 管理总开关、类别、规则、通道、免打扰和历史。"
          required_proof_surfaces:
            - ui_browser
        - key: notification-message-deeplink-user-task
          statement: "  - User task: 理解变化并采取查看、换点、调整行程或忽略动作。"
          required_proof_surfaces:
            - ui_browser
        - key: toolbox-index-user-task
          statement: "  - User task: 按类别找到天象、空间站、天体位置、摄影或其他工具/内容。"
          required_proof_surfaces:
            - ui_browser
        - key: celestial-event-detail-user-task
          statement: "  - User task: 判断事件在当前地点何时何方向可见并设置提醒/打开天空。"
          required_proof_surfaces:
            - ui_browser
        - key: astronomy-calculator-form-user-task
          statement: "  - User task: 输入镜头/传感器/距离等参数并获取可重算结果。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-notification-defaults-cooldowns
          statement: "  - Approved resolution (owner, 2026-07-20): 所有通知类别默认关闭并显式 opt-in；创建行程时可预览建议的出发前 24h/3h 条件复核、窗口开始 60min 和用户自定提醒，但不自动勾选。默认免打扰为地点本地 22:00～08:00，用户可按类别覆盖；官方严重预警也只有在用户订阅该行程风险后可越过免打扰，且文案不称紧急救援。相同 provider event+区域 6h 冷却，实质条件跨阈变化 2h，长期天象/计划 24h；只在状态边沿产生幂等事件。MVP 以本地提醒+APP 内收件箱为权威，APNs/FCM/国内厂商按发行渠道 POC 后启用，Expo Push 只用于非关键 POC；保存 receipt/去重/失效 token，失败时打开 APP 重算而不沿用旧安全信息。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - notification rules
        - notification deep links
        - astronomy toolbox
      controls:
        - key: notification-rule-editor
          location: "  - Location: 地点/行程/天象“提醒我”及“我的 → 通知设置”。"
          trigger: "  - Trigger: 点击提醒、新建规则或编辑现有规则。"
          input: "  - Input: 类别、地点/网格/行程、目标、阈值、提前量、免打扰、通道、有效期。"
          loading_state: "  - Loading: 保存期间输入保持且防重复。"
          empty_state: "  - Empty: 无位置/目标时要求选择；未授权推送仍可保存本地提醒或 disabled 原因。"
          success_state: "  - Success: 显示规则摘要、下一评估条件、冷却和权限状态。"
          failure_state: "  - Failure: 草稿保留，可只保存本地/稍后授权或重试服务端。"
          feedback: "  - Feedback: 阈值单位、触发方向、频率、可能无触发和测试预览明确。"
        - key: notification-settings-center
          location: "  - Location: “我的 → 通知”。"
          trigger: "  - Trigger: 打开设置、搜索规则、批量启停/删除。"
          input: "  - Input: 系统权限、通道令牌、订阅列表、发送历史和冷却状态。"
          loading_state: "  - Loading: 缓存设置先显示，服务状态增量同步。"
          empty_state: "  - Empty: 无订阅时解释可从地点/天象创建；系统权限关闭时显示设置入口。"
          success_state: "  - Success: 用户看到每条规则状态、上次评估/发送和下一可触发时间。"
          failure_state: "  - Failure: 本地状态与服务状态冲突时标注并允许重试，不谎称退订成功。"
          feedback: "  - Feedback: 批量删除/总关闭前说明本地/远端影响；单条静音可恢复。"
        - key: notification-message-deeplink
          location: "  - Location: 系统通知及 APP 内通知中心。"
          trigger: "  - Trigger: 收到/点击/展开通知。"
          input: "  - Input: 触发类型、地点/行程、旧新值、阈值、时间、数据版本和允许动作。"
          loading_state: "  - Loading: 打开后先显示通知快照，再刷新最新状态。"
          empty_state: "  - Empty: 目标已删除/无权时显示受限摘要和返回路径。"
