  - key: shooting-assistant
    title: 手机与相机摄影助手
    depends_on:
      - tonight-decision
      - forecast-and-astronomy
      - spot-detail-and-trust
    product:
      observable_result: 用户为选定地点、时间和目标选择手机/相机、镜头与支撑设备后，获得由确定性规则算出的可执行参数、构图方向、风险与替代方案，按手机/相机能力区分建议，并用 AI 解释取舍而不是编造曝光；出发前与现场检查表可加入行程、离线查看和逐项完成。
      owner:
        label: shooting-assistant owner boundary
        context_refs:
          - project_context/global.md
          - project_context/architecture.md
          - project_context/areas/main.md
          - project_context/areas/main/verification.md
        path_globs:
          - apps/mobile/src/features/shooting/**
          - apps/api/src/modules/shooting/**
          - packages/domain/src/shooting/**
      requirements:
        - key: shooting-inputs
          statement: "- **REQ shooting-inputs** [direct: S-PRODUCT 6.9A, S-ARCH 5.13]：输入包含拍摄目标、地点、时间、手机/相机型号、镜头、三脚架、赤道仪、是否接受后期堆栈和经验等级；可复用“我的设备”或临时覆盖，实际/等效焦段语义明确。"
          required_proof_surfaces:
            - ui_browser
        - key: condition-aware-shooting
          statement: "- **REQ condition-aware-shooting** [direct: S-PRODUCT 6.9B]：自动读取光污染、月光、云量、风、湿度、目标亮度、目标移动速度、焦段和天体高度，并携带地点/时刻/数据新鲜度与可信度；缺失条件降低建议确定性而不填 0。"
          required_proof_surfaces:
            - ui_browser
        - key: mobile-output
          statement: "- **REQ mobile-output** [direct: S-PRODUCT 6.9C]：手机建议覆盖主摄/超广角、专业模式、ISO、快门、白平衡、对焦、曝光补偿、连拍张数、夜景模式、堆栈和固定方式，并按设备是否支持相应控制禁用/替代。"
          required_proof_surfaces:
            - ui_browser
        - key: camera-output
          statement: "- **REQ camera-output** [direct: S-PRODUCT 6.9C, S-ARCH 5.13]：相机建议覆盖光圈、快门、ISO、白平衡、对焦、焦段、间隔设置、堆栈张数、赤道仪、降噪、构图方向和星点拖线风险。"
          required_proof_surfaces:
            - ui_browser
        - key: shooting-presets
          statement: "- **REQ shooting-presets** [direct: S-PRODUCT 6.9D]：内置手机银河、相机银河、星轨、月亮、流星雨、行星与地景、星空人像、空间站轨迹、日出日落与银河接续预设；超出当前版本的目标显示版本范围，不给无依据参数。"
          required_proof_surfaces:
            - ui_browser
        - key: deterministic-first-ai
          statement: "- **REQ deterministic-first-ai** [direct: S-PRODUCT 6.9E, S-ARCH 5.13]：曝光核心先由版本化确定性规则计算；AI 只解释依据、参数取舍、可能问题、无三脚架替代和天气变化调整，并明确模型/生成时间/限制；AI 不得更改未展示依据的核心参数。"
          required_proof_surfaces:
            - ui_browser
        - key: shooting-checklists
          statement: "- **REQ shooting-checklists** [direct: S-PRODUCT 6.9F]：出发前清单含电池、存储卡、三脚架、镜头布、防露、红光手电、保暖、驱蚊、水/补给；现场清单含关自动闪光、手动星点对焦、检查水平、试拍放大、检查结露、避免白光干扰，支持自定义和装备分工。"
          required_proof_surfaces:
            - ui_browser
        - key: plan-persistence
          statement: "- **REQ plan-persistence** [direct: S-PRODUCT 数据模型, S-ARCH 5.13]：ShootingPlan 保存目标/地点/时间、设备输入、条件快照、确定性规则版本、参数、AI 解释版本、风险、清单状态和用户调整；更新产生新版本并可加入行程/离线包。"
          required_proof_surfaces:
            - ui_browser
        - key: shooting-setup-form-user-task
          statement: "  - User task: 选择目标、时空、设备和拍摄约束。"
          required_proof_surfaces:
            - ui_browser
        - key: shooting-preset-picker-user-task
          statement: "  - User task: 以拍摄场景快速建立参数约束。"
          required_proof_surfaces:
            - ui_browser
        - key: shooting-recommendation-user-task
          statement: "  - User task: 按设备设置拍摄参数并理解关键风险。"
          required_proof_surfaces:
            - ui_browser
        - key: ai-explanation-panel-user-task
          statement: "  - User task: 理解取舍和现场调整，不把 AI 当测光真值。"
          required_proof_surfaces:
            - ui_browser
        - key: shooting-checklist-user-task
          statement: "  - User task: 按出发前/现场阶段检查装备和动作。"
          required_proof_surfaces:
            - ui_browser
        - key: save-shooting-plan-user-task
          statement: "  - User task: 保存、加入行程或更新已有摄影方案。"
          required_proof_surfaces:
            - ui_browser
        - key: approved-ai-provider-privacy
          statement: "  - Approved resolution (owner, 2026-07-20): V1/V2 默认只用确定性规则解释，AI provider、网络调用和预算均 disabled；完整摄影方案不依赖 AI 才可完成。未来仅在供应商、境内/跨境、处理者条款、零训练/最短保留、内容安全、成本和法务获批后由服务端按用户逐次 opt-in 调用，只发送经枚举的派生参数与粗粒度环境，不发送精确地点、路线、联系人、身份、原始媒体/EXIF 或自由文本秘密；结果标模型/版本/生成时间/不确定性，可举报并回退规则解释。无批准 provider、超预算、超时或撤回同意时静默禁用网络 AI 而不损坏核心流程。"
          required_proof_surfaces:
            - ui_browser
      owner_surfaces:
        - shooting setup
        - deterministic recommendation
        - field checklist
      controls:
        - key: shooting-setup-form
          location: "  - Location: 摄影助手首步，可从地点/天空/行程预填。"
          trigger: "  - Trigger: 打开摄影助手、切换预设或编辑现有方案。"
          input: "  - Input: REQ shooting-inputs 的全部字段和设备档案。"
          loading_state: "  - Loading: 设备目录/条件读取独立加载，用户输入保持。"
          empty_state: "  - Empty: 无设备时提供“临时设备/添加到我的设备”；不默认虚构镜头。"
          success_state: "  - Success: 表单显示将使用的设备能力、地点/时刻和条件摘要。"
          failure_state: "  - Failure: 字段级错误可修正，无法读取条件时可保存草稿但不生成确定建议。"
          feedback: "  - Feedback: 单位、实际/等效焦段、设备能力和必需/可选字段靠近控件。"
        - key: shooting-preset-picker
          location: "  - Location: 设置表单顶部或目标之后。"
          trigger: "  - Trigger: 选择九类预设之一。"
          input: "  - Input: 预设版本、所需设备/目标、适用范围和当前版本能力。"
          loading_state: "  - Loading: 预设规则读取时不清空当前输入。"
          empty_state: "  - Empty: 无适配预设时进入自定义，并解释原因。"
          success_state: "  - Success: 仅预填/约束相关字段，用户可查看变更。"
          failure_state: "  - Failure: 恢复先前设置，不落入通用神秘默认。"
          feedback: "  - Feedback: 预设适用条件、V1/V3 范围和对已有输入的覆盖预览可见。"
        - key: shooting-recommendation
          location: "  - Location: 生成结果首屏。"
          trigger: "  - Trigger: 表单有效后生成/重算或切换方案版本。"
          input: "  - Input: 确定性规则结果、条件快照、设备能力、用户调整和可信度。"
          loading_state: "  - Loading: 参数框架稳定并显示正在计算的部分。"
          empty_state: "  - Empty: 规则无安全/合理解时明确不可推荐并给改条件建议。"
          success_state: "  - Success: 手机或相机全部适用参数、构图方向、拖线/风/露水等风险与替代方案分层显示。"
          failure_state: "  - Failure: 不展示半套参数为成功；保留输入和上次有版本结果。"
          feedback: "  - Feedback: 每个参数有单位/范围/是否用户覆盖，核心依据/规则版本/数据时间可展开。"
        - key: ai-explanation-panel
          location: "  - Location: 确定性参数之后的“为什么/替代方案”。"
          trigger: "  - Trigger: 参数生成后展开或请求针对性解释。"
          input: "  - Input: 已确定参数、条件、经验等级、允许发送的数据投影和问题。"
          loading_state: "  - Loading: 参数区继续可用，解释显示独立生成/取消状态。"
          empty_state: "  - Empty: 未启用/不同意 AI 数据处理时显示规则解释，不降低核心能力。"
          success_state: "  - Success: 逐项引用现有参数/条件说明取舍、问题、无脚架替代和天气调整。"
          failure_state: "  - Failure: 明确解释服务失败，不生成占位“建议”。"
          feedback: "  - Feedback: 标明 AI、生成时间、数据范围和“不替代现场试拍”；用户可反馈但不能直接污染规则真值。"
        - key: shooting-checklist
