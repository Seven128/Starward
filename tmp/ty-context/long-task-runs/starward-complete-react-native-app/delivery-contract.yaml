        - Affected Outcome: spot-detail-and-trust
        - Basis: 精确小众地点、私人土地和上传 EXIF 可能暴露敏感位置或造成生态/人身风险。
        - Consequence: 服务端授权、媒体清理、分享/缓存防泄漏和审计必须贯穿全部出口，不能只靠前端隐藏。
    disposition:
      type: risk_fact
      refs:
