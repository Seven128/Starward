          input: "  - Input: 可用模型、运行时间、分辨率、来源许可、健康状态。"
          loading_state: "  - Loading: 切换仅更新数据区并保持选择器稳定。"
          empty_state: "  - Empty: 只有一个模型时说明“暂无可比较模型”。"
          success_state: "  - Success: 模型值和系统解释同步更新。"
          failure_state: "  - Failure: 失败模型明确不可用，自动回到主模型但不隐藏分歧。"
          feedback: "  - Feedback: 显示模型运行批次、可信度及“为何分歧”说明。"
        - key: trend-calendar
          location: "  - Location: 条件页面的“15 日趋势”入口和独立视图。"
          trigger: "  - Trigger: 点击日期卡或日期选择器。"
          input: "  - Input: 15 日逐日指标和可信度。"
          loading_state: "  - Loading: 日期骨架保持横向位置。"
          empty_state: "  - Empty: 某日超出数据范围时禁用并说明。"
          success_state: "  - Success: 选定日期可带入今晚报告/行程创建。"
          failure_state: "  - Failure: 保留最后可用趋势并标过期。"
          feedback: "  - Feedback: 远期可信度随日期显式降低，不与临近预报同样强调。"
        - key: twilight-window-strip
          location: "  - Location: 条件摘要与专业预报之间，可展开详情。"
          trigger: "  - Trigger: 点击时间带、拖动时间游标。"
          input: "  - Input: 昼夜/三类蒙影、月升落、银河/目标窗口、最佳窗口。"
          loading_state: "  - Loading: 保持时间轴刻度和高度。"
          empty_state: "  - Empty: 极区或无事件时用真实说明替代普通时间段。"
          success_state: "  - Success: 选择时刻同步小时矩阵、天空和摄影。"
          failure_state: "  - Failure: 单类事件失败不伪造时间，标出算法/数据问题。"
          feedback: "  - Feedback: 图例、起止、持续时长、当前时刻和重叠区域可读。"
        - key: weather-layer-panel
          location: "  - Location: 地图的图层面板。"
          trigger: "  - Trigger: 点击图层按钮、选择图层、调整透明度或时间。"
          input: "  - Input: 图层列表、时间、透明度、来源、版本、图例。"
          loading_state: "  - Loading: 地图保持可操作并显示瓦片加载进度。"
          empty_state: "  - Empty: 当前范围无数据时保留底图并说明。"
          success_state: "  - Success: 新图层原子替换，图例/时间/来源同步。"
          failure_state: "  - Failure: 回退上一可用图层，不留下半加载混合状态。"
