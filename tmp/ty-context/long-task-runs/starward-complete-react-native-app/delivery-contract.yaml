          statement: "- **REQ backup-recovery** [direct: S-ARCH 13.4]：PostgreSQL 多可用区、每日全量、持续归档/PITR；Redis 不作唯一真值；对象存储版本控制；关键地点定期导出；定期恢复演练；来源建议目标 RPO ≤ 15 分钟、RTO ≤ 2 小时，生产承诺由 DEC recovery-objectives 决定。"
