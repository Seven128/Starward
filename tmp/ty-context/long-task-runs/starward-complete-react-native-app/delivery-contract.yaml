        - key: product-metrics
          statement: "- **REQ product-metrics** [direct: S-PRODUCT 十三]：北极星指标为每周完成“地点选择—发起导航—现场反馈”闭环的有效观星行程数；辅助指标为首次地点选择率、推荐点击率、详情到导航、主转备、行程完成、实况上传、推荐满意度、次周留存、地点数据有效率和天气/现场一致度，均定义口径/排除/版本。"
