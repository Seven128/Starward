        - key: china-production-compliance
          statement: "- **REQ china-production-compliance** [direct: S-ARCH 13.2]：以中国用户为主时，业务服务、数据库、媒体和日志采用符合确认结果的中国境内区域，并在生产前解决 ICP、地图授权、数据跨境、对象存储/CDN和个人信息合规；外部证明见 EXT china-production-legal-readiness。"
